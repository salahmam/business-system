<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"><title>تسجيل الدخول</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen font-sans">
    <div class="bg-white p-8 rounded-3xl shadow-2xl w-96 space-y-6">
        <h1 class="text-2xl font-bold text-center text-slate-800">نظام إدارة العمل</h1>
        <input type="text" id="login_id" placeholder="الاسم أو الرمز" class="w-full p-4 border rounded-2xl text-center outline-none focus:ring-2 focus:ring-blue-500">
        <input type="password" id="login_pass" placeholder="كلمة المرور" class="w-full p-4 border rounded-2xl text-center outline-none">
        <button onclick="login()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold hover:bg-blue-700 transition-all">دخول</button>
    </div>
    <script>
        const SB_URL = 'https://iqagigpqwwtvriqvlfbv.supabase.co';
        const SB_KEY = 'sb_publishable_5xbaPlWHgjeeaIwceEFRrQ_d9aZ6Zax';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        async function login() {
            const id = document.getElementById('login_id').value;
            const pass = document.getElementById('login_pass').value;
            const { data } = await _supabase.from('users').select('*').or(`username.eq.${id},employee_code.eq.${id}`).eq('password', pass).single();
            
            if(data) {
                localStorage.setItem('user_session', JSON.stringify(data));
                if(data.role === 'مدير') window.location.href = 'admin.html';
                else if(data.role === 'مروج') window.location.href = 'promoter.html';
                else window.location.href = 'staff.html';
            } else alert("بيانات الدخول غير صحيحة");
        }
    </script>
</body>
</html>
