<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - BUSINESS SYSTEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Tajawal', sans-serif; 
            overflow: hidden;
        }

        /* أنيميشن الخلفية المتحركة الاحترافية */
        .animated-bg {
            background: linear-gradient(-45deg, #0f172a, #1e3a8a, #312e81, #1e1b4b);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            height: 100vh;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* تخصيص شكل الـ SweetAlert ليتناسب مع التصميم */
        .swal2-popup {
            border-radius: 2rem !important;
            font-family: 'Tajawal', sans-serif !important;
            padding: 2rem !important;
        }
        .swal2-styled.swal2-confirm {
            background: linear-gradient(to right, #2563eb, #4f46e5) !important;
            border-radius: 1rem !important;
            padding: 0.8rem 2rem !important;
        }
    </style>
</head>
<body class="animated-bg flex items-center justify-center min-h-screen p-4">

    <div class="glass w-full max-w-[400px] p-10 rounded-[3rem] space-y-8 transform transition-all hover:scale-[1.01]">
        
        <div class="text-center space-y-3">
            <div class="inline-block p-5 bg-gradient-to-br from-blue-600 to-indigo-700 rounded-3xl shadow-2xl shadow-blue-500/40 mb-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <h1 class="text-3xl font-black text-slate-800 tracking-tighter italic">BUSINESS SYSTEM</h1>
            <p class="text-slate-500 text-sm font-bold opacity-80">نظام الإدارة المتكامل</p>
        </div>

        <div class="space-y-5">
            <div class="space-y-1">
                <label class="text-[10px] font-black text-blue-600 mr-2 uppercase tracking-widest">هوية المستخدم</label>
                <input type="text" id="uid" placeholder="الاسم أو الرمز الموحد" 
                    class="w-full p-4 bg-slate-100/50 border-2 border-transparent rounded-2xl text-right outline-none focus:border-blue-500 focus:bg-white transition-all font-bold text-slate-700">
            </div>
            
            <div class="space-y-1">
                <label class="text-[10px] font-black text-blue-600 mr-2 uppercase tracking-widest">كلمة المرور</label>
                <input type="password" id="ups" placeholder="••••••••" 
                    class="w-full p-4 bg-slate-100/50 border-2 border-transparent rounded-2xl text-right outline-none focus:border-blue-500 focus:bg-white transition-all font-bold text-slate-700">
            </div>

            <button id="loginBtn" onclick="doLogin()" 
                class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white py-5 rounded-2xl font-black text-lg shadow-2xl shadow-blue-600/30 active:scale-[0.97] transition-all flex items-center justify-center gap-2">
                <span>دخول آمن</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001zm11.541 3.708a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
                </svg>
            </button>
        </div>

        <div class="pt-4 text-center border-t border-slate-200/50">
            <p class="text-slate-400 text-[10px] font-black uppercase tracking-[0.3em] animate-pulse">Protected & Secure Infrastructure</p>
        </div>
    </div>

    <script>
        const _SB_URL = 'https://iqagigpqwwtvriqvlfbv.supabase.co';
        const _SB_KEY = 'sb_publishable_5xbaPlWHgjeeaIwceEFRrQ_d9aZ6Zax';
        const sb = supabase.createClient(_SB_URL, _SB_KEY);

        async function doLogin() {
            const id = document.getElementById('uid').value;
            const ps = document.getElementById('ups').value;
            const btn = document.getElementById('loginBtn');
            
            if(!id || !ps) {
                Swal.fire({
                    icon: 'warning',
                    title: 'تنبيه',
                    text: 'يرجى ملء جميع الحقول المطلوبة',
                    confirmButtonText: 'حسناً',
                    customClass: { popup: 'swal2-popup' }
                });
                return;
            }

            // إضافة تأثير التحميل على الزر
            btn.disabled = true;
            btn.innerHTML = '<span class="animate-spin inline-block w-5 h-5 border-2 border-white border-t-transparent rounded-full"></span> جاري التحقق...';

            try {
                const { data, error } = await sb.from('users')
                    .select('*')
                    .or(`username.eq."${id}",employee_code.eq."${id}"`)
                    .eq('password', ps)
                    .single();
                
                if(data) {
                    localStorage.setItem('user_session', JSON.stringify(data));
                    
                    Swal.fire({
                        icon: 'success',
                        title: 'تم الدخول بنجاح',
                        text: `مرحباً بك مجدداً، ${data.username}`,
                        showConfirmButton: false,
                        timer: 1500,
                        customClass: { popup: 'swal2-popup' }
                    }).then(() => {
                        const target = { 'مدير': 'admin.html', 'مروج': 'promoter.html' };
                        window.location.href = target[data.role] || 'staff.html';
                    });
                } else {
                    throw new Error("بيانات الدخول غير صحيحة");
                }
            } catch (err) {
                Swal.fire({
                    icon: 'error',
                    title: 'فشل الدخول',
                    text: 'تأكد من صحة الاسم أو كلمة المرور',
                    confirmButtonText: 'محاولة أخرى',
                    confirmButtonColor: '#ef4444',
                    customClass: { popup: 'swal2-popup' }
                });
                btn.disabled = false;
                btn.innerHTML = 'دخول آمن';
            }
        }
    </script>
</body>
</html>
