<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة المبيعات المتكامل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; }
        .tab-active { border-bottom: 4px solid #1d4ed8; color: #1d4ed8; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <div id="login-page" class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-sm text-center">
            <div class="bg-blue-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-800 mb-2">مرحباً بك</h1>
            <p class="text-gray-500 mb-6 text-sm">يرجى إدخال كلمة السر للدخول للنظام</p>
            <input type="password" id="pass-key" placeholder="كلمة السر" class="w-full p-4 border border-gray-200 rounded-xl mb-4 text-center outline-none focus:ring-2 focus:ring-blue-500 transition-all">
            <button onclick="login()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 shadow-lg active:scale-95 transition-all">دخول النظام</button>
            <p id="login-err" class="text-red-500 mt-4 hidden text-sm font-bold italic">⚠️ كلمة السر غير صحيحة!</p>
        </div>
    </div>

    <div id="main-system" class="hidden">
        <header class="bg-blue-600 text-white p-4 flex justify-between items-center shadow-lg sticky top-0 z-50">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-white rounded-lg flex items-center justify-center">
                    <span class="text-blue-600 font-bold">B</span>
                </div>
                <span class="font-bold tracking-wide">Business System</span>
            </div>
            <button onclick="location.reload()" class="bg-blue-700 hover:bg-red-600 px-4 py-2 rounded-lg text-xs font-bold transition-colors">خروج</button>
        </header>

        <div class="flex bg-white border-b sticky top-[64px] z-40 shadow-sm">
            <button onclick="showTab('promoter')" id="btn-promoter" class="flex-1 py-4 font-bold tab-active transition-all">إرسال تقرير</button>
            <button onclick="showTab('admin'); loadReports()" id="btn-admin" class="flex-1 py-4 font-bold text-gray-500 transition-all">تقرير المدير</button>
        </div>

        <div id="tab-promoter" class="p-6 max-w-lg mx-auto">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 space-y-5">
                <h2 class="text-lg font-bold text-gray-700 border-r-4 border-blue-600 pr-3">إدخال البيانات اليومية</h2>
                
                <div>
                    <label class="block text-sm text-gray-500 mb-1 mr-1">اسم الموظف المروج</label>
                    <input type="text" id="emp_name" placeholder="مثلاً: أحمد محمد" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:bg-white focus:ring-2 focus:ring-blue-500 transition-all">
                </div>

                <div>
                    <label class="block text-sm text-gray-500 mb-1 mr-1">عدد الحجوزات اليوم</label>
                    <input type="number" id="bookings" placeholder="0" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:bg-white focus:ring-2 focus:ring-blue-500 transition-all text-2xl font-bold text-blue-600 text-center">
                </div>

                <button onclick="sendData()" id="sendBtn" class="w-full bg-green-600 text-white py-5 rounded-xl font-bold shadow-md hover:bg-green-700 active:scale-95 transition-all flex items-center justify-center gap-2">
                    <span>إرسال التقرير الآن</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" />
                    </svg>
                </button>
                
                <div id="statusMsg" class="text-center font-bold hidden p-4 rounded-xl animate-pulse"></div>
            </div>
        </div>

        <div id="tab-admin" class="p-4 hidden animate-fadeIn">
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="p-4 bg-gray-50 border-b flex justify-between items-center">
                    <h3 class="font-bold text-gray-700 italic">سجل الأداء والمكافآت</h3>
                    <button onclick="loadReports()" class="text-blue-600 text-xs font-bold underline">تحديث البيانات</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead class="bg-gray-50 border-b text-gray-500">
                            <tr>
                                <th class="p-4 text-right">الموظف</th>
                                <th class="p-4 text-center">الحجوزات</th>
                                <th class="p-4 text-center">المكافأة</th>
                            </tr>
                        </thead>
                        <tbody id="report-body" class="divide-y divide-gray-100">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- إعدادات الاتصال بقاعدة البيانات ---
        const SB_URL = 'https://iqagigpqwwtvriqvlfbv.supabase.co';
        const SB_KEY = 'sb_publishable_5xbaPlWHgjeeaIwceEFRrQ_d9aZ6Zax'; 
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        // وظيفة تسجيل الدخول
        function login() {
            const pass = document.getElementById('pass-key').value;
            if(pass === "1234") { 
                document.getElementById('login-page').classList.add('hidden');
                document.getElementById('main-system').classList.remove('hidden');
                document.body.className = "bg-gray-100";
            } else {
                document.getElementById('login-err').classList.remove('hidden');
            }
        }

        // التبديل بين الواجهات
        function showTab(tab) {
            document.getElementById('tab-promoter').classList.add('hidden');
            document.getElementById('tab-admin').classList.add('hidden');
            document.getElementById('btn-promoter').classList.remove('tab-active', 'text-blue-600');
            document.getElementById('btn-admin').classList.remove('tab-active', 'text-blue-600');
            document.getElementById('btn-promoter').classList.add('text-gray-500');
            document.getElementById('btn-admin').classList.add('text-gray-500');

            document.getElementById('tab-' + tab).classList.remove('hidden');
            document.getElementById('btn-' + tab).classList.add('tab-active', 'text-blue-600');
        }

        // إرسال البيانات وحساب المكافأة تلقائياً
        async function sendData() {
            const name = document.getElementById('emp_name').value;
            const count = parseInt(document.getElementById('bookings').value);
            const msg = document.getElementById('statusMsg');
            const btn = document.getElementById('sendBtn');

            if(!name || !count) return alert("يرجى ملء الاسم وعدد الحجوزات!");

            btn.disabled = true;
            btn.innerText = "جاري الحفظ في السيرفر...";

            // قاعدة حساب المكافآت (35 فأكثر = 2 | 25 فأكثر = 1)
            let points = 0;
            if(count > 35) points = 2; else if(count >= 25) points = 1;

            const { error } = await _supabase.from('daily_reports').insert([
                { employee_name: name, bookings_count: count, bonus_points: points }
            ]);

            msg.classList.remove('hidden');
            if(error) {
                msg.innerText = "❌ حدث خطأ: " + error.message;
                msg.className = "text-red-600 p-4 bg-red-50 rounded-xl text-center font-bold mt-4";
            } else {
                msg.innerText = `✅ تم الإرسال بنجاح! مكافأتك اليوم: ${points} نقطة`;
                msg.className = "text-green-700 p-4 bg-green-50 rounded-xl text-center font-bold mt-4 border border-green-200";
                document.getElementById('bookings').value = "";
                setTimeout(() => { msg.classList.add('hidden'); }, 5000);
            }
            btn.disabled = false;
            btn.innerHTML = 'إرسال التقرير الآن ✅';
        }

        // تحميل وعرض التقارير للمدير
        async function loadReports() {
            const body = document.getElementById('report-body');
            body.innerHTML = '<tr><td colspan="3" class="p-8 text-center text-gray-400 italic animate-pulse">جاري جلب أحدث البيانات...</td></tr>';

            const { data, error } = await _supabase
                .from('daily_reports')
                .select('*')
                .order('created_at', { ascending: false });

            if(error) {
                body.innerHTML = '<tr><td colspan="3" class="p-4 text-center text-red-500">فشل في تحميل البيانات</td></tr>';
                return;
            }

            body.innerHTML = "";
            if(data.length === 0) {
                body.innerHTML = '<tr><td colspan="3" class="p-8 text-center text-gray-400">لا يوجد بيانات مسجلة بعد</td></tr>';
            } else {
                data.forEach(row => {
                    const date = new Date(row.created_at).toLocaleDateString('ar-EG');
                    body.innerHTML += `
                        <tr class="hover:bg-blue-50 transition-colors">
                            <td class="p-4">
                                <div class="font-bold text-gray-800">${row.employee_name}</div>
                                <div class="text-[10px] text-gray-400">${date}</div>
                            </td>
                            <td class="p-4 text-center font-bold text-blue-700 text-lg">${row.bookings_count}</td>
                            <td class="p-4 text-center">
                                <span class="${row.bonus_points > 0 ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-400'} px-3 py-1 rounded-full text-xs font-bold">
                                    +${row.bonus_points} نقطة
                                </span>
                            </td>
                        </tr>`;
                });
            }
        }
    </script>
</body>
</html>
