<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - BUSINESS SYSTEM</title>
    <link rel="manifest" href="manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Business System">
<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1006/1006540.png">

<meta name="theme-color" content="#0f172a">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; overflow: hidden; }

        .animated-bg {
            background: linear-gradient(-45deg, #0f172a, #1e3a8a, #312e81, #1e1b4b);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            height: 100vh;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .swal2-popup {
            border-radius: 2rem !important;
            font-family: 'Tajawal', sans-serif !important;
        }
    </style>
</head>
<body class="animated-bg flex items-center justify-center min-h-screen p-4">

    <div class="glass w-full max-w-[380px] p-8 rounded-[2.5rem] space-y-6 transform transition-all">
        
        <div class="text-center space-y-2">
            <div class="inline-block p-4 bg-gradient-to-br from-blue-600 to-indigo-700 rounded-2xl shadow-lg shadow-blue-500/40 mb-1">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <h1 class="text-2xl font-black text-slate-800 tracking-tight italic">BUSINESS SYSTEM</h1>
            <p class="text-slate-500 text-[12px] font-bold opacity-80">نظام الإدارة المتكامل</p>
        </div>

        <div class="space-y-4">
            <input type="text" id="uid" placeholder="الاسم أو الرمز الموحد" 
                class="w-full p-4 bg-slate-100/70 border-2 border-transparent rounded-2xl text-right outline-none focus:border-blue-500 focus:bg-white transition-all font-bold text-slate-700 shadow-inner">
            
            <input type="password" id="ups" placeholder="كلمة المرور" 
                class="w-full p-4 bg-slate-100/70 border-2 border-transparent rounded-2xl text-right outline-none focus:border-blue-500 focus:bg-white transition-all font-bold text-slate-700 shadow-inner">

            <button id="loginBtn" onclick="doLogin()" 
                class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white py-5 rounded-2xl font-black text-lg shadow-2xl shadow-blue-600/30 active:scale-[0.97] transition-all flex items-center justify-center gap-2">
                <span>دخول آمن</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001zm11.541 3.708a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
                </svg>
            </button>
        </div>

        <div class="text-center border-t border-slate-100 pt-4">
            <p class="text-slate-400 text-[9px] font-black uppercase tracking-[0.3em] opacity-60">Protected & Secure</p>
        </div>
    </div>

    <script>
        const _SB_URL = 'https://iqagigpqwwtvriqvlfbv.supabase.co';
        const _SB_KEY = 'sb_publishable_5xbaPlWHgjeeaIwceEFRrQ_d9aZ6Zax';
        const sb = supabase.createClient(_SB_URL, _SB_KEY);

        async function doLogin() {
            const id = document.getElementById('uid').value;
            const ps = document.getElementById('ups').value;
            const btn = document.getElementById('loginBtn');
            
            if(!id || !ps) {
                Swal.fire({
                    icon: 'warning',
                    title: 'تنبيه',
                    text: 'يرجى ملء جميع الحقول المطلوبة',
                    confirmButtonText: 'حسناً',
                });
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="animate-spin inline-block w-5 h-5 border-2 border-white border-t-transparent rounded-full"></span>';

            try {
                const { data, error } = await sb.from('users')
                    .select('*')
                    .or(`username.eq."${id}",employee_code.eq."${id}"`)
                    .eq('password', ps)
                    .single();
                
                if(data) {
                    localStorage.setItem('user_session', JSON.stringify(data));
                    Swal.fire({
                        icon: 'success',
                        title: 'تم الدخول',
                        showConfirmButton: false,
                        timer: 1000,
                    }).then(() => {
                        const target = { 'مدير': 'admin.html', 'مروج': 'promoter.html' };
                        window.location.href = target[data.role] || 'staff.html';
                    });
                } else {
                    throw new Error();
                }
            } catch (err) {
                Swal.fire({
                    icon: 'error',
                    title: 'خطأ',
                    text: 'بيانات الدخول غير صحيحة',
                    confirmButtonText: 'محاولة أخرى',
                    confirmButtonColor: '#ef4444',
                });
                btn.disabled = false;
                btn.innerHTML = '<span>دخول آمن</span><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001zm11.541 3.708a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" /></svg>';
            }
        }
    </script>
</body>
</html>
