<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - BUSINESS SYSTEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; }
        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-blue-900 to-indigo-900 flex items-center justify-center min-h-screen p-4">

    <div class="glass w-full max-w-[400px] p-8 rounded-[2.5rem] shadow-2xl space-y-8 transform transition-all">
        
        <div class="text-center space-y-2">
            <div class="inline-block p-4 bg-blue-600 rounded-2xl shadow-lg shadow-blue-500/30 mb-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <h1 class="text-3xl font-black text-slate-800 tracking-tight">BUSINESS SYSTEM</h1>
            <p class="text-slate-500 text-sm font-medium">مرحباً بك، يرجى تسجيل الدخول للمتابعة</p>
        </div>

        <div class="space-y-4">
            <div class="relative">
                <input type="text" id="uid" placeholder="الاسم أو الرمز الموحد" 
                    class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl text-right outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all placeholder:text-slate-400">
            </div>
            
            <div class="relative">
                <input type="password" id="ups" placeholder="كلمة المرور" 
                    class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl text-right outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all placeholder:text-slate-400">
            </div>

            <button onclick="doLogin()" 
                class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white py-4 rounded-2xl font-bold text-lg shadow-xl shadow-blue-500/40 hover:shadow-blue-500/20 active:scale-[0.98] transition-all">
                دخول آمن
            </button>
        </div>

        <div class="text-center">
            <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">Protected & Secure</p>
        </div>
    </div>

    <script>
        // الربط كما هو بدون تغيير
        const _SB_URL = 'https://iqagigpqwwtvriqvlfbv.supabase.co';
        const _SB_KEY = 'sb_publishable_5xbaPlWHgjeeaIwceEFRrQ_d9aZ6Zax';
        const sb = supabase.createClient(_SB_URL, _SB_KEY);

        async function doLogin() {
            const id = document.getElementById('uid').value;
            const ps = document.getElementById('ups').value;
            
            if(!id || !ps) {
                alert("يرجى ملء جميع الحقول");
                return;
            }

            const { data, error } = await sb.from('users')
                .select('*')
                .or(`username.eq."${id}",employee_code.eq."${id}"`)
                .eq('password', ps)
                .single();
            
            if(data) {
                localStorage.setItem('user_session', JSON.stringify(data));
                const target = { 'مدير': 'admin.html', 'مروج': 'promoter.html' };
                window.location.href = target[data.role] || 'staff.html';
            } else {
                alert("بيانات الدخول غير صحيحة");
            }
        }
    </script>
</body>
</html>
