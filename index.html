<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول - النظام المتكامل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-3xl shadow-2xl w-96 space-y-6 border-t-8 border-blue-600">
        <h1 class="text-2xl font-bold text-center text-slate-800 italic">BUSINESS SYSTEM</h1>
        <div class="space-y-4">
            <input type="text" id="uid" placeholder="الاسم أو الرمز الموحد" class="w-full p-4 border rounded-2xl text-center outline-none focus:ring-2 focus:ring-blue-500">
            <input type="password" id="ups" placeholder="كلمة المرور" class="w-full p-4 border rounded-2xl text-center outline-none">
            <button onclick="doLogin()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold hover:bg-blue-700 transition-all">دخول آمن</button>
        </div>
    </div>

    <script>
        const _SB_URL = 'https://iqagigpqwwtvriqvlfbv.supabase.co';
        const _SB_KEY = 'sb_publishable_5xbaPlWHgjeeaIwceEFRrQ_d9aZ6Zax';
        const sb = supabase.createClient(_SB_URL, _SB_KEY);

        async function doLogin() {
            const id = document.getElementById('uid').value;
            const ps = document.getElementById('ups').value;
            const { data } = await sb.from('users').select('*').or(`username.eq."${id}",employee_code.eq."${id}"`).eq('password', ps).single();
            
            if(data) {
                localStorage.setItem('user_session', JSON.stringify(data));
                const target = { 'مدير': 'admin.html', 'مروج': 'promoter.html' };
                window.location.href = target[data.role] || 'staff.html';
            } else alert("خطأ في البيانات");
        }
    </script>
</body>
</html>
