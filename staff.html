<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام الموظفين - BUSINESS SYSTEM</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f1f5f9; }
        .stat-card { background: white; border-radius: 1.5rem; padding: 1.25rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .grad-blue { background: linear-gradient(135deg, #2563eb, #1d4ed8); }
        .grad-purple { background: linear-gradient(135deg, #7c3aed, #5b21b6); }
        .input-style { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 1rem; padding: 1rem; width: 100%; font-weight: bold; outline: none; }
        #loader { position: fixed; inset: 0; background: white; z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #2563eb; border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p class="mt-4 font-bold text-slate-600 italic">BUSINESS SYSTEM</p>
        <p id="error_msg" class="text-red-500 text-xs mt-2 hidden">يبدو أن هناك مشكلة في البيانات..</p>
        <button id="emergency_btn" onclick="logout()" class="hidden mt-4 bg-slate-200 px-4 py-2 rounded-lg text-xs font-bold">العودة لتسجيل الدخول</button>
    </div>

    <div id="main_content" class="hidden min-h-screen">
        <div id="ui_placeholder"></div>
    </div>

    <script>
        const _SB_URL = 'https://iqagigpqwwtvriqvlfbv.supabase.co';
        const _SB_KEY = 'sb_publishable_5xbaPlWHgjeeaIwceEFRrQ_d9aZ6Zax';
        const sb = supabase.createClient(_SB_URL, _SB_KEY);

        // زر الطوارئ يظهر إذا تأخر التحميل
        setTimeout(() => {
            document.getElementById('emergency_btn').classList.remove('hidden');
            document.getElementById('error_msg').classList.remove('hidden');
        }, 5000);

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        // الوظيفة الرئيسية التي تعمل فوراً
        (async function validateAndStart() {
            try {
                const session = localStorage.getItem('user_session');
                
                if (!session) {
                    Swal.fire('خطأ', 'لم يتم العثور على جلسة دخول', 'error').then(logout);
                    return;
                }

                const user = JSON.parse(session);
                // تحديد الدور (نتأكد من role أو user_job_role)
                const role = user.user_job_role || user.role;

                if (role === 'ردود') {
                    renderResponderUI(user);
                } else if (role === 'متابعة') {
                    renderFollowupUI(user);
                } else {
                    Swal.fire('تنبيه', 'نوع الحساب غير مخصص لهذه الصفحة', 'info').then(logout);
                    return;
                }

                // إخفاء اللودر وإظهار المحتوى
                document.getElementById('loader').style.display = 'none';
                document.getElementById('main_content').classList.remove('hidden');

            } catch (err) {
                console.error(err);
                Swal.fire('خطأ برمي', 'حدث خطأ في قراءة البيانات', 'error');
            }
        })();

        // بناء واجهة الردود
        function renderResponderUI(user) {
            document.getElementById('ui_placeholder').innerHTML = `
                <header class="grad-blue text-white p-8 rounded-b-[3rem] shadow-xl text-center">
                    <div class="flex justify-between items-center mb-6">
                        <button onclick="logout()" class="bg-white/20 p-2 rounded-lg text-xs font-bold">خروج</button>
                        <span class="font-black">STAFF PANEL</span>
                        <div class="w-10"></div>
                    </div>
                    <h2 class="text-2xl font-black">${user.username}</h2>
                    <p class="text-[10px] opacity-80 font-bold mt-1">كود: ${user.employee_code || '---'} | تيم: ${user.team || 'عام'}</p>
                </header>
                <main class="px-4 -mt-8 space-y-4">
                    <div class="grid grid-cols-2 gap-3 text-center">
                        <div class="stat-card"><p class="text-[10px] text-slate-400 font-bold">الراتب</p><p class="text-xl font-black">${user.salary || 0}</p></div>
                        <div class="stat-card"><p class="text-[10px] text-slate-400 font-bold">المكافآت</p><p class="text-xl font-black text-emerald-600">0</p></div>
                    </div>
                    <div class="stat-card space-y-4">
                        <h3 class="font-black text-sm text-slate-600 border-b pb-2">تقرير الحجوزات اليومي</h3>
                        <input type="date" id="r_date" class="input-style" value="${new Date().toISOString().split('T')[0]}">
                        <input type="number" id="r_book_val" class="input-style" placeholder="عدد حجوزات اليوم">
                        <button onclick="saveReport('${user.username}', '${user.team}')" class="w-full grad-blue text-white py-4 rounded-xl font-black">حفظ التقرير</button>
                    </div>
                </main>
            `;
        }

        // بناء واجهة المتابعة
        async function renderFollowupUI(user) {
            document.getElementById('ui_placeholder').innerHTML = `
                <header class="grad-purple text-white p-8 rounded-b-[3rem] shadow-xl text-center">
                    <div class="flex justify-between items-center mb-6">
                        <button onclick="logout()" class="bg-white/20 p-2 rounded-lg text-xs font-bold">خروج</button>
                        <span class="font-black">FOLLOW-UP</span>
                        <div class="w-10"></div>
                    </div>
                    <h2 class="text-2xl font-black">${user.username}</h2>
                </header>
                <main class="px-4 -mt-8 space-y-4">
                    <div class="stat-card space-y-4 text-right">
                        <h3 class="font-black text-sm text-center text-slate-600 border-b pb-2">تحديث واصل الموظفين</h3>
                        <input type="date" id="f_date" class="input-style" value="${new Date().toISOString().split('T')[0]}">
                        <select id="f_user_select" class="input-style"><option>جاري تحميل الموظفين...</option></select>
                        <input type="number" id="f_confirm_val" class="input-style" placeholder="عدد الواصل الجديد">
                        <button onclick="saveFollowup()" class="w-full grad-purple text-white py-4 rounded-xl font-black">إرسال التحديث</button>
                    </div>
                </main>
            `;
            // تحميل قائمة الموظفين
            const { data } = await sb.from('users').select('username').eq('user_job_role', 'ردود');
            if (data) {
                document.getElementById('f_user_select').innerHTML = data.map(u => `<option value="${u.username}">${u.username}</option>`).join('');
            }
        }

        // دوال الحفظ (Supabase)
        async function saveReport(username, team) {
            const date = document.getElementById('r_date').value;
            const val = document.getElementById('r_book_val').value;
            if(!val) return;
            const { error } = await sb.from('bookings_reports').upsert([{ 
                employee_username: username, report_date: date, bookings_count: val, team: team 
            }], { onConflict: 'employee_username,report_date' });
            
            if(!error) Swal.fire('تم', 'تم حفظ التقرير', 'success');
            else Swal.fire('خطأ', 'فشل الاتصال بـ Supabase', 'error');
        }

        async function saveFollowup() {
            const date = document.getElementById('f_date').value;
            const target = document.getElementById('f_user_select').value;
            const val = Number(document.getElementById('f_confirm_val').value);
            if(!val) return;
            
            const { data: ex } = await sb.from('bookings_reports').select('*').eq('employee_username', target).eq('report_date', date).single();
            const newTotal = (ex ? Number(ex.confirmed_count) : 0) + val;
            
            const { error } = await sb.from('bookings_reports').upsert([{ 
                employee_username: target, report_date: date, confirmed_count: newTotal 
            }], { onConflict: 'employee_username,report_date' });

            if(!error) Swal.fire('تم', `تحديث واصل ${target} بنجاح`, 'success');
        }
    </script>
</body>
</html>
