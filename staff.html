<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام الموظفين - BUSINESS SYSTEM</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f1f5f9; }
        .stat-card { background: white; border-radius: 1.5rem; padding: 1.25rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .grad-blue { background: linear-gradient(135deg, #2563eb, #1d4ed8); }
        .grad-purple { background: linear-gradient(135deg, #7c3aed, #5b21b6); }
        .input-style { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 1rem; padding: 1rem; width: 100%; font-weight: bold; outline: none; transition: 0.3s; }
        .hidden { display: none; }
        #loader { position: fixed; inset: 0; background: white; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #2563eb; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen">

    <div id="loader">
        <div class="spinner"></div>
        <p class="mt-4 font-bold text-slate-600">جاري الدخول للنظام...</p>
    </div>

    <div id="responder_screen" class="hidden pb-10">
        <header class="grad-blue text-white p-8 rounded-b-[3rem] shadow-xl text-center space-y-4">
            <div class="flex justify-between items-center">
                <button onclick="logout()" class="bg-white/20 p-2 rounded-lg text-xs font-bold text-white">خروج</button>
                <span class="font-black text-lg italic">STAFF PANEL</span>
                <div class="w-10"></div>
            </div>
            <div class="py-2">
                <h2 id="r_name" class="text-2xl font-black">--</h2>
                <div class="flex justify-center gap-3 text-[10px] mt-2 font-bold opacity-90">
                    <span id="r_code" class="bg-black/20 px-3 py-1 rounded-full">--</span>
                    <span id="r_team" class="bg-black/20 px-3 py-1 rounded-full">--</span>
                </div>
            </div>
        </header>

        <main class="px-4 -mt-8 space-y-4">
            <div class="grid grid-cols-2 gap-3">
                <div class="stat-card">
                    <p class="text-[10px] font-bold text-slate-400 uppercase">الراتب الأساسي</p>
                    <p id="r_salary" class="text-xl font-black text-slate-800">0</p>
                </div>
                <div class="stat-card">
                    <p class="text-[10px] font-bold text-slate-400 uppercase">مكافآت الشهر</p>
                    <p id="r_bonus" class="text-xl font-black text-emerald-600">0</p>
                </div>
            </div>

            <div class="stat-card flex justify-around py-6 text-center">
                <div>
                    <p class="text-[10px] text-slate-400 font-bold uppercase">حجوزات الشهر</p>
                    <p id="r_total_book" class="text-2xl font-black text-blue-600">0</p>
                </div>
                <div class="border-r border-slate-100 h-10 my-auto"></div>
                <div>
                    <p class="text-[10px] text-slate-400 font-bold uppercase">واصل الشهر</p>
                    <p id="r_total_confirm" class="text-2xl font-black text-emerald-600">0</p>
                </div>
            </div>

            <div class="stat-card space-y-4 shadow-blue-100">
                <h3 class="font-black text-sm text-slate-600 border-b pb-2">تقرير العمل اليومي</h3>
                <div class="space-y-3">
                    <input type="date" id="r_date" class="input-style">
                    <input type="number" id="r_book_val" class="input-style" placeholder="أدخل عدد الحجوزات اليوم">
                    <button onclick="submitResponderReport()" class="w-full grad-blue text-white py-4 rounded-xl font-black shadow-lg">حفظ التقرير</button>
                </div>
            </div>
        </main>
    </div>

    <div id="followup_screen" class="hidden pb-10">
        <header class="grad-purple text-white p-8 rounded-b-[3rem] shadow-xl text-center">
            <div class="flex justify-between items-center mb-4">
                <button onclick="logout()" class="bg-white/20 p-2 rounded-lg text-xs font-bold text-white">خروج</button>
                <span class="font-black text-lg italic opacity-50">FOLLOW-UP</span>
                <div class="w-10"></div>
            </div>
            <h2 id="f_name" class="text-2xl font-black">--</h2>
        </header>

        <main class="px-4 -mt-8 space-y-4">
            <div class="stat-card space-y-4">
                <h3 class="font-black text-sm text-center text-slate-600 border-b pb-2">تحديث واصل الموظفين</h3>
                <div class="space-y-3 text-right">
                    <label class="text-xs font-bold text-slate-400 mr-2">تاريخ اليوم</label>
                    <input type="date" id="f_date" class="input-style">
                    <label class="text-xs font-bold text-slate-400 mr-2">اختيار الموظف</label>
                    <select id="f_user_select" class="input-style"></select>
                    <label class="text-xs font-bold text-slate-400 mr-2">إضافة واصل جديد (+)</label>
                    <input type="number" id="f_confirm_val" class="input-style" placeholder="مثال: 5">
                </div>
                <button onclick="submitFollowupReport()" class="w-full grad-purple text-white py-4 rounded-xl font-black shadow-lg">إرسال التحديث</button>
            </div>
        </main>
    </div>

    <script>
        const _SB_URL = 'https://iqagigpqwwtvriqvlfbv.supabase.co';
        const _SB_KEY = 'sb_publishable_5xbaPlWHgjeeaIwceEFRrQ_d9aZ6Zax';
        const sb = supabase.createClient(_SB_URL, _SB_KEY);

        let currentUser = null;

        // التحقق عند تحميل الصفحة
        window.onload = function() {
            const session = localStorage.getItem('user_session');
            
            if (!session) {
                window.location.href = 'index.html'; 
                return;
            }

            currentUser = JSON.parse(session);
            
            // سطر الأمان: إخفاء شاشة التحميل بعد التأكد
            document.getElementById('loader').classList.add('hidden');

            // منطق التوجيه حسب البيانات في 'user_session'
            // صفحة تسجيل الدخول تضع القيمة في 'role' أو 'user_job_role'
            const userRole = currentUser.user_job_role || currentUser.role;

            if (userRole === 'ردود') {
                initResponder();
            } else if (userRole === 'متابعة') {
                initFollowup();
            } else {
                // إذا دخل مدير أو مروج لهذه الصفحة بالخطأ
                Swal.fire('تنبيه', 'سيتم توجيهك لصفحتك المخصصة', 'info').then(() => {
                    if(userRole === 'مدير') window.location.href = 'admin.html';
                    else if(userRole === 'مروج') window.location.href = 'promoter.html';
                    else logout();
                });
            }
        };

        function logout() {
            localStorage.removeItem('user_session');
            window.location.href = 'index.html';
        }

        async function initResponder() {
            document.getElementById('responder_screen').classList.remove('hidden');
            document.getElementById('r_name').innerText = currentUser.username;
            document.getElementById('r_code').innerText = `كود: ${currentUser.employee_code || '---'}`;
            document.getElementById('r_team').innerText = `تيم: ${currentUser.team || 'عام'}`;
            document.getElementById('r_date').value = new Date().toISOString().split('T')[0];
            loadResponderStats();
        }

        async function loadResponderStats() {
            const startOfMonth = new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString().split('T')[0];
            const { data: reports } = await sb.from('bookings_reports').select('*').eq('employee_username', currentUser.username).gte('report_date', startOfMonth);
            
            const totalB = reports?.reduce((s, r) => s + Number(r.bookings_count || 0), 0) || 0;
            const totalC = reports?.reduce((s, r) => s + Number(r.confirmed_count || 0), 0) || 0;

            document.getElementById('r_salary').innerText = currentUser.salary || 0;
            document.getElementById('r_total_book').innerText = totalB;
            document.getElementById('r_total_confirm').innerText = totalC;
        }

        async function submitResponderReport() {
            const date = document.getElementById('r_date').value;
            const val = document.getElementById('r_book_val').value;
            if(!val) return;

            const { data: existing } = await sb.from('bookings_reports').select('*').eq('employee_username', currentUser.username).eq('report_date', date).single();

            if (existing) {
                await sb.from('bookings_reports').update({ bookings_count: val }).eq('id', existing.id);
                Swal.fire('تم', 'تعديل تقرير اليوم', 'success');
            } else {
                await sb.from('bookings_reports').insert([{ employee_username: currentUser.username, report_date: date, bookings_count: val, confirmed_count: 0, team: currentUser.team }]);
                Swal.fire('تم', 'حفظ تقرير اليوم', 'success');
            }
            loadResponderStats();
        }

        async function initFollowup() {
            document.getElementById('followup_screen').classList.remove('hidden');
            document.getElementById('f_name').innerText = currentUser.username;
            document.getElementById('f_date').value = new Date().toISOString().split('T')[0];
            const { data: users } = await sb.from('users').select('*').eq('user_job_role', 'ردود');
            document.getElementById('f_user_select').innerHTML = users.map(u => `<option value="${u.username}">${u.username} (${u.team || '---'})</option>`).join('');
        }

        async function submitFollowupReport() {
            const date = document.getElementById('f_date').value;
            const target = document.getElementById('f_user_select').value;
            const val = Number(document.getElementById('f_confirm_val').value);
            if(!val) return;

            const { data: ex } = await sb.from('bookings_reports').select('*').eq('employee_username', target).eq('report_date', date).single();

            if (ex) {
                const total = Number(ex.confirmed_count || 0) + val;
                await sb.from('bookings_reports').update({ confirmed_count: total }).eq('id', ex.id);
                Swal.fire('تم', `تحديث واصل ${target}`, 'success');
            } else {
                await sb.from('bookings_reports').insert([{ employee_username: target, report_date: date, confirmed_count: val, bookings_count: 0 }]);
                Swal.fire('تم', `فتح تقرير جديد لـ ${target}`, 'success');
            }
            document.getElementById('f_confirm_val').value = "";
        }
    </script>
</body>
</html>
