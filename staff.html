<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BUSINESS SYSTEM</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg-dark: #0f172a; --card-dark: #1e293b; --accent-blue: #38bdf8; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg-dark); color: white; margin: 0; }
        .premium-card { background: linear-gradient(145deg, #1e293b, #0f172a); border: 1px solid rgba(255,255,255,0.08); border-radius: 2rem; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); border-radius: 1.5rem; }
        .input-premium { background: #1e293b; border: 1px solid #334155; border-radius: 1.2rem; padding: 1rem; color: white; text-align: center; width: 100%; }
    </style>
</head>
<body>

    <div id="main_ui" class="opacity-100 transition-opacity duration-700">
        <header class="p-5">
            <div class="premium-card p-5 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <div id="user_avatar" class="w-12 h-12 rounded-xl bg-gradient-to-br from-blue-500 to-indigo-700 flex items-center justify-center font-black text-xl shadow-lg">I</div>
                    <div>
                        <h2 id="user_name" class="text-sm font-black italic">--</h2>
                        <span id="user_role_tag" class="text-blue-400 text-[8px] font-bold uppercase tracking-widest border border-blue-500/20 px-2 py-0.5 rounded mt-1 inline-block">--</span>
                    </div>
                </div>
                <button onclick="logout()" class="w-10 h-10 flex items-center justify-center rounded-full bg-red-500/10 text-red-400"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg></button>
            </div>
        </header>
        <div id="content_area" class="px-5 space-y-5 pb-10"></div>
    </div>

    <script>
        const sb = supabase.createClient('https://iqagigpqwwtvriqvlfbv.supabase.co', 'sb_publishable_5xbaPlWHgjeeaIwceEFRrQ_d9aZ6Zax');
        let u = JSON.parse(localStorage.getItem('user_session'));

        window.onload = async () => {
            if(!u) { window.location.href='index.html'; return; }
            document.getElementById('user_name').innerText = u.username;
            document.getElementById('user_role_tag').innerText = u.user_job_role;
            if(u.user_job_role === 'ردود') await initResponder();
            else await initFollowup();
        };

        async function initResponder() {
            const startM = new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString().split('T')[0];
            const { data: reports } = await sb.from('bookings_reports').select('*').eq('employee_username', u.username).gte('report_date', startM);
            const { data: bonus } = await sb.from('bonuses').select('*').eq('employee_username', u.username).gte('bonus_date', startM);
            const { data: penal } = await sb.from('penalties').select('*').eq('employee_username', u.username).gte('penalty_date', startM);

            const safeR = reports || [];
            // حل مشكلة أيام العمل: نحسب التواريخ الفريدة فقط للموظف
            const workingDays = new Set(safeR.map(r => r.report_date)).size;
            
            const totalC = safeR.reduce((s, r) => s + Number(r.confirmed_count || 0), 0);
            const totalB = safeR.reduce((s, r) => s + Number(r.bookings_count || 0), 0);
            const manualP = (penal || []).reduce((s, p) => s + Number(p.penalty_amount || 0), 0);
            
            renderUI(0, manualP, workingDays, totalB, totalC, 'blue', 'Action Center', 'saveDaily');
        }

        async function initFollowup() {
            const startM = new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString().split('T')[0];
            const { data: reports } = await sb.from('bookings_reports').select('report_date').gte('report_date', startM);
            const { data: penal } = await sb.from('penalties').select('*').eq('employee_username', u.username).gte('penalty_date', startM);

            // حل مشكلة أيام عمل المتابع: يحسب فقط الأيام التي سجل فيها بيانات فعلياً
            const workingDays = new Set((reports || []).map(r => r.report_date)).size;
            const manualP = (penal || []).reduce((s, p) => s + Number(p.penalty_amount || 0), 0);

            renderUI(0, manualP, workingDays, null, null, 'emerald', 'Follow-up Control', 'saveFollowup');
            loadResponderList();
        }

        function renderUI(points, penalties, days, mB, mC, color, title, btnFunc) {
            const today = new Date().toISOString().split('T')[0];
            const isFollow = !mB;
            document.getElementById('content_area').innerHTML = `
                <div class="premium-card p-6">
                    <div class="flex justify-between items-center px-2 mb-4">
                        <div class="text-center"><p class="text-[9px] text-slate-500">الراتب</p><p class="text-md font-black italic">${u.salary}</p></div>
                        <div class="text-center"><p class="text-[9px] text-red-500 font-bold">الخصومات</p><p class="text-md font-black text-red-400">-${penalties}</p></div>
                        <div class="text-center"><p class="text-[9px] text-slate-500">أيام العمل</p><p class="text-md font-black italic">${days}</p></div>
                    </div>
                    <div class="flex justify-center"><div class="w-20 h-20 rounded-full border-2 border-blue-500/20 flex flex-col items-center justify-center"><span class="text-2xl font-black text-amber-400">0</span><span class="text-[8px] text-slate-500 uppercase">POINTS</span></div></div>
                </div>

                ${!isFollow ? `
                <div class="grid grid-cols-2 gap-3">
                    <div class="glass p-4 text-center"><p class="text-[9px] text-slate-400 mb-1">حجوزات اليوم المختارة</p><p id="d_b" class="text-xl font-black text-sky-400">0</p></div>
                    <div class="glass p-4 text-center"><p class="text-[9px] text-slate-400 mb-1">واصل اليوم المختارة</p><p id="d_c" class="text-xl font-black text-emerald-400">0</p></div>
                    <div class="glass p-4 text-center"><p class="text-[9px] text-slate-400 mb-1">حجوزات الشهر</p><p class="text-xl font-black text-indigo-400">${mB}</p></div>
                    <div class="glass p-4 text-center"><p class="text-[9px] text-slate-400 mb-1">واصل الشهر</p><p class="text-xl font-black text-amber-400">${mC}</p></div>
                </div>` : ''}

                <div class="premium-card p-6 space-y-4">
                    <h3 class="text-[10px] font-black border-r-4 border-${color}-500 pr-3 italic text-slate-400">${title}</h3>
                    <div class="w-full text-center"><label class="text-[10px] text-slate-500 mb-1 block">تاريخ التقرير</label>
                    <input type="date" id="target_date" value="${today}" class="input-premium font-bold text-sm"></div>
                    <div id="follow_extra" class="w-full"></div>
                    <div class="w-full text-center"><label class="text-[10px] text-slate-500 mb-1 block">العدد</label>
                    <input type="number" id="target_val" class="input-premium text-2xl font-black" placeholder="0"></div>
                    <button onclick="${btnFunc}()" class="w-full py-4 rounded-2xl bg-${color}-600 text-white font-black text-sm uppercase italic shadow-lg">حفظ البيانات الآن</button>
                </div>`;
        }

        async function loadResponderList() {
            const { data } = await sb.from('users').select('username').eq('user_job_role', 'ردود');
            if(data) document.getElementById('follow_extra').innerHTML = `<select id="target_user" class="input-premium mt-2 text-xs font-bold"><option value="">-- اختر الموظف --</option>${data.map(u => `<option value="${u.username}">${u.username}</option>`).join('')}</select>`;
        }

        async function saveDaily() {
            const v = document.getElementById('target_val').value;
            const d = document.getElementById('target_date').value;
            if(!v || !d) return;
            await sb.from('bookings_reports').upsert([{ employee_username: u.username, report_date: d, bookings_count: v }], { onConflict: 'employee_username,report_date' });
            location.reload();
        }

        async function saveFollowup() {
            const target = document.getElementById('target_user').value;
            const addVal = Number(document.getElementById('target_val').value);
            const d = document.getElementById('target_date').value;
            if(!target || !addVal || !d) return;
            const { data: curr } = await sb.from('bookings_reports').select('confirmed_count').eq('employee_username', target).eq('report_date', d).single();
            const newVal = (curr ? Number(curr.confirmed_count || 0) : 0) + addVal;
            await sb.from('bookings_reports').upsert([{ employee_username: target, report_date: d, confirmed_count: newVal }], { onConflict: 'employee_username,report_date' });
            location.reload();
        }

        function logout() { localStorage.clear(); window.location.href='index.html'; }
    </script>
</body>
</html>
