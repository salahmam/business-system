<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الموظف | BUSINESS SYSTEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f0f4f8; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .stat-card { border-right: 4px solid #4f46e5; }
    </style>
</head>
<body class="pb-10">

    <header class="bg-indigo-900 text-white p-5 sticky top-0 z-50 shadow-2xl rounded-b-[2rem] flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div id="user_initial" class="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center font-black text-xl">..</div>
            <div>
                <h2 id="u_name_display" class="font-bold text-lg">تحميل...</h2>
                <p id="u_role_display" class="text-[10px] text-indigo-300 font-bold uppercase"></p>
            </div>
        </div>
        <button onclick="localStorage.clear(); location.href='index.html'" class="bg-white/10 p-3 rounded-2xl border border-white/10">Logout</button>
    </header>

    <div class="p-4 max-w-lg mx-auto space-y-6 pt-6">
        <div class="grid grid-cols-2 gap-3 text-right">
            <div class="glass p-4 rounded-[2rem] stat-card shadow-sm">
                <span class="text-[10px] text-slate-400 font-bold block">الراتب</span>
                <span id="stat_salary" class="text-lg font-black text-slate-800">0</span>
            </div>
            <div class="glass p-4 rounded-[2rem] stat-card shadow-sm border-amber-400">
                <span class="text-[10px] text-slate-400 font-bold block">النقاط (⭐)</span>
                <span id="stat_bonus" class="text-lg font-black text-amber-600">0</span>
            </div>
            <div class="glass p-4 rounded-[2rem] stat-card shadow-sm border-emerald-400">
                <span class="text-[10px] text-slate-400 font-bold block">طلباتي</span>
                <span id="stat_total_books" class="text-lg font-black text-emerald-600">0</span>
            </div>
            <div class="glass p-4 rounded-[2rem] stat-card shadow-sm border-blue-400">
                <span class="text-[10px] text-slate-400 font-bold block">واصل</span>
                <span id="stat_confirmed" class="text-lg font-black text-blue-600">0</span>
            </div>
        </div>

        <div class="glass p-8 rounded-[3rem] shadow-xl space-y-6">
            <h3 id="ttl" class="text-xl font-black text-slate-800 text-center">إرسال تقرير اليوم</h3>
            <div class="space-y-4">
                <input type="date" id="dt" class="w-full p-4 bg-indigo-50 border rounded-2xl text-center font-bold outline-none">
                <div id="fol" class="hidden">
                    <select id="slst" class="w-full p-4 bg-amber-50 border rounded-2xl font-bold text-center appearance-none"></select>
                </div>
                <div>
                    <label id="cnt_label" class="text-[10px] font-black text-indigo-500 mr-2 uppercase block text-right">العدد المنجز</label>
                    <input type="number" id="cnt" placeholder="0" class="w-full p-8 bg-slate-50 border-2 border-dashed border-indigo-200 rounded-[2.5rem] text-center text-5xl font-black text-indigo-600 outline-none">
                </div>
                <button onclick="send()" id="btn_send" class="w-full bg-indigo-600 text-white py-5 rounded-[2rem] font-black text-lg shadow-xl active:scale-95 transition-all">تأكيد وإرسال ✅</button>
            </div>
            <p id="msg" class="text-center font-bold text-sm p-4 rounded-2xl hidden"></p>
        </div>
    </div>

    <script>
        const sb = supabase.createClient('https://iqagigpqwwtvriqvlfbv.supabase.co', 'sb_publishable_5xbaPlWHgjeeaIwceEFRrQ_d9aZ6Zax');
        const u = JSON.parse(localStorage.getItem('user_session'));

        window.onload = async () => {
            if(!u) { location.href = 'index.html'; return; }
            document.getElementById('user_initial').innerText = u.username.charAt(0).toUpperCase();
            document.getElementById('u_name_display').innerText = u.username;
            document.getElementById('u_role_display').innerText = `${u.role} | ${u.employee_code}`;
            document.getElementById('dt').valueAsDate = new Date();

            if(u.role === 'متابعة') {
                document.getElementById('fol').classList.remove('hidden');
                document.getElementById('ttl').innerText = "تأكيد الواصل للموظفين";
                document.getElementById('cnt_label').innerText = "عدد الحجوزات الواصلة";
                const { data } = await sb.from('users').select('username, employee_code').eq('role','ردود');
                const selectList = document.getElementById('slst');
                data.forEach(s => { let o = document.createElement('option'); o.value = s.username; o.text = `${s.username} (${s.employee_code})`; selectList.add(o); });
            }
            loadStats();
        };

        async function loadStats() {
            document.getElementById('stat_salary').innerText = `${u.salary || 0} د.ع`;
            const { data: reports } = await sb.from('bookings_reports').select('*').eq('employee_username', u.username);
            const { data: manualAdj } = await sb.from('adjustments').select('amount').eq('user_id', u.id).eq('type', 'bonus');

            let bTotal = 0, cTotal = 0, points = 0;
            if(reports) reports.forEach(r => {
                bTotal += (r.bookings_count || 0); cTotal += (r.confirmed_count || 0);
                if(r.bookings_count >= 35) points += 2; else if(r.bookings_count >= 25) points += 1;
            });
            if(manualAdj) manualAdj.forEach(a => points += Number(a.amount || 0));

            document.getElementById('stat_total_books').innerText = bTotal;
            document.getElementById('stat_confirmed').innerText = cTotal;
            document.getElementById('stat_bonus').innerText = points + " ⭐";
        }

        async function send() {
            const c = parseInt(document.getElementById('cnt').value);
            const d = document.getElementById('dt').value;
            const targetUser = (u.role === 'متابعة') ? document.getElementById('slst').value : u.username;
            if(isNaN(c)) return;

            const reportData = { employee_username: targetUser, report_date: d };
            if(u.role === 'ردود') reportData.bookings_count = c;
            else if(u.role === 'متابعة') reportData.confirmed_count = c;

            const { error } = await sb.from('bookings_reports').upsert([reportData], { onConflict: 'employee_username,report_date' });
            
            const msgBox = document.getElementById('msg');
            msgBox.classList.remove('hidden');
            if(!error) {
                msgBox.innerText = "✅ تم الحفظ بنجاح";
                msgBox.className = "text-center font-bold text-emerald-600 bg-emerald-50 p-4 rounded-2xl";
                loadStats();
            } else {
                msgBox.innerText = "❌ خطأ في الإرسال";
                msgBox.className = "text-center font-bold text-red-600 bg-red-50 p-4 rounded-2xl";
            }
        }
    </script>
</body>
</html>
