<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الموظف | نظام الحجوزات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Tajawal', sans-serif; }</style>
</head>
<body class="bg-slate-50 min-h-screen">
    <header class="bg-indigo-600 text-white p-4 flex justify-between items-center shadow-lg">
        <div><p id="u_name" class="font-bold text-sm"></p><p id="u_shift" class="text-[10px] opacity-70"></p></div>
        <button onclick="localStorage.clear(); window.location.href='index.html'" class="text-xs bg-indigo-800 px-2 py-1 rounded">خروج</button>
    </header>

    <div class="p-4 max-w-lg mx-auto space-y-4">
        <div class="bg-white p-4 rounded-2xl shadow-sm border grid grid-cols-2 text-center divide-x divide-x-reverse">
            <div><span class="block text-[10px] text-gray-400">أيام العمل</span><span id="days" class="text-xl font-bold text-indigo-600">0</span></div>
            <div><span class="block text-[10px] text-gray-400">المكافآت</span><span id="bonus" class="text-xl font-bold text-green-600">0</span></div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm border space-y-4">
            <h3 id="title" class="font-bold text-gray-700 border-r-4 border-indigo-600 pr-2">إرسال تقرير اليوم</h3>
            <input type="date" id="r_date" class="w-full p-3 bg-gray-50 border rounded-xl text-center font-bold">
            
            <div id="f_list_div" class="hidden">
                <label class="text-xs text-gray-400 mr-1">اختر الموظف (للمتابعة):</label>
                <select id="staff_list" class="w-full p-3 bg-gray-50 border rounded-xl font-bold"></select>
            </div>

            <input type="number" id="r_count" placeholder="العدد" class="w-full p-4 bg-gray-50 border rounded-xl text-center text-2xl font-bold text-indigo-600">
            <button onclick="send()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold">إرسال الآن ✅</button>
            <p id="msg" class="text-center text-xs font-bold hidden"></p>
        </div>
    </div>

    <script>
        const SB_URL = 'https://iqagigpqwwtvriqvlfbv.supabase.co';
        const SB_KEY = 'sb_publishable_5xbaPlWHgjeeaIwceEFRrQ_d9aZ6Zax';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);
        const user = JSON.parse(localStorage.getItem('user_session'));

        window.onload = async () => {
            if(!user) window.location.href='index.html';
            document.getElementById('u_name').innerText = user.username;
            document.getElementById('u_shift').innerText = `تيم ${user.team || '--'} | ${user.shift || '--'}`;
            document.getElementById('r_date').valueAsDate = new Date();
            if(user.role === 'متابعة') {
                document.getElementById('f_list_div').classList.remove('hidden');
                document.getElementById('title').innerText = "تأكيد الواصل";
                const { data } = await _supabase.from('users').select('username').eq('role', 'ردود');
                data.forEach(s => { let o = document.createElement('option'); o.value=s.username; o.text=s.username; document.getElementById('staff_list').add(o); });
            }
            loadStats();
        };

        async function send() {
            const count = parseInt(document.getElementById('r_count').value);
            const date = document.getElementById('r_date').value;
            const target = (user.role === 'متابعة') ? document.getElementById('staff_list').value : user.username;

            let pts = 0;
            if(user.role === 'ردود') { if(count > 35) pts=2; else if(count>=25) pts=1; }

            const d = { employee_username: target, report_date: date };
            if(user.role === 'ردود') { d.bookings_count = count; d.bonus_points = pts; }
            else { d.confirmed_count = count; }

            const { error } = await _supabase.from('bookings_reports').upsert([d], { onConflict: 'employee_username,report_date' });
            const msg = document.getElementById('msg');
            msg.classList.remove('hidden');
            if(error) { msg.innerText = "❌ خطأ"; msg.className="text-red-500 text-center text-xs font-bold"; }
            else { msg.innerText = "✅ تم الحفظ"; msg.className="text-green-500 text-center text-xs font-bold"; loadStats(); }
        }

        async function loadStats() {
            const { data } = await _supabase.from('bookings_reports').select('*').eq('employee_username', user.username);
            document.getElementById('days').innerText = data.length;
            document.getElementById('bonus').innerText = data.reduce((s, r) => s + (r.bonus_points || 0), 0);
        }
    </script>
</body>
</html>
