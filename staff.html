<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام الموظفين - BUSINESS SYSTEM</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f1f5f9; }
        .stat-card { background: white; border-radius: 1.5rem; padding: 1.25rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .grad-blue { background: linear-gradient(135deg, #2563eb, #1d4ed8); }
        .grad-purple { background: linear-gradient(135deg, #7c3aed, #5b21b6); }
        .input-style { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 1rem; padding: 1rem; width: 100%; font-weight: bold; outline: none; transition: 0.3s; }
        .input-style:focus { border-color: #2563eb; background: white; }
        #loader { position: fixed; inset: 0; background: white; z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #2563eb; border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p class="mt-4 font-bold text-slate-600 italic">BUSINESS SYSTEM</p>
    </div>

    <div id="main_content" class="hidden min-h-screen pb-10">
        <div id="ui_placeholder"></div>
    </div>

    <script>
        const _SB_URL = 'https://iqagigpqwwtvriqvlfbv.supabase.co';
        const _SB_KEY = 'sb_publishable_5xbaPlWHgjeeaIwceEFRrQ_d9aZ6Zax';
        const sb = supabase.createClient(_SB_URL, _SB_KEY);

        let currentUser = null;

        // وظيفة التشغيل الفوري
        (async function init() {
            try {
                const session = localStorage.getItem('user_session');
                if (!session) { window.location.href = 'index.html'; return; }

                currentUser = JSON.parse(session);
                const role = currentUser.user_job_role || currentUser.role;

                if (role === 'ردود') {
                    await renderResponder();
                } else if (role === 'متابعة') {
                    await renderFollowup();
                } else {
                    window.location.href = 'index.html';
                }

                document.getElementById('loader').style.display = 'none';
                document.getElementById('main_content').classList.remove('hidden');
            } catch (e) {
                console.error(e);
                alert("حدث خطأ في تحميل البيانات");
            }
        })();

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        // --- قسم الردود (التفاصيل الكاملة) ---
        async function renderResponder() {
            // جلب إحصائيات الشهر
            const startOfMonth = new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString().split('T')[0];
            
            // 1. جلب الحجوزات والواصل
            const { data: reports } = await sb.from('bookings_reports')
                .select('*')
                .eq('employee_username', currentUser.username)
                .gte('report_date', startOfMonth);

            const totalBookings = reports?.reduce((acc, curr) => acc + Number(curr.bookings_count || 0), 0) || 0;
            const totalConfirmed = reports?.reduce((acc, curr) => acc + Number(curr.confirmed_count || 0), 0) || 0;

            // 2. جلب المكافآت
            const { data: bonuses } = await sb.from('bonuses')
                .select('amount')
                .eq('username', currentUser.username)
                .gte('created_at', startOfMonth);
            const totalBonuses = bonuses?.reduce((acc, curr) => acc + Number(curr.amount || 0), 0) || 0;

            document.getElementById('ui_placeholder').innerHTML = `
                <header class="grad-blue text-white p-8 rounded-b-[3rem] shadow-xl text-center space-y-3">
                    <div class="flex justify-between items-center">
                        <button onclick="logout()" class="bg-white/20 px-3 py-1 rounded-lg text-xs font-bold">خروج</button>
                        <span class="font-black italic text-lg text-white/80">STAFF PANEL</span>
                        <div class="w-10"></div>
                    </div>
                    <div>
                        <h2 class="text-2xl font-black">${currentUser.username}</h2>
                        <div class="flex justify-center gap-2 mt-2">
                            <span class="bg-black/20 px-3 py-1 rounded-full text-[10px] font-bold">كود: ${currentUser.employee_code || '---'}</span>
                            <span class="bg-black/20 px-3 py-1 rounded-full text-[10px] font-bold">تيم: ${currentUser.team || 'عام'}</span>
                        </div>
                    </div>
                </header>

                <main class="px-4 -mt-8 space-y-4">
                    <div class="grid grid-cols-2 gap-3">
                        <div class="stat-card">
                            <p class="text-[10px] font-bold text-slate-400 mb-1">الراتب الأساسي</p>
                            <p class="text-xl font-black text-slate-800">${currentUser.salary || 0} <span class="text-[10px]">IQD</span></p>
                        </div>
                        <div class="stat-card">
                            <p class="text-[10px] font-bold text-slate-400 mb-1">مكافآت الشهر</p>
                            <p class="text-xl font-black text-emerald-600">${totalBonuses} <span class="text-[10px]">IQD</span></p>
                        </div>
                    </div>

                    <div class="stat-card flex justify-around py-6 text-center shadow-lg border-blue-100">
                        <div>
                            <p class="text-[10px] text-slate-400 font-bold uppercase mb-1">حجوزات الشهر</p>
                            <p class="text-3xl font-black text-blue-600">${totalBookings}</p>
                        </div>
                        <div class="w-[1px] bg-slate-100 h-12"></div>
                        <div>
                            <p class="text-[10px] text-slate-400 font-bold uppercase mb-1">واصل الشهر</p>
                            <p class="text-3xl font-black text-emerald-600">${totalConfirmed}</p>
                        </div>
                    </div>

                    <div class="stat-card space-y-4">
                        <div class="flex items-center gap-2 border-b pb-2">
                            <div class="w-2 h-2 bg-blue-600 rounded-full"></div>
                            <h3 class="font-black text-sm text-slate-600">إرسال تقرير الحجوزات اليومي</h3>
                        </div>
                        <div class="space-y-3">
                            <div>
                                <label class="text-[10px] font-bold text-slate-400 mr-2">تاريخ التقرير</label>
                                <input type="date" id="r_date" class="input-style" value="${new Date().toISOString().split('T')[0]}">
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-slate-400 mr-2">عدد الحجوزات</label>
                                <input type="number" id="r_book_val" class="input-style" placeholder="أدخل الرقم هنا...">
                            </div>
                            <button onclick="submitResponderReport()" class="w-full grad-blue text-white py-4 rounded-xl font-black shadow-lg active:scale-95 transition-all">حفظ وإرسال التقرير</button>
                        </div>
                    </div>
                </main>
            `;
        }

        // --- قسم المتابعة (التفاصيل الكاملة) ---
        async function renderFollowup() {
            document.getElementById('ui_placeholder').innerHTML = `
                <header class="grad-purple text-white p-8 rounded-b-[3rem] shadow-xl text-center space-y-3">
                    <div class="flex justify-between items-center">
                        <button onclick="logout()" class="bg-white/20 px-3 py-1 rounded-lg text-xs font-bold">خروج</button>
                        <span class="font-black italic text-lg opacity-80">FOLLOW-UP PANEL</span>
                        <div class="w-10"></div>
                    </div>
                    <h2 class="text-2xl font-black">${currentUser.username}</h2>
                </header>

                <main class="px-4 -mt-8 space-y-4">
                    <div class="stat-card space-y-4 shadow-xl">
                        <div class="flex items-center gap-2 border-b pb-2">
                            <div class="w-2 h-2 bg-purple-600 rounded-full"></div>
                            <h3 class="font-black text-sm text-slate-600">تحديث واصل الموظفين (تراكمي)</h3>
                        </div>
                        <div class="space-y-4 text-right">
                            <div>
                                <label class="text-[10px] font-bold text-slate-400 mr-2">تاريخ العملية</label>
                                <input type="date" id="f_date" class="input-style" value="${new Date().toISOString().split('T')[0]}">
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-slate-400 mr-2">اختيار الموظف</label>
                                <select id="f_user_select" class="input-style text-right">
                                    <option>جاري تحميل الموظفين...</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-slate-400 mr-2">إضافة واصل جديد (+)</label>
                                <input type="number" id="f_confirm_val" class="input-style" placeholder="مثال: 5">
                            </div>
                            <button onclick="submitFollowupReport()" class="w-full grad-purple text-white py-4 rounded-xl font-black shadow-lg active:scale-95 transition-all">تحديث المجموع</button>
                        </div>
                    </div>
                </main>
            `;

            // تحميل موظفي الردود فقط
            const { data: users } = await sb.from('users').select('username, team').eq('user_job_role', 'ردود');
            if (users) {
                document.getElementById('f_user_select').innerHTML = users.map(u => 
                    `<option value="${u.username}">${u.username} (${u.team || 'بدون تيم'})</option>`
                ).join('');
            }
        }

        // --- وظائف الحفظ ---
        async function submitResponderReport() {
            const date = document.getElementById('r_date').value;
            const val = document.getElementById('r_book_val').value;
            if(!val) { Swal.fire('تنبيه', 'يرجى إدخال عدد الحجوزات', 'warning'); return; }

            Swal.fire({ title: 'جاري الحفظ...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); }});

            const { error } = await sb.from('bookings_reports').upsert([{ 
                employee_username: currentUser.username, 
                report_date: date, 
                bookings_count: val, 
                team: currentUser.team 
            }], { onConflict: 'employee_username,report_date' });

            if (!error) {
                Swal.fire('تم بنجاح', 'تم تسجيل تقريرك اليومي', 'success').then(() => renderResponder());
            } else {
                Swal.fire('خطأ', 'فشل في الاتصال بقاعدة البيانات', 'error');
            }
        }

        async function submitFollowupReport() {
            const date = document.getElementById('f_date').value;
            const target = document.getElementById('f_user_select').value;
            const val = Number(document.getElementById('f_confirm_val').value);
            if(!val) { Swal.fire('تنبيه', 'يرجى إدخال رقم الواصل', 'warning'); return; }

            Swal.fire({ title: 'جاري التحديث...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); }});

            // جلب القيمة القديمة أولاً لعمل إضافة تراكمية
            const { data: existing } = await sb.from('bookings_reports')
                .select('confirmed_count')
                .eq('employee_username', target)
                .eq('report_date', date)
                .single();

            const newTotal = (existing ? Number(existing.confirmed_count) : 0) + val;

            const { error } = await sb.from('bookings_reports').upsert([{ 
                employee_username: target, 
                report_date: date, 
                confirmed_count: newTotal 
            }], { onConflict: 'employee_username,report_date' });

            if (!error) {
                Swal.fire('تم التحديث', `إجمالي الواصل لـ ${target} أصبح: ${newTotal}`, 'success');
                document.getElementById('f_confirm_val').value = "";
            } else {
                Swal.fire('خطأ', 'فشل في تحديث البيانات', 'error');
            }
        }
    </script>
</body>
</html>
