<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الموظف | BUSINESS SYSTEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #f8fafc; color: #1e293b; overflow-x: hidden; }
        
        .glass-card { 
            background: white; 
            border-radius: 2.5rem; 
            box-shadow: 0 15px 35px -5px rgba(0,0,0,0.05); 
            border: 1px solid #e2e8f0;
            transition: all 0.4s ease;
        }
        
        .stat-box { border-right: 5px solid; transition: all 0.3s ease; }
        .stat-box:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeIn 0.6s ease forwards; }

        input, select { transition: all 0.3s ease; text-align: center; }
        .date-container { display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body class="pb-10">

    <header class="bg-slate-900 text-white p-6 sticky top-0 z-50 shadow-2xl rounded-b-[3rem] flex justify-between items-center">
        <div class="flex items-center gap-4">
            <div id="user_initial" class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center font-black text-xl shadow-lg border border-white/20">..</div>
            <div class="text-right">
                <h2 id="u_name_display" class="font-black text-lg leading-tight">تحميل...</h2>
                <p id="u_role_display" class="text-[10px] text-blue-400 font-bold uppercase"></p>
            </div>
        </div>
        <button onclick="localStorage.clear(); location.href='index.html'" class="bg-red-500/10 hover:bg-red-500 text-red-500 hover:text-white px-6 py-2 rounded-2xl border border-red-500/20 transition-all font-black text-sm active:scale-90">
            خروج
        </button>
    </header>

    <div class="p-5 max-w-lg mx-auto space-y-6 pt-8 animate-in">
        
        <div id="stats_grid" class="grid grid-cols-2 gap-4">
            <div class="glass-card p-4 stat-box border-blue-500">
                <span class="text-[10px] text-slate-400 font-black block mb-1">الراتب</span>
                <span id="stat_salary" class="text-lg font-black text-slate-800">0</span>
            </div>
            <div class="glass-card p-4 stat-box border-amber-500">
                <span class="text-[10px] text-slate-400 font-black block mb-1">النقاط ⭐</span>
                <span id="stat_bonus" class="text-lg font-black text-amber-600">0</span>
            </div>
            <div id="box_total" class="glass-card p-4 stat-box border-emerald-500">
                <span class="text-[10px] text-slate-400 font-black block mb-1">طلباتي اليوم</span>
                <span id="stat_total_books" class="text-lg font-black text-emerald-600">0</span>
            </div>
            <div id="box_confirmed" class="glass-card p-4 stat-box border-indigo-500">
                <span class="text-[10px] text-slate-400 font-black block mb-1">واصل اليوم</span>
                <span id="stat_confirmed" class="text-lg font-black text-indigo-600">0</span>
            </div>
            <div id="box_overall_confirmed" class="glass-card p-4 stat-box border-purple-500 col-span-2 bg-purple-50/20">
                <span class="text-[10px] text-slate-400 font-black block mb-1 uppercase">إجمالي الواصل (تراكمي)</span>
                <span id="stat_overall_confirmed" class="text-2xl font-black text-purple-700">0</span>
            </div>

            <div class="glass-card p-5 stat-box border-red-500 col-span-2 flex justify-between items-center bg-red-50/30">
                <div>
                    <span class="text-[10px] text-slate-400 font-black block">الخصومات المالية</span>
                    <span id="stat_abs" class="text-xl font-black text-red-600">0 د.ع</span>
                </div>
                <span class="text-2xl animate-pulse">💸</span>
            </div>
        </div>

        <div class="glass-card p-8 space-y-8 relative overflow-hidden border-t-8 border-t-blue-600">
            
            <div class="space-y-2 text-center">
                <label class="text-[11px] font-black text-slate-400 block uppercase tracking-widest">تاريخ التقرير</label>
                <div class="date-container">
                    <input type="date" id="dt" onchange="loadStats()" class="w-full max-w-[200px] p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold text-slate-700 outline-none focus:border-blue-500 focus:bg-white shadow-inner">
                </div>
            </div>

            <div id="fol" class="hidden space-y-2">
                <label class="text-[11px] font-black text-amber-600 block text-center uppercase">اختر الموظف المستهدف:</label>
                <select id="slst" class="w-full p-4 bg-amber-50 border-2 border-amber-100 rounded-2xl font-black text-center text-amber-800 outline-none shadow-sm cursor-pointer"></select>
            </div>

            <div class="space-y-4">
                <label id="cnt_label" class="text-xs font-black text-blue-600 block text-center uppercase tracking-widest">الكمية المنجزة</label>
                <div class="relative group">
                    <input type="number" id="cnt" placeholder="0" class="w-full bg-slate-50 p-10 rounded-[2.5rem] text-center text-7xl font-black text-slate-800 outline-none border-2 border-dashed border-slate-200 focus:border-blue-300 focus:bg-white transition-all placeholder:opacity-10">
                </div>
            </div>

            <button onclick="send()" id="btn_send" class="w-full bg-slate-900 text-white py-6 rounded-[2rem] font-black text-xl shadow-xl hover:bg-blue-600 active:scale-95 transition-all flex items-center justify-center gap-3">
                إرسال البيانات ✅
            </button>
            
            <p id="msg" class="text-center font-bold text-sm p-4 rounded-2xl hidden transition-all duration-500"></p>
        </div>
    </div>

    <script>
        const sb = supabase.createClient('https://iqagigpqwwtvriqvlfbv.supabase.co', 'sb_publishable_5xbaPlWHgjeeaIwceEFRrQ_d9aZ6Zax');
        const u = JSON.parse(localStorage.getItem('user_session'));

        window.onload = async () => {
            if(!u) { location.href = 'index.html'; return; }
            document.getElementById('user_initial').innerText = u.username.charAt(0).toUpperCase();
            document.getElementById('u_name_display').innerText = u.username;
            document.getElementById('u_role_display').innerText = `${u.role} | ${u.employee_code}`;
            document.getElementById('dt').valueAsDate = new Date();

            if(u.role === 'متابعة') {
                document.getElementById('box_total').classList.add('hidden');
                document.getElementById('box_confirmed').classList.add('hidden');
                document.getElementById('box_overall_confirmed').classList.add('hidden');
                
                document.getElementById('fol').classList.remove('hidden');
                document.getElementById('cnt_label').innerText = "عدد الواصل";
                
                const { data } = await sb.from('users').select('username, employee_code').eq('role','ردود');
                const selectList = document.getElementById('slst');
                data.forEach(s => { 
                    let o = document.createElement('option'); o.value = s.username; 
                    o.text = `👤 ${s.username} (${s.employee_code})`; 
                    selectList.add(o); 
                });
            }
            loadStats();
        };

        async function loadStats() {
            const selectedDate = document.getElementById('dt').value;
            const { data: reports } = await sb.from('bookings_reports').select('*').eq('employee_username', u.username);
            const { data: adjData } = await sb.from('adjustments').select('amount, type').eq('user_id', u.id);

            let points = 0, totalAbs = 0;
            let todayBooks = 0, todayConfirmed = 0, overallConfirmed = 0;

            if(reports) reports.forEach(r => {
                const confirmed = Number(r.confirmed_count || 0);
                
                // حساب الواصل الكلي التراكمي
                overallConfirmed += confirmed;

                // احتساب المكافأة بناءً على الواصل (15=1⭐, 25=2⭐)
                if(confirmed >= 25) {
                    points += 2;
                } else if(confirmed >= 15) {
                    points += 1;
                }

                // بيانات اليوم المحدد
                if(r.report_date === selectedDate) {
                    todayBooks = (r.bookings_count || 0);
                    todayConfirmed = confirmed;
                }
            });

            if(adjData) adjData.forEach(a => { if(a.type === 'bonus') points += Number(a.amount); else totalAbs += Number(a.amount); });

            document.getElementById('stat_salary').innerText = `${u.salary || 0} د.ع`;
            if(u.role !== 'متابعة') {
                document.getElementById('stat_total_books').innerText = todayBooks;
                document.getElementById('stat_confirmed').innerText = todayConfirmed;
                document.getElementById('stat_overall_confirmed').innerText = overallConfirmed;
            }
            document.getElementById('stat_bonus').innerText = points + " ⭐";
            document.getElementById('stat_abs').innerText = totalAbs.toLocaleString() + " د.ع";
        }

        async function send() {
            const btn = document.getElementById('btn_send');
            const c = parseInt(document.getElementById('cnt').value);
            const d = document.getElementById('dt').value;
            const targetUser = (u.role === 'متابعة') ? document.getElementById('slst').value : u.username;
            
            if(isNaN(c) || c < 0) return;
            btn.disabled = true; btn.innerText = "جاري الحفظ والجمع...";

            const { data: existing } = await sb.from('bookings_reports')
                .select('*')
                .eq('employee_username', targetUser)
                .eq('report_date', d)
                .single();
            
            let reportData = { employee_username: targetUser, report_date: d };
            
            if(u.role === 'ردود') {
                const prevBooks = existing ? (existing.bookings_count || 0) : 0;
                reportData.bookings_count = prevBooks + c;
                reportData.confirmed_count = existing ? existing.confirmed_count : 0;
            } else {
                const prevConfirmed = existing ? (existing.confirmed_count || 0) : 0;
                reportData.confirmed_count = prevConfirmed + c;
                reportData.bookings_count = existing ? existing.bookings_count : 0;
            }

            const { error } = await sb.from('bookings_reports').upsert([reportData], { onConflict: 'employee_username,report_date' });
            
            const msgBox = document.getElementById('msg');
            msgBox.classList.remove('hidden');
            if(!error) {
                msgBox.innerText = `✅ تم إضافة ${c} بنجاح إلى سجلات اليوم`;
                msgBox.className = "text-center font-bold text-emerald-600 bg-emerald-50 p-4 rounded-2xl border border-emerald-100 animate-pulse";
                loadStats();
                document.getElementById('cnt').value = "";
            } else {
                msgBox.innerText = "❌ فشل التحديث، تأكد من الاتصال";
                msgBox.className = "text-center font-bold text-red-600 bg-red-50 p-4 rounded-2xl border border-red-100";
            }
            btn.disabled = false; btn.innerText = "إرسال البيانات ✅";
        }
    </script>
</body>
</html>
