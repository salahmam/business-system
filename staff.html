<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام الموظفين - BUSINESS SYSTEM</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f1f5f9; }
        .stat-card { background: white; border-radius: 1.5rem; padding: 1.25rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .grad-blue { background: linear-gradient(135deg, #2563eb, #1d4ed8); }
        .grad-purple { background: linear-gradient(135deg, #7c3aed, #5b21b6); }
        .input-style { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 1rem; padding: 1rem; width: 100%; font-weight: bold; outline: none; transition: 0.3s; }
    </style>
</head>
<body>

    <div id="app">
        <div id="loader" class="flex flex-col items-center justify-center h-screen">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mb-4"></div>
            <h2 class="text-xl font-black text-slate-700">جاري تحميل النظام...</h2>
        </div>
    </div>

    <script>
        const _SB_URL = 'https://iqagigpqwwtvriqvlfbv.supabase.co';
        const _SB_KEY = 'sb_publishable_5xbaPlWHgjeeaIwceEFRrQ_d9aZ6Zax';
        const sb = supabase.createClient(_SB_URL, _SB_KEY);

        let currentUser = null;

        window.onload = function() {
            const data = localStorage.getItem('user_session');
            if (!data) { window.location.href = 'index.html'; return; }

            currentUser = JSON.parse(data);
            // جلب الرتبة بمرونة (role أو user_job_role)
            const role = currentUser.user_job_role || currentUser.role;

            if (role === 'ردود') {
                renderResponderPage();
            } else if (role === 'متابعة') {
                renderFollowupPage();
            } else {
                Swal.fire('تنبيه', 'هذه الصفحة مخصصة لموظفي الردود والمتابعة فقط', 'warning').then(() => logout());
            }
        };

        function logout() {
            localStorage.removeItem('user_session');
            window.location.href = 'index.html';
        }

        // --- 1. واجهة الردود (الكاملة) ---
        async function renderResponderPage() {
            document.getElementById('app').innerHTML = `
                <div class="min-h-screen pb-10">
                    <header class="grad-blue text-white p-8 rounded-b-[3rem] shadow-xl text-center">
                        <div class="flex justify-between items-center mb-6">
                            <button onclick="logout()" class="bg-white/20 p-2 rounded-lg text-xs font-bold">خروج</button>
                            <span class="font-black text-lg">STAFF PANEL</span>
                            <div class="w-10"></div>
                        </div>
                        <h2 class="text-2xl font-black">${currentUser.username}</h2>
                        <div class="flex justify-center gap-3 text-[10px] mt-2 font-bold opacity-90">
                            <span class="bg-black/20 px-3 py-1 rounded-full">كود: ${currentUser.employee_code || '---'}</span>
                            <span class="bg-black/20 px-3 py-1 rounded-full">تيم: ${currentUser.team || 'عام'}</span>
                        </div>
                    </header>

                    <main class="px-4 -mt-8 space-y-4">
                        <div class="grid grid-cols-2 gap-3 text-center">
                            <div class="stat-card">
                                <p class="text-[10px] font-bold text-slate-400">الراتب</p>
                                <p class="text-xl font-black">${currentUser.salary || 0}</p>
                            </div>
                            <div class="stat-card">
                                <p class="text-[10px] font-bold text-slate-400">مكافآت</p>
                                <p id="r_bonus" class="text-xl font-black text-emerald-600">0</p>
                            </div>
                        </div>

                        <div class="stat-card flex justify-around py-6 text-center">
                            <div>
                                <p class="text-[10px] text-slate-400 font-bold uppercase">حجوزات الشهر</p>
                                <p id="r_total_book" class="text-2xl font-black text-blue-600">0</p>
                            </div>
                            <div>
                                <p class="text-[10px] text-slate-400 font-bold uppercase">واصل الشهر</p>
                                <p id="r_total_confirm" class="text-2xl font-black text-emerald-600">0</p>
                            </div>
                        </div>

                        <div class="bg-white rounded-3xl p-6 shadow-lg border border-slate-100 text-right">
                            <h3 class="font-black text-slate-700 mb-4 border-b pb-2">تقرير الحجوزات اليومي</h3>
                            <div class="space-y-3">
                                <input type="date" id="rep_date" class="input-style" value="${new Date().toISOString().split('T')[0]}">
                                <input type="number" id="rep_count" class="input-style" placeholder="أدخل عدد الحجوزات">
                                <button onclick="saveResponderReport()" class="w-full grad-blue text-white py-4 rounded-2xl font-black shadow-lg">حفظ التقرير</button>
                            </div>
                        </div>
                    </main>
                </div>
            `;
            loadResponderStats();
        }

        async function loadResponderStats() {
            const startOfMonth = new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString().split('T')[0];
            const { data: reports } = await sb.from('bookings_reports').select('*').eq('employee_username', currentUser.username).gte('report_date', startOfMonth);
            
            const totalBook = reports?.reduce((s, r) => s + Number(r.bookings_count || 0), 0) || 0;
            const totalConfirm = reports?.reduce((s, r) => s + Number(r.confirmed_count || 0), 0) || 0;

            document.getElementById('r_total_book').innerText = totalBook;
            document.getElementById('r_total_confirm').innerText = totalConfirm;
        }

        async function saveResponderReport() {
            const date = document.getElementById('rep_date').value;
            const count = document.getElementById('rep_count').value;
            if(!count) return;

            const { data: existing } = await sb.from('bookings_reports').select('*').eq('employee_username', currentUser.username).eq('report_date', date).single();

            if (existing) {
                await sb.from('bookings_reports').update({ bookings_count: count }).eq('id', existing.id);
            } else {
                await sb.from('bookings_reports').insert([{ employee_username: currentUser.username, report_date: date, bookings_count: count, confirmed_count: 0, team: currentUser.team }]);
            }
            
            Swal.fire('تم', 'تم تحديث التقرير بنجاح', 'success');
            loadResponderStats();
        }

        // --- 2. واجهة المتابعة (الكاملة) ---
        async function renderFollowupPage() {
            document.getElementById('app').innerHTML = `
                <div class="min-h-screen pb-10">
                    <header class="grad-purple text-white p-8 rounded-b-[3rem] shadow-xl text-center">
                        <div class="flex justify-between items-center mb-6">
                            <button onclick="logout()" class="bg-white/20 p-2 rounded-lg text-xs font-bold">خروج</button>
                            <span class="font-black text-lg">FOLLOW-UP PANEL</span>
                            <div class="w-10"></div>
                        </div>
                        <h2 class="text-2xl font-black">${currentUser.username}</h2>
                    </header>

                    <main class="px-4 -mt-8 space-y-4 text-right">
                        <div class="bg-white rounded-3xl p-6 shadow-lg border border-slate-100">
                            <h3 class="font-black text-slate-700 mb-4 border-b pb-2">تحديث واصل الموظفين</h3>
                            <div class="space-y-4">
                                <label class="text-xs font-bold text-slate-400">تاريخ العمل</label>
                                <input type="date" id="f_date" class="input-style" value="${new Date().toISOString().split('T')[0]}">
                                
                                <label class="text-xs font-bold text-slate-400">اختيار الموظف</label>
                                <select id="f_user_select" class="input-style"></select>
                                
                                <label class="text-xs font-bold text-slate-400">إضافة واصل (+)</label>
                                <input type="number" id="f_val" class="input-style" placeholder="مثال: 5">
                                
                                <button onclick="saveFollowupReport()" class="w-full grad-purple text-white py-4 rounded-2xl font-black shadow-lg">إرسال التحديث</button>
                            </div>
                        </div>
                    </main>
                </div>
            `;
            
            const { data: users } = await sb.from('users').select('*').eq('user_job_role', 'ردود');
            document.getElementById('f_user_select').innerHTML = users.map(u => `<option value="${u.username}">${u.username} (${u.team || 'عام'})</option>`).join('');
        }

        async function saveFollowupReport() {
            const date = document.getElementById('f_date').value;
            const target = document.getElementById('f_user_select').value;
            const val = Number(document.getElementById('f_val').value);
            if(!val) return;

            const { data: existing } = await sb.from('bookings_reports').select('*').eq('employee_username', target).eq('report_date', date).single();

            if (existing) {
                const newTotal = Number(existing.confirmed_count || 0) + val;
                await sb.from('bookings_reports').update({ confirmed_count: newTotal }).eq('id', existing.id);
                Swal.fire('تم', `تمت الإضافة لـ ${target}`, 'success');
            } else {
                await sb.from('bookings_reports').insert([{ employee_username: target, report_date: date, confirmed_count: val, bookings_count: 0 }]);
                Swal.fire('تم', `بدأ تقرير جديد لـ ${target}`, 'success');
            }
            document.getElementById('f_val').value = '';
        }
    </script>
</body>
</html>
