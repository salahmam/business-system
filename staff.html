<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BUSINESS SYSTEM - PREMIUM</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-dark: #1e293b;
            --accent-blue: #38bdf8;
            --accent-gold: #fbbf24;
            --text-gray: #94a3b8;
        }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg-dark); color: white; margin: 0; }
        .premium-card { background: linear-gradient(145deg, #1e293b, #0f172a); border: 1px solid rgba(255,255,255,0.1); border-radius: 2rem; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); border-radius: 1.5rem; }
        .gold-glow { text-shadow: 0 0 10px rgba(251, 191, 36, 0.5); color: var(--accent-gold); }
        .input-premium { background: #1e293b; border: 1px solid #334155; border-radius: 1rem; padding: 1rem; color: white; width: 100%; outline: none; }
        .input-premium:focus { border-color: var(--accent-blue); box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2); }
        .btn-blue { background: linear-gradient(135deg, #0284c7, #0369a1); transition: 0.3s; }
        .btn-blue:active { transform: scale(0.95); }
        #loader { position: fixed; inset: 0; background: var(--bg-dark); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .hidden { display: none; }
    </style>
</head>
<body class="min-h-screen pb-10">

    <div id="loader">
        <div class="w-16 h-16 border-4 border-t-blue-500 border-slate-800 rounded-full animate-spin"></div>
        <h1 class="mt-4 font-black italic text-blue-400 tracking-widest">BUSINESS SYSTEM</h1>
    </div>

    <div id="main_ui" class="hidden animate-in fade-in duration-700">
        <header class="p-6">
            <div class="premium-card p-6 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <div class="w-16 h-16 rounded-2xl bg-gradient-to-tr from-blue-600 to-sky-400 flex items-center justify-center text-2xl font-black shadow-lg">
                        <span id="user_initial">M</span>
                    </div>
                    <div>
                        <h2 id="user_full_name" class="text-lg font-black leading-tight">--</h2>
                        <div class="flex items-center gap-2 mt-1">
                            <span id="user_role_label" class="bg-blue-500/20 text-blue-400 text-[10px] px-2 py-0.5 rounded-full font-bold">--</span>
                            <span class="text-slate-500 text-[10px]" id="user_id_code">ID: #000</span>
                        </div>
                    </div>
                </div>
                <button onclick="logout()" class="text-slate-400 hover:text-red-400 transition-colors"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg></button>
            </div>
        </header>

        <div id="dynamic_content" class="px-6 space-y-6"></div>
    </div>

    <script>
        const _SB_URL = 'https://iqagigpqwwtvriqvlfbv.supabase.co';
        const _SB_KEY = 'sb_publishable_5xbaPlWHgjeeaIwceEFRrQ_d9aZ6Zax';
        const sb = supabase.createClient(_SB_URL, _SB_KEY);

        let u = null;

        window.onload = async () => {
            const session = localStorage.getItem('user_session');
            if(!session) { window.location.href='index.html'; return; }
            u = JSON.parse(session);
            
            document.getElementById('user_full_name').innerText = u.username;
            document.getElementById('user_initial').innerText = u.username[0].toUpperCase();
            document.getElementById('user_role_label').innerText = u.role || u.user_job_role;
            document.getElementById('user_id_code').innerText = `ID: #${u.employee_code || '000'}`;

            if((u.role || u.user_job_role) === 'ردود') await initResponder();
            else await initFollowup();

            document.getElementById('loader').classList.add('hidden');
            document.getElementById('main_ui').classList.remove('hidden');
        };

        // --- واجهة الردود ---
        async function initResponder() {
            const now = new Date();
            const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
            const today = now.toISOString().split('T')[0];

            // جلب تقارير الشهر
            const { data: reports } = await sb.from('bookings_reports').select('*').eq('employee_username', u.username).gte('report_date', startOfMonth);
            
            // جلب المكافآت اليدوية (نقاط)
            const { data: adminPoints } = await sb.from('bonuses').select('amount').eq('username', u.username).gte('created_at', startOfMonth);
            const manualPoints = adminPoints?.reduce((s, b) => s + Number(b.amount || 0), 0) || 0;

            // حساب الإحصائيات
            const totalBookings = reports?.reduce((s, r) => s + Number(r.bookings_count || 0), 0) || 0;
            const totalConfirmed = reports?.reduce((s, r) => s + Number(r.confirmed_count || 0), 0) || 0;
            const workingDays = reports?.filter(r => Number(r.bookings_count) > 0).length || 0;
            
            const todayReport = reports?.find(r => r.report_date === today);
            const todayB = todayReport?.bookings_count || 0;
            const todayC = todayReport?.confirmed_count || 0;

            // حساب نقاط الأداء التلقائية (اليومية وتجميعها)
            let autoPoints = 0;
            const shiftType = u.shift_type || 'شفت كامل'; // نفترض وجود هذا الحقل في جدول المستخدمين
            
            reports?.forEach(r => {
                const confirmed = Number(r.confirmed_count || 0);
                if (shiftType === 'نصف شفت') {
                    if (confirmed >= 25) autoPoints += 2;
                    else if (confirmed >= 15) autoPoints += 1;
                } else {
                    if (confirmed >= 50) autoPoints += 2;
                    else if (confirmed >= 30) autoPoints += 1;
                }
            });

            const totalPoints = autoPoints + manualPoints;

            document.getElementById('dynamic_content').innerHTML = `
                <div class="premium-card p-6 text-center space-y-4">
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">المجموع المالي الحالي</p>
                    <div class="flex justify-around items-center">
                        <div><p class="text-[10px] text-slate-500 mb-1">الراتب</p><p class="text-lg font-bold">${u.salary || 0}</p></div>
                        <div class="relative">
                            <svg class="w-24 h-24 transform -rotate-90"><circle cx="48" cy="48" r="40" stroke="currentColor" stroke-width="4" fill="transparent" class="text-slate-800"/><circle cx="48" cy="48" r="40" stroke="currentColor" stroke-width="4" fill="transparent" stroke-dasharray="251" stroke-dashoffset="${251 - (totalPoints*10)}" class="text-amber-400 transition-all duration-1000"/></svg>
                            <div class="absolute inset-0 flex flex-col items-center justify-center">
                                <span class="text-2xl font-black gold-glow">${totalPoints}</span>
                                <span class="text-[8px] font-bold text-amber-500 uppercase">نقطة</span>
                            </div>
                        </div>
                        <div><p class="text-[10px] text-slate-500 mb-1">أيام العمل</p><p class="text-lg font-bold">${workingDays}</p></div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 text-center">
                    <div class="glass p-4">
                        <p class="text-[10px] text-slate-400 font-bold mb-1">حجوزات اليوم</p>
                        <p class="text-2xl font-black text-sky-400">${todayB}</p>
                    </div>
                    <div class="glass p-4">
                        <p class="text-[10px] text-slate-400 font-bold mb-1">واصل اليوم</p>
                        <p class="text-2xl font-black text-emerald-400">${todayC}</p>
                    </div>
                    <div class="glass p-4">
                        <p class="text-[10px] text-slate-400 font-bold mb-1">إجمالي الحجوزات</p>
                        <p class="text-2xl font-black text-slate-200">${totalBookings}</p>
                    </div>
                    <div class="glass p-4">
                        <p class="text-[10px] text-slate-400 font-bold mb-1">إجمالي الواصل</p>
                        <p class="text-2xl font-black text-slate-200">${totalConfirmed}</p>
                    </div>
                </div>

                <div class="premium-card p-6 space-y-4">
                    <h3 class="text-sm font-bold border-r-4 border-sky-500 pr-3">تسجيل التقرير اليومي</h3>
                    <div class="space-y-4">
                        <input type="date" id="r_date" class="input-premium" value="${today}">
                        <div class="flex items-center gap-4">
                            <button onclick="changeVal(-1)" class="w-12 h-12 glass flex items-center justify-center font-bold text-xl">-</button>
                            <input type="number" id="r_val" class="input-premium text-center text-xl font-black" placeholder="0">
                            <button onclick="changeVal(1)" class="w-12 h-12 glass flex items-center justify-center font-bold text-xl">+</button>
                        </div>
                        <button onclick="saveR()" class="w-full py-4 rounded-2xl btn-blue font-black shadow-lg shadow-blue-900/20">تأكيد وحفظ</button>
                    </div>
                </div>
            `;
        }

        // --- واجهة المتابعة ---
        async function initFollowup() {
            document.getElementById('dynamic_content').innerHTML = `
                <div class="premium-card p-6 space-y-6">
                    <h3 class="text-sm font-bold border-r-4 border-amber-500 pr-3">تحديث واصل الردود</h3>
                    <div class="space-y-4">
                        <input type="date" id="f_date" class="input-premium" value="${new Date().toISOString().split('T')[0]}">
                        <select id="f_select" class="input-premium"></select>
                        <input type="number" id="f_val" class="input-premium" placeholder="أدخل عدد الواصل الجديد (+)">
                        <button onclick="saveF()" class="w-full py-4 rounded-2xl bg-amber-500 text-black font-black shadow-lg">تحديث المجموع</button>
                    </div>
                </div>
            `;
            const { data } = await sb.from('users').select('username').eq('user_job_role', 'ردود');
            if(data) document.getElementById('f_select').innerHTML = data.map(i => `<option value="${i.username}">${i.username}</option>`).join('');
        }

        // --- وظائف عامة ---
        function changeVal(n) { const i = document.getElementById('r_val'); i.value = Math.max(0, Number(i.value) + n); }

        async function saveR() {
            const d = document.getElementById('r_date').value;
            const v = document.getElementById('r_val').value;
            if(!v) return;
            const { error } = await sb.from('bookings_reports').upsert([{ employee_username: u.username, report_date: d, bookings_count: v, team: u.team }], { onConflict: 'employee_username,report_date' });
            if(!error) { Swal.fire('تم', 'تم حفظ التقرير', 'success'); initResponder(); }
        }

        async function saveF() {
            const d = document.getElementById('f_date').value;
            const t = document.getElementById('f_select').value;
            const v = Number(document.getElementById('f_val').value);
            if(!v) return;

            const { data } = await sb.from('bookings_reports').select('confirmed_count').eq('employee_username', t).eq('report_date', d).single();
            const newT = (data ? Number(data.confirmed_count) : 0) + v;

            const { error } = await sb.from('bookings_reports').upsert([{ employee_username: t, report_date: d, confirmed_count: newT }], { onConflict: 'employee_username,report_date' });
            if(!error) { Swal.fire('تم', `تحديث واصل ${t}`, 'success'); document.getElementById('f_val').value=''; }
        }

        function logout() { localStorage.clear(); window.location.href='index.html'; }
    </script>
</body>
</html>
