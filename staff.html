<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الموظفين - BUSINESS SYSTEM</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Tajawal', sans-serif; background: #f1f5f9; }</style>
</head>
<body class="p-4 space-y-6">
    <header id="header_bg" class="p-6 rounded-2xl shadow-lg text-center text-white">
        <h1 id="u_name" class="text-xl font-black">--</h1>
        <p id="u_role" class="text-xs opacity-80">--</p>
    </header>

    <main id="main_content" class="max-w-md mx-auto"></main>

    <script>
        const sb = supabase.createClient('https://iqagigpqwwtvriqvlfbv.supabase.co', 'sb_publishable_5xbaPlWHgjeeaIwceEFRrQ_d9aZ6Zax');
        const user = JSON.parse(localStorage.getItem('user_session'));

        function init() {
            if(!user) { location.href='index.html'; return; }
            document.getElementById('u_name').innerText = user.username;
            document.getElementById('u_role').innerText = user.user_job_role;
            const isRedod = user.user_job_role === 'ردود';
            document.getElementById('header_bg').className = isRedod ? 'p-6 rounded-2xl shadow-lg text-center text-white bg-blue-600' : 'p-6 rounded-2xl shadow-lg text-center text-white bg-purple-600';
            
            if(isRedod) renderRedod(); else renderFollow();
        }

        function renderRedod() {
            document.getElementById('main_content').innerHTML = `
            <div class="bg-white p-6 rounded-2xl shadow-sm space-y-4">
                <input type="date" id="r_date" class="w-full p-4 bg-slate-50 rounded-xl font-bold border outline-none">
                <input type="number" id="r_val" placeholder="عدد الحجوزات" class="w-full p-4 bg-slate-50 rounded-xl font-bold border outline-none text-center text-2xl">
                <button onclick="saveRedod()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black">حفظ التقرير</button>
            </div>`;
            document.getElementById('r_date').value = new Date().toISOString().split('T')[0];
        }

        async function renderFollow() {
            const { data: users } = await sb.from('users').select('username').eq('user_job_role','ردود');
            document.getElementById('main_content').innerHTML = `
            <div class="bg-white p-6 rounded-2xl shadow-sm space-y-4">
                <input type="date" id="f_date" class="w-full p-4 bg-slate-50 rounded-xl font-bold border outline-none">
                <select id="f_user" class="w-full p-4 bg-slate-50 rounded-xl font-bold border outline-none">
                    ${users.map(u => `<option value="${u.username}">${u.username}</option>`).join('')}
                </select>
                <input type="number" id="f_val" placeholder="عدد الواصل الجديد" class="w-full p-4 bg-slate-50 rounded-xl font-bold border outline-none text-center text-2xl">
                <button onclick="saveFollow()" class="w-full bg-purple-600 text-white py-5 rounded-2xl font-black">تحديث الواصل</button>
            </div>`;
            document.getElementById('f_date').value = new Date().toISOString().split('T')[0];
        }

        async function saveRedod() {
            const date = document.getElementById('r_date').value;
            const val = document.getElementById('r_val').value;
            const { data: existing } = await sb.from('bookings_reports').select('*').eq('employee_username', user.username).eq('report_date', date).single();
            if(existing) await sb.from('bookings_reports').update({ bookings_count: val }).eq('id', existing.id);
            else await sb.from('bookings_reports').insert([{ employee_username: user.username, report_date: date, bookings_count: val, team: user.team }]);
            Swal.fire('تم', 'تم حفظ الحجوزات', 'success');
        }

        async function saveFollow() {
            const date = document.getElementById('f_date').value;
            const target = document.getElementById('f_user').value;
            const val = Number(document.getElementById('f_val').value);
            const { data: existing } = await sb.from('bookings_reports').select('*').eq('employee_username', target).eq('report_date', date).single();
            if(existing) await sb.from('bookings_reports').update({ confirmed_count: Number(existing.confirmed_count) + val }).eq('id', existing.id);
            else await sb.from('bookings_reports').insert([{ employee_username: target, report_date: date, confirmed_count: val }]);
            Swal.fire('تم', 'تمت إضافة الواصل بنجاح', 'success');
        }
        init();
    </script>
</body>
</html>
