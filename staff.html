<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head><meta charset="UTF-8"><script src="https://cdn.tailwindcss.com"></script><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script></head>
<body class="bg-indigo-50 min-h-screen">
    <header class="bg-indigo-600 text-white p-4 flex justify-between">
        <div id="uinf"></div><button onclick="location.href='index.html'" class="text-xs">خروج</button>
    </header>
    <div class="p-4 max-w-lg mx-auto space-y-4">
        <div class="bg-white p-6 rounded-3xl shadow border">
            <h3 id="ttl" class="font-bold border-r-4 border-indigo-600 pr-2 mb-4">إرسال التقرير</h3>
            <input type="date" id="dt" class="w-full p-3 border rounded-2xl text-center font-bold mb-4">
            <div id="fol" class="hidden mb-4">
                <select id="slst" class="w-full p-3 border rounded-2xl bg-gray-50 font-bold"></select>
            </div>
            <input type="number" id="cnt" placeholder="العدد" class="w-full p-6 border rounded-3xl text-center text-3xl font-bold text-indigo-600 outline-none">
            <button onclick="send()" class="w-full bg-indigo-600 text-white py-4 mt-4 rounded-2xl font-bold">إرسال البيانات ✅</button>
            <p id="msg" class="text-center mt-3 font-bold hidden"></p>
        </div>
    </div>
    <script>
        const sb = supabase.createClient('https://iqagigpqwwtvriqvlfbv.supabase.co', 'sb_publishable_5xbaPlWHgjeeaIwceEFRrQ_d9aZ6Zax');
        const u = JSON.parse(localStorage.getItem('user_session'));

        window.onload = async () => {
            document.getElementById('uinf').innerHTML = `<p class="font-bold">${u.username}</p><p class="text-[10px] opacity-70">${u.role} | ${u.shift||''}</p>`;
            document.getElementById('dt').valueAsDate = new Date();
            if(u.role === 'متابعة') {
                document.getElementById('fol').classList.remove('hidden');
                document.getElementById('ttl').innerText = "تأكيد الواصل";
                const { data } = await sb.from('users').select('username').eq('role','ردود');
                data.forEach(s => { let o = document.createElement('option'); o.value=s.username; o.text=s.username; document.getElementById('slst').add(o); });
            }
        };

        async function send() {
            const c = parseInt(document.getElementById('cnt').value);
            const d = document.getElementById('dt').value;
            const t = (u.role === 'متابعة') ? document.getElementById('slst').value : u.username;
            let p = (u.role === 'ردود' && c >= 35) ? 2 : (u.role === 'ردود' && c >= 25 ? 1 : 0);

            const r = { employee_username: t, report_date: d };
            if(u.role === 'ردود') { r.bookings_count = c; r.bonus_points = p; } else { r.confirmed_count = c; }

            const { error } = await sb.from('bookings_reports').upsert([r], { onConflict: 'employee_username,report_date' });
            document.getElementById('msg').innerText = error ? "❌ فشل" : "✅ تم بنجاح";
            document.getElementById('msg').classList.remove('hidden');
        }
    </script>
</body>
</html>
