<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BUSINESS SYSTEM - STAFF DASHBOARD</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg-dark: #0f172a; --card-dark: #1e293b; --accent-blue: #38bdf8; --gold: #fbbf24; --emerald: #10b981; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg-dark); color: white; margin: 0; overflow-x: hidden; }
        
        .premium-card { background: linear-gradient(145deg, #1e293b, #0f172a); border: 1px solid rgba(255,255,255,0.08); border-radius: 2rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); border-radius: 1.5rem; }
        
        .input-premium { 
            background: #1e293b; 
            border: 1px solid #334155; 
            border-radius: 1.2rem; 
            padding: 1rem; 
            color: white; 
            width: 100%; 
            outline: none; 
            text-align: center; 
            display: block;
            margin: 0 auto;
        }
        .input-premium:focus { border-color: var(--accent-blue); box-shadow: 0 0 15px rgba(56, 189, 248, 0.1); }
        
        input[type="date"] {
            appearance: none;
            -webkit-appearance: none;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        #loader { position: fixed; inset: 0; background: var(--bg-dark); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spin-custom { width: 45px; height: 45px; border: 3px solid #1e293b; border-top: 3px solid var(--accent-blue); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spin-custom"></div>
        <p class="mt-4 text-[10px] font-bold text-slate-500 tracking-widest uppercase">Premium Access...</p>
    </div>

    <div id="main_ui" class="hidden opacity-0 transition-opacity duration-700">
        <header class="p-5">
            <div class="premium-card p-5 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <div id="user_avatar" class="w-12 h-12 rounded-xl bg-gradient-to-br from-blue-500 to-indigo-700 flex items-center justify-center font-black text-xl shadow-lg">?</div>
                    <div>
                        <h2 id="user_name" class="text-sm font-black italic">--</h2>
                        <span id="user_role_tag" class="text-blue-400 text-[8px] font-bold uppercase tracking-widest border border-blue-500/20 px-2 py-0.5 rounded mt-1 inline-block">--</span>
                    </div>
                </div>
                <button onclick="logout()" class="w-10 h-10 flex items-center justify-center rounded-full bg-red-500/10 text-red-400 active:scale-90 transition-all">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                </button>
            </div>
        </header>

        <div id="content_area" class="px-5 space-y-5 pb-10"></div>
    </div>

    <script>
        const sb = supabase.createClient('https://iqagigpqwwtvriqvlfbv.supabase.co', 'sb_publishable_5xbaPlWHgjeeaIwceEFRrQ_d9aZ6Zax');
        let u = null;

        window.onload = async () => {
            const session = localStorage.getItem('user_session');
            if(!session) { window.location.href='index.html'; return; }
            u = JSON.parse(session);

            document.getElementById('user_name').innerText = u.username;
            document.getElementById('user_avatar').innerText = u.username[0].toUpperCase();
            document.getElementById('user_role_tag').innerText = u.user_job_role;

            if(u.user_job_role === 'ردود') await initResponder();
            else if(u.user_job_role === 'متابعة') await initFollowup();
            
            document.getElementById('loader').style.display = 'none';
            document.getElementById('main_ui').classList.remove('hidden');
            setTimeout(() => document.getElementById('main_ui').classList.add('opacity-100'), 50);
        };

        async function initResponder() {
            const today = new Date().toISOString().split('T')[0];
            const startMonth = new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString().split('T')[0];

            const [repRes, bonRes, penRes] = await Promise.all([
                sb.from('bookings_reports').select('*').eq('employee_username', u.username).gte('report_date', startMonth),
                sb.from('bonuses').select('*').eq('employee_username', u.username).gte('bonus_date', startMonth),
                sb.from('penalties').select('*').eq('employee_username', u.username).gte('penalty_date', startMonth)
            ]);

            const reports = repRes.data || [];
            const todayData = reports.find(r => r.report_date === today) || { bookings_count: 0, confirmed_count: 0 };
            const totalC_Month = reports.reduce((s, r) => s + Number(r.confirmed_count || 0), 0);
            const totalB_Month = reports.reduce((s, r) => s + Number(r.bookings_count || 0), 0);

            // تعديل المنطق: حساب النقاط بناءً على كل يوم على حدة
            let autoPoints = 0;
            const shift = u.shift_type || "";
            
            reports.forEach(dayReport => {
                const dayConfirmed = Number(dayReport.confirmed_count || 0);
                if(shift.includes("كامل")) {
                    if(dayConfirmed >= 50) autoPoints += 2; 
                    else if(dayConfirmed >= 30) autoPoints += 1;
                } else {
                    if(dayConfirmed >= 25) autoPoints += 2; 
                    else if(dayConfirmed >= 15) autoPoints += 1;
                }
            });

            const manualB = (bonRes.data || []).reduce((s, b) => s + Number(b.bonus_amount), 0);
            const manualP = (penRes.data || []).reduce((s, p) => s + Number(p.penalty_amount), 0);
            const finalPoints = autoPoints + manualB - manualP;

            renderUI(finalPoints, manualP, reports.length, todayData, totalB_Month, totalC_Month, 'blue', 'Action Center', 'saveDaily');
        }

        async function initFollowup() {
            const today = new Date().toISOString().split('T')[0];
            const startMonth = new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString().split('T')[0];

            const [bonRes, penRes, reportsRes] = await Promise.all([
                sb.from('bonuses').select('*').eq('employee_username', u.username).gte('bonus_date', startMonth),
                sb.from('penalties').select('*').eq('employee_username', u.username).gte('penalty_date', startMonth),
                sb.from('bookings_reports').select('*').eq('employee_username', u.username).gte('report_date', startMonth)
            ]);

            const manualP = (penRes.data || []).reduce((s, p) => s + Number(p.penalty_amount), 0);
            const manualB = (bonRes.data || []).reduce((s, b) => s + Number(b.bonus_amount), 0);
            const workingDays = (reportsRes.data || []).length;

            renderUI(manualB - manualP, manualP, workingDays, null, null, null, 'emerald', 'Follow-up Control', 'saveFollowup');
            
            const { data } = await sb.from('users').select('username, employee_code').eq('user_job_role', 'ردود');
            if(data) document.getElementById('target_area').innerHTML = `
                <div class="text-center w-full">
                    <label class="text-[10px] text-slate-500 mb-1 block">اختيار موظف الردود</label>
                    <select id="f_select" class="input-premium font-bold text-sm">
                        <option value="">-- اختر الموظف --</option>
                        ${data.map(i => `<option value="${i.username}">${i.username} (${i.employee_code || 'بدون كود'})</option>`).join('')}
                    </select>
                </div>`;
        }

        function renderUI(points, penalties, days, tData, mB, mC, color, title, actionBtn) {
            const isFollowup = !tData;
            const today = new Date().toISOString().split('T')[0];

            document.getElementById('content_area').innerHTML = `
                <div class="premium-card p-6">
                    <div class="flex justify-between items-center px-2 mb-6">
                        <div class="text-center"><p class="text-[9px] text-slate-500">الراتب</p><p class="text-md font-black italic">${u.salary}</p></div>
                        <div class="text-center"><p class="text-[9px] text-red-500 font-bold">الخصومات</p><p class="text-md font-black text-red-400">-${penalties}</p></div>
                        <div class="text-center"><p class="text-[9px] text-slate-500">أيام العمل</p><p class="text-md font-black italic">${days}</p></div>
                    </div>
                    <div class="flex justify-center">
                        <div class="w-24 h-24 rounded-full border-2 border-${color}-500/20 bg-${color}-500/5 flex flex-col items-center justify-center shadow-[0_0_30px_rgba(0,0,0,0.3)]">
                            <span class="text-3xl font-black ${color === 'blue' ? 'text-amber-400' : 'text-emerald-400'}">${points}</span>
                            <span class="text-[8px] font-bold text-slate-500 uppercase tracking-widest">Points</span>
                        </div>
                    </div>
                </div>

                ${!isFollowup ? `
                <div class="grid grid-cols-2 gap-3">
                    <div class="glass p-4 text-center"><p class="text-[9px] text-slate-400 mb-1">حجوزات اليوم</p><p class="text-xl font-black text-sky-400">${tData.bookings_count}</p></div>
                    <div class="glass p-4 text-center"><p class="text-[9px] text-slate-400 mb-1">واصل اليوم</p><p class="text-xl font-black text-emerald-400">${tData.confirmed_count}</p></div>
                    <div class="glass p-4 text-center"><p class="text-[9px] text-slate-400 mb-1">حجوزات الشهر</p><p class="text-xl font-black text-indigo-400">${mB}</p></div>
                    <div class="glass p-4 text-center"><p class="text-[9px] text-slate-400 mb-1">واصل الشهر</p><p class="text-xl font-black text-amber-400">${mC}</p></div>
                </div>` : ''}

                <div class="premium-card p-6 space-y-4">
                    <h3 class="text-[10px] font-black border-r-4 border-${color}-500 pr-3 italic uppercase text-slate-400">${title}</h3>
                    <div class="space-y-4 flex flex-col items-center">
                        <div class="w-full text-center">
                            <label class="text-[10px] text-slate-500 mb-1 block">تاريخ التقرير</label>
                            <input type="date" id="${isFollowup ? 'f_date' : 'r_date'}" value="${today}" class="input-premium font-bold text-sm">
                        </div>
                        <div id="target_area" class="w-full"></div>
                        <div class="w-full text-center">
                            <label class="text-[10px] text-slate-500 mb-1 block">${isFollowup ? 'إضافة عدد واصل' : 'عدد الحجوزات'}</label>
                            <input type="number" id="${isFollowup ? 'f_val' : 'r_val'}" class="input-premium text-2xl font-black" placeholder="0">
                        </div>
                        <button onclick="${actionBtn}()" class="w-full py-4 rounded-2xl bg-${color === 'blue' ? 'blue-600' : 'emerald-600'} text-white font-black shadow-lg active:scale-95 transition-all text-sm uppercase italic">حفظ البيانات الآن</button>
                    </div>
                </div>
            `;
        }

        async function saveDaily() {
            const v = document.getElementById('r_val').value;
            const d = document.getElementById('r_date').value;
            if(!v || !d) return Swal.fire('نقص بيانات', 'يرجى ملء الحقول', 'warning');
            Swal.showLoading();
            const { error } = await sb.from('bookings_reports').upsert([{ employee_username: u.username, report_date: d, bookings_count: v, team: u.team }], { onConflict: 'employee_username,report_date' });
            if(!error) location.reload();
        }

        async function saveFollowup() {
            const target = document.getElementById('f_select').value;
            const addVal = Number(document.getElementById('f_val').value);
            const d = document.getElementById('f_date').value;
            if(!target || !addVal || !d) return Swal.fire('نقص بيانات', 'أكمل الحقول أولاً', 'warning');
            
            const { data: current } = await sb.from('bookings_reports').select('confirmed_count').eq('employee_username', target).eq('report_date', d).single();
            const newTotal = (current ? Number(current.confirmed_count || 0) : 0) + addVal;

            await sb.from('bookings_reports').upsert([{ employee_username: target, report_date: d, confirmed_count: newTotal }], { onConflict: 'employee_username,report_date' });
            Swal.fire({ title: 'تم التحديث', icon: 'success', timer: 1000, showConfirmButton: false }).then(() => location.reload());
        }

        function logout() { localStorage.clear(); window.location.href='index.html'; }
    </script>
</body>
</html>
