<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الموظفين</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #f1f5f9; }
        .grad-main { background: linear-gradient(135deg, #1e293b, #334155); }
        .input-style { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 1rem; padding: 1rem; width: 100%; font-weight: bold; outline: none; }
    </style>
</head>
<body>

    <div id="app">
        <!-- شاشة التحميل -->
        <div id="loader" class="flex flex-col items-center justify-center h-screen">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mb-4"></div>
            <h2 class="text-xl font-black text-slate-700">جاري الدخول...</h2>
        </div>
    </div>

    <script>
        const _SB_URL = 'https://iqagigpqwwtvriqvlfbv.supabase.co';
        const _SB_KEY = 'sb_publishable_5xbaPlWHgjeeaIwceEFRrQ_d9aZ6Zax';
        const sb = supabase.createClient(_SB_URL, _SB_KEY);

        window.onload = function() {
            const data = localStorage.getItem('user_session');
            if (!data) { window.location.href = 'index.html'; return; }

            const user = JSON.parse(data);
            const role = user.role || user.user_job_role;

            // التعديل السحري هنا: قبول كلمة "موظف" أو "ردود" أو "متابعة"
            if (role === 'موظف' || role === 'ردود' || role === 'متابعة') {
                renderStaffPage(user);
            } else {
                Swal.fire('خطأ', 'رتبتك (' + role + ') غير مخصصة لهذه الواجهة', 'error').then(() => {
                    window.location.href = 'index.html';
                });
            }
        };

        function renderStaffPage(user) {
            document.getElementById('app').innerHTML = `
                <div class="min-h-screen pb-10">
                    <header class="grad-main text-white p-8 rounded-b-[2.5rem] shadow-xl text-center">
                        <h1 class="text-2xl font-black">${user.username}</h1>
                        <p class="opacity-70 text-sm mt-1">كود الموظف: ${user.employee_code || '---'}</p>
                    </header>

                    <main class="px-4 -mt-6 space-y-4">
                        <div class="bg-white rounded-3xl p-6 shadow-lg border border-slate-100">
                            <h3 class="font-black text-slate-700 mb-4 border-b pb-2 text-right">إرسال تقرير الحجوزات</h3>
                            <div class="space-y-3">
                                <input type="date" id="rep_date" class="input-style" value="${new Date().toISOString().split('T')[0]}">
                                <input type="number" id="rep_count" class="input-style" placeholder="أدخل عدد الحجوزات">
                                <button onclick="sendReport('${user.username}', '${user.team}')" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-lg shadow-blue-200">حفظ التقرير</button>
                            </div>
                        </div>

                        <button onclick="localStorage.clear(); location.href='index.html'" class="w-full text-slate-400 font-bold py-4">تسجيل الخروج</button>
                    </main>
                </div>
            `;
        }

        async function sendReport(username, team) {
            const date = document.getElementById('rep_date').value;
            const count = document.getElementById('rep_count').value;
            if(!count) return;

            const { error } = await sb.from('bookings_reports').insert([{
                employee_username: username,
                report_date: date,
                bookings_count: count,
                confirmed_count: 0,
                team: team || 'عام'
            }]);

            if(!error) {
                Swal.fire('تم!', 'تم إرسال تقريرك بنجاح', 'success');
                document.getElementById('rep_count').value = '';
            } else {
                Swal.fire('خطأ', 'حدثت مشكلة أثناء الحفظ', 'error');
            }
        }
    </script>
</body>
</html>
