<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الموظف | BUSINESS SYSTEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #f4f7fe; color: #1e293b; }
        .glass-card { background: white; border-radius: 2.5rem; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .stat-box { position: relative; overflow: hidden; transition: all 0.3s ease; border: 1px solid #e2e8f0; }
        .stat-box:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .stat-box::after { content: ''; position: absolute; bottom: 0; right: 0; width: 40px; height: 40px; background: currentColor; opacity: 0.05; border-radius: 50% 0 0 0; }
        input, select { transition: all 0.3s ease; }
        input:focus { border-color: #4f46e5 !important; box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1) !important; }
    </style>
</head>
<body class="pb-10">

    <header class="bg-slate-900 text-white p-6 sticky top-0 z-50 shadow-2xl rounded-b-[3rem] flex justify-between items-center border-b-4 border-indigo-500">
        <div class="flex items-center gap-4">
            <div id="user_initial" class="w-14 h-14 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl flex items-center justify-center font-black text-2xl shadow-lg border-2 border-white/20">..</div>
            <div>
                <h2 id="u_name_display" class="font-black text-xl text-right">تحميل...</h2>
                <p id="u_role_display" class="text-[11px] text-indigo-300 font-bold uppercase tracking-tighter text-right"></p>
            </div>
        </div>
        <button onclick="localStorage.clear(); location.href='index.html'" class="bg-white/10 hover:bg-red-500/20 p-3 rounded-2xl border border-white/10 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor font-bold"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
        </button>
    </header>

    <div class="p-5 max-w-lg mx-auto space-y-6 pt-8">
        
        <div class="grid grid-cols-2 gap-4">
            <div class="glass-card p-5 stat-box text-blue-600">
                <span class="text-[10px] text-slate-400 font-black block mb-1">الراتب الأساسي</span>
                <span id="stat_salary" class="text-xl font-black italic">0</span>
            </div>
            <div class="glass-card p-5 stat-box text-amber-500 border-amber-100">
                <span class="text-[10px] text-slate-400 font-black block mb-1">النقاط الإجمالية</span>
                <span id="stat_bonus" class="text-xl font-black">0 ⭐</span>
            </div>
            <div class="glass-card p-5 stat-box text-emerald-500 border-emerald-100">
                <span class="text-[10px] text-slate-400 font-black block mb-1">إجمالي الحجوزات</span>
                <span id="stat_total_books" class="text-xl font-black">0</span>
            </div>
            <div class="glass-card p-5 stat-box text-indigo-600 border-indigo-100">
                <span class="text-[10px] text-slate-400 font-black block mb-1">إجمالي الواصل</span>
                <span id="stat_confirmed" class="text-xl font-black">0</span>
            </div>
            <div class="glass-card p-5 stat-box text-red-500 border-red-100 col-span-2 flex justify-between items-center">
                <div>
                    <span class="text-[10px] text-slate-400 font-black block mb-1">الخصومات المالية</span>
                    <span id="stat_abs" class="text-xl font-black">0 د.ع</span>
                </div>
                <div class="bg-red-50 p-2 rounded-xl">💸</div>
            </div>
        </div>

        <div class="glass-card p-8 space-y-6 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-2 bg-indigo-500"></div>
            <h3 id="ttl" class="text-xl font-black text-slate-800 text-center flex items-center justify-center gap-2">
                📝 <span>إرسال التقرير اليومي</span>
            </h3>
            
            <div class="space-y-4">
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-400 mr-2 uppercase">تاريخ التقرير (يمكن التعديل لسابق)</label>
                    <input type="date" id="dt" class="w-full p-4 bg-slate-50 border rounded-2xl text-center font-bold outline-none">
                </div>

                <div id="fol" class="hidden space-y-1">
                    <label class="text-[10px] font-black text-amber-600 mr-2 uppercase">اختر الموظف المستهدف</label>
                    <select id="slst" class="w-full p-4 bg-amber-50 border border-amber-200 rounded-2xl font-bold text-center appearance-none shadow-inner cursor-pointer"></select>
                </div>

                <div class="bg-indigo-50/50 p-6 rounded-[2rem] border-2 border-dashed border-indigo-200">
                    <label id="cnt_label" class="text-xs font-black text-indigo-600 mb-3 block text-center uppercase tracking-widest">العدد المنجز</label>
                    <input type="number" id="cnt" placeholder="0" class="w-full bg-transparent text-center text-6xl font-black text-indigo-700 outline-none placeholder:opacity-20">
                </div>

                <button onclick="send()" id="btn_send" class="w-full bg-slate-900 text-white py-5 rounded-[2rem] font-black text-lg shadow-xl hover:bg-indigo-600 active:scale-95 transition-all flex items-center justify-center gap-3">
                    <span>تأكيد البيانات الآن</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor font-bold"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" /></svg>
                </button>
            </div>
            <p id="msg" class="text-center font-bold text-sm p-4 rounded-2xl hidden animate-pulse"></p>
        </div>
    </div>

    <script>
        const sb = supabase.createClient('https://iqagigpqwwtvriqvlfbv.supabase.co', 'sb_publishable_5xbaPlWHgjeeaIwceEFRrQ_d9aZ6Zax');
        const u = JSON.parse(localStorage.getItem('user_session'));

        window.onload = async () => {
            if(!u) { location.href = 'index.html'; return; }
            document.getElementById('user_initial').innerText = u.username.charAt(0).toUpperCase();
            document.getElementById('u_name_display').innerText = u.username;
            document.getElementById('u_role_display').innerText = `${u.role} | ${u.employee_code}`;
            document.getElementById('dt').valueAsDate = new Date();

            if(u.role === 'متابعة') {
                document.getElementById('fol').classList.remove('hidden');
                document.getElementById('ttl').innerHTML = "📦 <span>تحديث واصل الموظفين</span>";
                document.getElementById('cnt_label').innerText = "عدد الحجوزات الواصلة";
                const { data } = await sb.from('users').select('username, employee_code').eq('role','ردود');
                const selectList = document.getElementById('slst');
                data.forEach(s => { let o = document.createElement('option'); o.value = s.username; o.text = `${s.username} (${s.employee_code})`; selectList.add(o); });
            }
            loadStats();
        };

        async function loadStats() {
            document.getElementById('stat_salary').innerText = `${u.salary || 0} د.ع`;
            const { data: reports } = await sb.from('bookings_reports').select('*').eq('employee_username', u.username);
            const { data: adjData } = await sb.from('adjustments').select('amount, type').eq('user_id', u.id);

            let bTotal = 0, cTotal = 0, points = 0, totalAbs = 0;
            if(reports) reports.forEach(r => {
                bTotal += (r.bookings_count || 0); cTotal += (r.confirmed_count || 0);
                if(r.bookings_count >= 35) points += 2; else if(r.bookings_count >= 25) points += 1;
            });
            if(adjData) adjData.forEach(a => { if(a.type === 'bonus') points += Number(a.amount); else totalAbs += Number(a.amount); });

            document.getElementById('stat_total_books').innerText = bTotal;
            document.getElementById('stat_confirmed').innerText = cTotal;
            document.getElementById('stat_bonus').innerText = points + " ⭐";
            document.getElementById('stat_abs').innerText = totalAbs.toLocaleString() + " د.ع";
        }

        async function send() {
            const c = parseInt(document.getElementById('cnt').value);
            const d = document.getElementById('dt').value;
            const targetUser = (u.role === 'متابعة') ? document.getElementById('slst').value : u.username;
            if(isNaN(c)) return;

            // جلب البيانات القديمة أولاً للتأكد من عدم مسح بيانات النوع الآخر
            const { data: existing } = await sb.from('bookings_reports').select('*').eq('employee_username', targetUser).eq('report_date', d).single();
            
            let reportData = { employee_username: targetUser, report_date: d };
            if(u.role === 'ردود') {
                reportData.bookings_count = c;
                reportData.confirmed_count = existing ? existing.confirmed_count : 0;
            } else {
                reportData.confirmed_count = c;
                reportData.bookings_count = existing ? existing.bookings_count : 0;
            }

            const { error } = await sb.from('bookings_reports').upsert([reportData], { onConflict: 'employee_username,report_date' });
            
            const msgBox = document.getElementById('msg');
            msgBox.classList.remove('hidden');
            if(!error) {
                msgBox.innerText = "✅ تم تحديث البيانات بنجاح";
                msgBox.className = "text-center font-bold text-emerald-600 bg-emerald-50 p-4 rounded-2xl border border-emerald-100";
                loadStats();
                document.getElementById('cnt').value = "";
            } else {
                msgBox.innerText = "❌ خطأ في الإرسال";
                msgBox.className = "text-center font-bold text-red-600 bg-red-50 p-4 rounded-2xl border border-red-100";
            }
        }
    </script>
</body>
</html>
