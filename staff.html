<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الموظف - BUSINESS SYSTEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .stat-card { border-right: 4px solid #4f46e5; }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-50 via-white to-indigo-100 min-h-screen pb-10">

    <header class="bg-indigo-900 text-white p-5 sticky top-0 z-50 shadow-2xl rounded-b-[2rem] flex justify-between items-center border-b-4 border-indigo-500">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 bg-indigo-500 rounded-2xl flex items-center justify-center font-black text-xl shadow-lg shadow-indigo-500/30">
                <span id="user_initial">..</span>
            </div>
            <div>
                <h2 id="u_name_display" class="font-bold text-lg leading-tight text-white">تحميل...</h2>
                <p id="u_role_display" class="text-[10px] text-indigo-300 font-bold tracking-widest uppercase"></p>
            </div>
        </div>
        <button onclick="localStorage.clear(); location.href='index.html'" class="bg-white/10 hover:bg-red-500/20 text-white p-3 rounded-2xl transition-all active:scale-90 border border-white/10">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
            </svg>
        </button>
    </header>

    <div class="p-4 max-w-lg mx-auto space-y-6 pt-6">
        
        <div class="grid grid-cols-2 gap-3">
            <div class="glass p-4 rounded-[2rem] shadow-sm border border-indigo-100 stat-card">
                <span class="text-[10px] text-slate-400 font-bold block mb-1">الراتب الأساسي</span>
                <span id="stat_salary" class="text-lg font-black text-slate-800">0</span>
            </div>
            <div class="glass p-4 rounded-[2rem] shadow-sm border border-indigo-100 stat-card" style="border-right-color: #f59e0b;">
                <span class="text-[10px] text-slate-400 font-bold block mb-1">إجمالي النقاط/المكافأة</span>
                <span id="stat_bonus" class="text-lg font-black text-amber-600">0</span>
            </div>
            <div class="glass p-4 rounded-[2rem] shadow-sm border border-indigo-100 stat-card" style="border-right-color: #10b981;">
                <span class="text-[10px] text-slate-400 font-bold block mb-1">إجمالي الحجوزات</span>
                <span id="stat_total_books" class="text-lg font-black text-emerald-600">0</span>
            </div>
            <div class="glass p-4 rounded-[2rem] shadow-sm border border-indigo-100 stat-card" style="border-right-color: #3b82f6;">
                <span class="text-[10px] text-slate-400 font-bold block mb-1">أيام العمل</span>
                <span id="stat_days" class="text-lg font-black text-blue-600">0</span>
            </div>
        </div>

        <div class="glass p-8 rounded-[3rem] shadow-xl border border-white space-y-6">
            <div class="text-center">
                <h3 id="ttl" class="text-xl font-black text-slate-800 italic">إرسال تقرير اليوم</h3>
                <div class="h-1 w-12 bg-indigo-600 mx-auto mt-2 rounded-full"></div>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-black text-indigo-500 mr-2 uppercase">تاريخ التقرير</label>
                    <input type="date" id="dt" class="w-full p-4 bg-indigo-50/50 border-2 border-transparent rounded-2xl text-center font-bold text-indigo-900 outline-none focus:border-indigo-600 transition-all">
                </div>

                <div id="fol" class="hidden">
                    <label class="text-[10px] font-black text-amber-500 mr-2 uppercase">اختيار موظف الردود (الاسم - الرمز)</label>
                    <select id="slst" class="w-full p-4 bg-amber-50 border-2 border-amber-100 rounded-2xl font-bold text-slate-700 outline-none focus:border-amber-500 appearance-none"></select>
                </div>

                <div>
                    <label id="cnt_label" class="text-[10px] font-black text-indigo-500 mr-2 uppercase">العدد المنجز</label>
                    <input type="number" id="cnt" placeholder="00" class="w-full p-8 bg-slate-50 border-2 border-dashed border-indigo-200 rounded-[2.5rem] text-center text-5xl font-black text-indigo-600 outline-none focus:border-indigo-600 focus:bg-white transition-all">
                </div>

                <button onclick="send()" id="btn_send" class="w-full bg-gradient-to-r from-indigo-600 to-blue-600 text-white py-5 rounded-[2rem] font-black text-lg shadow-xl shadow-indigo-200 active:scale-95 transition-all flex items-center justify-center gap-3">
                    إرسال البيانات الآمنة ✅
                </button>
            </div>
            
            <p id="msg" class="text-center font-bold text-sm p-3 rounded-2xl hidden"></p>
        </div>
    </div>

    <script>
        const sb = supabase.createClient('https://iqagigpqwwtvriqvlfbv.supabase.co', 'sb_publishable_5xbaPlWHgjeeaIwceEFRrQ_d9aZ6Zax');
        const u = JSON.parse(localStorage.getItem('user_session'));

        window.onload = async () => {
            if(!u) { window.location.href = 'index.html'; return; }
            
            // تهيئة الواجهة
            document.getElementById('user_initial').innerText = u.username.charAt(0).toUpperCase();
            document.getElementById('u_name_display').innerText = u.username;
            document.getElementById('u_role_display').innerText = `${u.role} | ${u.shift || 'عام'} | ${u.employee_code}`;
            document.getElementById('dt').valueAsDate = new Date();

            if(u.role === 'متابعة') {
                document.getElementById('fol').classList.remove('hidden');
                document.getElementById('ttl').innerText = "تأكيد الواصل للموظفين";
                document.getElementById('cnt_label').innerText = "عدد القطع الواصلة";
                
                // جلب الموظفين مع رموزهم
                const { data } = await sb.from('users').select('username, employee_code').eq('role','ردود');
                data.forEach(s => {
                    let o = document.createElement('option');
                    o.value = s.username;
                    o.text = `${s.username} (${s.employee_code})`;
                    document.getElementById('slst').add(o);
                });
            }

            loadStats();
        };

        async function loadStats() {
            // جلب الراتب
            document.getElementById('stat_salary').innerText = `${u.salary} د.ع`;

            // جلب التقارير الكلية لهذا المستخدم
            const { data: reports } = await sb.from('bookings_reports').select('*').eq('employee_username', u.username);
            
            if(reports) {
                const totalBooks = reports.reduce((s, r) => s + (r.bookings_count || 0), 0);
                const totalPoints = reports.reduce((s, r) => s + (r.bonus_points || 0), 0);
                const workingDays = reports.length;

                document.getElementById('stat_total_books').innerText = totalBooks;
                document.getElementById('stat_bonus').innerText = totalPoints + " نقطة";
                document.getElementById('stat_days').innerText = workingDays + " أيام";
            }
        }

        async function send() {
            const btn = document.getElementById('btn_send');
            const c = parseInt(document.getElementById('cnt').value);
            const d = document.getElementById('dt').value;
            const t = (u.role === 'متابعة') ? document.getElementById('slst').value : u.username;

            if(isNaN(c)) { alert("الرجاء إدخال العدد"); return; }

            btn.disabled = true;
            btn.innerText = "جاري الحفظ... ⏳";

            // حساب نقاط المكافأة تلقائياً للردود
            let p = 0;
            if(u.role === 'ردود') {
                if(c >= 35) p = 2;
                else if(c >= 25) p = 1;
            }

            const r = { employee_username: t, report_date: d };
            if(u.role === 'ردود') { 
                r.bookings_count = c; 
                r.bonus_points = p; 
            } else { 
                r.confirmed_count = c; 
            }

            const { error } = await sb.from('bookings_reports').upsert([r], { onConflict: 'employee_username,report_date' });
            
            const msg = document.getElementById('msg');
            msg.classList.remove('hidden');
            
            if(error) {
                msg.innerText = "❌ فشل الإرسال: " + error.message;
                msg.className = "text-center font-bold text-sm p-3 rounded-2xl bg-red-50 text-red-600 mt-3";
            } else {
                msg.innerText = "✅ تم تحديث بياناتك بنجاح";
                msg.className = "text-center font-bold text-sm p-3 rounded-2xl bg-emerald-50 text-emerald-600 mt-3";
                document.getElementById('cnt').value = "";
                loadStats(); // تحديث الأرقام فوراً
            }

            btn.disabled = false;
            btn.innerText = "إرسال البيانات الآمنة ✅";
        }
    </script>
</body>
</html>
