<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BUSINESS SYSTEM - PREMIUM STAFF</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg-dark: #0f172a; --card-dark: #1e293b; --accent-blue: #38bdf8; --gold: #fbbf24; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg-dark); color: white; margin: 0; overflow-x: hidden; }
        
        /* تأثيرات الفخامة */
        .premium-card { background: linear-gradient(145deg, #1e293b, #0f172a); border: 1px solid rgba(255,255,255,0.1); border-radius: 2rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); border-radius: 1.5rem; }
        .gold-glow { text-shadow: 0 0 15px rgba(251, 191, 36, 0.4); color: var(--gold); }
        
        /* المدخلات */
        .input-premium { background: #1e293b; border: 1px solid #334155; border-radius: 1.2rem; padding: 1.2rem; color: white; width: 100%; outline: none; text-align: center; transition: 0.3s; }
        .input-premium:focus { border-color: var(--accent-blue); box-shadow: 0 0 15px rgba(56, 189, 248, 0.2); }
        
        /* الشاشات الانتقالية */
        #loader { position: fixed; inset: 0; background: var(--bg-dark); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spin-custom { width: 50px; height: 50px; border: 4px solid #1e293b; border-top: 4px solid var(--accent-blue); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spin-custom"></div>
        <h1 class="mt-4 font-black italic text-blue-400 tracking-[0.3em] text-sm">BUSINESS SYSTEM</h1>
        <p class="text-[9px] text-slate-600 mt-2 uppercase">Syncing Premium Dashboard...</p>
    </div>

    <div id="main_ui" class="hidden opacity-0 transition-opacity duration-700">
        <header class="p-5">
            <div class="premium-card p-5 flex items-center justify-between border-b border-white/5">
                <div class="flex items-center gap-4">
                    <div id="user_avatar" class="w-14 h-14 rounded-2xl bg-gradient-to-br from-blue-500 to-indigo-700 flex items-center justify-center font-black text-2xl shadow-xl shadow-blue-900/40">?</div>
                    <div>
                        <h2 id="user_name" class="text-md font-black tracking-tight leading-none italic">--</h2>
                        <div class="flex items-center gap-2 mt-2">
                            <span id="user_role_tag" class="bg-blue-500/10 text-blue-400 text-[9px] px-2 py-0.5 rounded-md font-bold border border-blue-500/20 uppercase tracking-tighter">--</span>
                            <span id="user_id_tag" class="text-slate-500 text-[9px] font-medium tracking-widest">ID: #000</span>
                        </div>
                    </div>
                </div>
                <button onclick="logout()" class="p-3 text-slate-500 hover:text-red-400 active:scale-90 transition-all">
                    <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4m7 14l5-5-5-5m5 5H9"></path></svg>
                </button>
            </div>
        </header>

        <div id="content_area" class="px-5 space-y-5 pb-10">
            </div>
    </div>

    <script>
        const sb = supabase.createClient('https://iqagigpqwwtvriqvlfbv.supabase.co', 'sb_publishable_5xbaPlWHgjeeaIwceEFRrQ_d9aZ6Zax');
        let u = null;

        window.onload = async () => {
            const session = localStorage.getItem('user_session');
            if(!session) { window.location.href='index.html'; return; }
            u = JSON.parse(session);

            // إعداد البيانات الأساسية في الهيدر
            document.getElementById('user_name').innerText = u.username;
            document.getElementById('user_avatar').innerText = u.username[0].toUpperCase();
            document.getElementById('user_role_tag').innerText = u.user_job_role;
            document.getElementById('user_id_tag').innerText = `ID: #${u.employee_code || '---'}`;

            try {
                if(u.user_job_role === 'ردود') await initResponder();
                else if(u.user_job_role === 'متابعة') await initFollowup();
                
                showUI();
            } catch (e) {
                console.error("Critical Error:", e);
                showUI(); // إظهار الصفحة حتى لو حدث خطأ جزئي
            }
        };

        function showUI() {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('main_ui').classList.remove('hidden');
            setTimeout(() => document.getElementById('main_ui').classList.add('opacity-100'), 50);
        }

        // --- واجهة الردود (نظام النقاط والتقارير) ---
        async function initResponder() {
            const today = new Date().toISOString().split('T')[0];
            const startMonth = new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString().split('T')[0];

            // جلب كافة البيانات المطلوبة في وقت واحد (Parallel Loading)
            const [repRes, bonRes, penRes] = await Promise.all([
                sb.from('bookings_reports').select('*').eq('employee_username', u.username).gte('report_date', startMonth),
                sb.from('bonuses').select('*').eq('employee_username', u.username).gte('bonus_date', startMonth),
                sb.from('penalties').select('*').eq('employee_username', u.username).gte('penalty_date', startMonth)
            ]);

            const reports = repRes.data || [];
            const todayReport = reports.find(r => r.report_date === today) || { bookings_count: 0, confirmed_count: 0 };
            const totalC = reports.reduce((s, r) => s + Number(r.confirmed_count || 0), 0);
            const workingDays = reports.length;

            // حساب محرك النقاط التلقائي بناءً على نوع الشفت المخزن في Admin
            let autoPoints = 0;
            const shift = u.shift_type || "";
            if(shift.includes("كامل")) {
                if(totalC >= 50) autoPoints = 2; else if(totalC >= 30) autoPoints = 1;
            } else {
                if(totalC >= 25) autoPoints = 2; else if(totalC >= 15) autoPoints = 1;
            }

            const manualB = (bonRes.data || []).reduce((s, b) => s + Number(b.bonus_amount), 0);
            const manualP = (penRes.data || []).reduce((s, p) => s + Number(p.penalty_amount), 0);
            const finalPoints = autoPoints + manualB - manualP;

            document.getElementById('content_area').innerHTML = `
                <div class="premium-card p-6 text-center space-y-6">
                    <p class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em]">Financial Performance</p>
                    <div class="flex justify-around items-center">
                        <div class="text-center">
                            <p class="text-[9px] text-slate-500 mb-1 italic font-bold">الراتب</p>
                            <p class="text-lg font-black text-slate-100">${u.salary || 0}</p>
                        </div>
                        <div class="relative w-28 h-28 flex flex-col items-center justify-center rounded-full border border-white/5 bg-white/[0.02] shadow-[0_0_40px_rgba(56,189,248,0.1)]">
                            <span class="text-4xl font-black gold-glow">${finalPoints}</span>
                            <span class="text-[8px] font-black text-amber-500 uppercase tracking-widest mt-1">Point</span>
                        </div>
                        <div class="text-center">
                            <p class="text-[9px] text-slate-500 mb-1 italic font-bold">أيام العمل</p>
                            <p class="text-lg font-black text-slate-100">${workingDays}</p>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="glass p-5 text-center">
                        <p class="text-[10px] text-slate-400 font-bold mb-1 italic">حجوزات اليوم</p>
                        <p class="text-2xl font-black text-sky-400">${todayReport.bookings_count}</p>
                    </div>
                    <div class="glass p-5 text-center">
                        <p class="text-[10px] text-slate-400 font-bold mb-1 italic">واصل اليوم</p>
                        <p class="text-2xl font-black text-emerald-400">${todayReport.confirmed_count}</p>
                    </div>
                </div>

                <div class="premium-card p-6 space-y-4">
                    <h3 class="text-xs font-black border-r-4 border-sky-500 pr-3 italic uppercase tracking-wider text-slate-300">Daily Action Report</h3>
                    <div class="space-y-1">
                        <label class="text-[10px] text-slate-500 pr-2 font-bold">عدد الحجوزات الجديدة</label>
                        <input type="number" id="r_val" class="input-premium text-3xl font-black" placeholder="0" inputmode="numeric">
                    </div>
                    <button onclick="saveDaily()" class="w-full py-4 rounded-2xl bg-gradient-to-r from-blue-600 to-indigo-700 text-white font-black shadow-xl shadow-blue-900/30 active:scale-95 transition-all text-sm italic">
                        تحديث وإرسال التقرير
                    </button>
                </div>
            `;
        }

        // --- واجهة المتابعة (تحديث الواصل التراكمي) ---
        async function initFollowup() {
            document.getElementById('content_area').innerHTML = `
                <div class="premium-card p-6 space-y-5">
                    <h3 class="text-xs font-black border-r-4 border-emerald-500 pr-3 italic uppercase tracking-wider text-slate-300">Follow-up Master UI</h3>
                    <div class="space-y-4">
                        <div class="space-y-1">
                            <label class="text-[10px] text-slate-500 pr-2 font-bold">موظف الردود المستهدف</label>
                            <select id="f_select" class="input-premium font-bold text-sm text-right"></select>
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] text-slate-500 pr-2 font-bold">العدد الواصل الجديد (+)</label>
                            <input type="number" id="f_val" class="input-premium text-2xl font-black" placeholder="أدخل الرقم" inputmode="numeric">
                        </div>
                        <button onclick="saveFollowup()" class="w-full py-4 rounded-2xl bg-gradient-to-r from-emerald-600 to-teal-700 text-white font-black shadow-xl shadow-emerald-900/30 active:scale-95 transition-all text-sm italic">
                            تحديث واصل الموظف
                        </button>
                    </div>
                </div>
            `;
            const { data } = await sb.from('users').select('username').eq('user_job_role', 'ردود');
            if(data) document.getElementById('f_select').innerHTML = `<option value="">-- اختر الموظف --</option>` + data.map(i => `<option value="${i.username}">${i.username}</option>`).join('');
        }

        // --- الدوال المنطقية ---
        async function saveDaily() {
            const v = document.getElementById('r_val').value;
            if(!v || v < 0) return Swal.fire('تنبيه', 'يرجى إدخال رقم صحيح', 'warning');
            
            const today = new Date().toISOString().split('T')[0];
            const { error } = await sb.from('bookings_reports').upsert([
                { employee_username: u.username, report_date: today, bookings_count: v, team: u.team }
            ], { onConflict: 'employee_username,report_date' });

            if(!error) {
                Swal.fire({ title: 'تم التحديث', icon: 'success', background: '#1e293b', color: '#fff', confirmButtonColor: '#38bdf8' }).then(() => location.reload());
            }
        }

        async function saveFollowup() {
            const target = document.getElementById('f_select').value;
            const addVal = Number(document.getElementById('f_val').value);
            if(!target || !addVal) return Swal.fire('نقص بيانات', 'يرجى اختيار الموظف وتحديد الرقم', 'error');

            const today = new Date().toISOString().split('T')[0];
            
            // جلب القيمة الحالية (التحديث التراكمي)
            const { data: current } = await sb.from('bookings_reports').select('confirmed_count').eq('employee_username', target).eq('report_date', today).single();
            const newTotal = (current ? Number(current.confirmed_count || 0) : 0) + addVal;

            const { error } = await sb.from('bookings_reports').upsert([
                { employee_username: target, report_date: today, confirmed_count: newTotal }
            ], { onConflict: 'employee_username,report_date' });

            if(!error) {
                Swal.fire({ title: 'تمت الإضافة', text: `تم تحديث واصل ${target} بنجاح`, icon: 'success', background: '#1e293b', color: '#fff' });
                document.getElementById('f_val').value = '';
            }
        }

        function logout() { localStorage.clear(); window.location.href='index.html'; }
    </script>
</body>
</html>
