<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فحص النظام</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #f1f5f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .debug-card { background: white; padding: 2rem; border-radius: 2rem; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; max-width: 90%; }
    </style>
</head>
<body>

    <div id="loader" class="debug-card">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto mb-4"></div>
        <h2 class="text-xl font-black text-slate-700">جاري فحص الاتصال...</h2>
        <p id="status_msg" class="text-sm text-slate-500 mt-2">يرجى الانتظار</p>
    </div>

    <script>
        // إعدادات Supabase
        const _SB_URL = 'https://iqagigpqwwtvriqvlfbv.supabase.co';
        const _SB_KEY = 'sb_publishable_5xbaPlWHgjeeaIwceEFRrQ_d9aZ6Zax';
        const sb = supabase.createClient(_SB_URL, _SB_KEY);

        window.onload = function() {
            console.log("بدء الفحص...");
            const data = localStorage.getItem('user_session');
            
            if (!data) {
                document.getElementById('status_msg').innerHTML = "❌ خطأ: لا توجد جلسة دخول.<br>يرجى تسجيل الدخول من الصفحة الرئيسية أولاً.";
                document.getElementById('status_msg').classList.add('text-red-600');
                return;
            }

            try {
                const user = JSON.parse(data);
                console.log("بيانات المستخدم المستلمة:", user);

                // تحديد الدور الوظيفي (تأكد من المسميات في قاعدة بياناتك)
                const role = user.role || user.user_job_role;

                if (role === 'ردود' || role === 'متابعة') {
                    // إذا كان الدور صحيحاً، سنقوم بإظهار رسالة نجاح ثم التوجه لواجهة الموظف
                    Swal.fire({
                        title: 'تم التحقق!',
                        text: `أهلاً بك يا ${user.username}`,
                        icon: 'success',
                        timer: 1500,
                        showConfirmButton: false
                    }).then(() => {
                        renderDashboard(user, role);
                    });
                } else {
                    document.getElementById('status_msg').innerText = "نوع الحساب (" + role + ") غير مصرح له بدخول هذه الصفحة.";
                }
            } catch (e) {
                document.getElementById('status_msg').innerText = "خطأ في قراءة بيانات الجلسة.";
            }
        };

        function renderDashboard(user, role) {
            // هنا نقوم بتبديل محتوى الصفحة بالكامل لواجهة الموظف
            document.body.innerHTML = `
                <div class="min-h-screen w-full p-4" style="background:${role === 'ردود' ? '#2563eb' : '#7c3aed'}">
                    <div class="bg-white rounded-[2rem] p-6 shadow-2xl mt-10 text-right">
                        <h1 class="text-2xl font-black text-slate-800">مرحباً ${user.username}</h1>
                        <p class="text-slate-500 font-bold">لوحة تحكم: ${role}</p>
                        <hr class="my-4">
                        <div class="space-y-4">
                             <div class="p-4 bg-slate-100 rounded-xl font-bold">كود الموظف: ${user.employee_code || 'غير متوفر'}</div>
                             <div class="p-4 bg-slate-100 rounded-xl font-bold">الفريق: ${user.team || 'عام'}</div>
                        </div>
                        <button onclick="localStorage.clear(); location.href='index.html'" class="w-full mt-6 bg-red-500 text-white py-4 rounded-xl font-black italic uppercase">تسجيل خروج</button>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
