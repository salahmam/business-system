<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head><meta charset="UTF-8"><script src="https://cdn.tailwindcss.com"></script><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script></head>
<body class="bg-gray-50 min-h-screen">
    <header class="bg-indigo-600 text-white p-4 flex justify-between items-center shadow-lg">
        <div><p id="u_info" class="font-bold"></p><p id="u_meta" class="text-[10px] opacity-70"></p></div>
        <button onclick="location.href='index.html'" class="text-xs bg-indigo-800 px-3 py-1 rounded-lg">خروج</button>
    </header>

    <div class="p-4 max-w-lg mx-auto space-y-4">
        <div class="bg-white p-6 rounded-3xl shadow-sm border space-y-4">
            <h3 id="u_title" class="font-bold border-r-4 border-indigo-600 pr-2">تقرير اليوم</h3>
            <input type="date" id="u_date" class="w-full p-3 border rounded-2xl text-center font-bold">
            
            <div id="u_followup" class="hidden">
                <label class="text-[10px] text-gray-400">اختر موظف الردود:</label>
                <select id="u_staff_list" class="w-full p-3 border rounded-2xl bg-white font-bold"></select>
            </div>

            <input type="number" id="u_count" placeholder="العدد" class="w-full p-5 border rounded-3xl text-center text-3xl font-bold text-indigo-600">
            <button onclick="sendReport()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-lg">إرسال الآن ✅</button>
            <p id="st" class="text-center text-xs hidden"></p>
        </div>
    </div>

    <script>
        const SB_URL = 'https://iqagigpqwwtvriqvlfbv.supabase.co';
        const SB_KEY = 'sb_publishable_5xbaPlWHgjeeaIwceEFRrQ_d9aZ6Zax';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);
        const user = JSON.parse(localStorage.getItem('user_session'));

        window.onload = async () => {
            document.getElementById('u_info').innerText = user.username;
            document.getElementById('u_meta').innerText = `${user.role} | ${user.shift||'--'}`;
            document.getElementById('u_date').valueAsDate = new Date();
            
            if(user.role === 'متابعة') {
                document.getElementById('u_followup').classList.remove('hidden');
                document.getElementById('u_title').innerText = "تأكيد الواصل";
                const { data } = await _supabase.from('users').select('username').eq('role','ردود');
                data.forEach(s => { let o = document.createElement('option'); o.value=s.username; o.text=s.username; document.getElementById('u_staff_list').add(o); });
            }
        };

        async function sendReport() {
            const count = parseInt(document.getElementById('u_count').value);
            const date = document.getElementById('u_date').value;
            const target = (user.role === 'متابعة') ? document.getElementById('u_staff_list').value : user.username;
            
            let pts = 0;
            if(user.role === 'ردود') { if(count >= 35) pts=2; else if(count>=25) pts=1; }

            const d = { employee_username: target, report_date: date };
            if(user.role === 'ردود') { d.bookings_count = count; d.bonus_points = pts; }
            else { d.confirmed_count = count; }

            const { error } = await _supabase.from('bookings_reports').upsert([d], { onConflict: 'employee_username,report_date' });
            document.getElementById('st').innerText = error ? "❌ خطأ في الحفظ" : "✅ تم الإرسال بنجاح";
            document.getElementById('st').classList.remove('hidden');
        }
    </script>
</body>
</html>
