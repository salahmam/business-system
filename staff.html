<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>واجهة العمل | Business System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Tajawal', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen">

    <header class="bg-indigo-700 text-white p-4 flex justify-between items-center shadow-lg">
        <div>
            <span id="user_info" class="font-bold block text-sm">جاري التحميل...</span>
            <span id="user_code" class="text-[10px] opacity-80">الرمز: --</span>
        </div>
        <button onclick="logout()" class="bg-indigo-900 px-3 py-1 rounded-lg text-xs">خروج</button>
    </header>

    <div class="p-4 max-w-lg mx-auto space-y-4">
        
        <div class="bg-white p-4 rounded-2xl shadow-sm border grid grid-cols-2 gap-3">
            <div class="text-center p-2 border-l">
                <span class="block text-[10px] text-gray-500">أيام العمل (هذا الشهر)</span>
                <span id="work_days" class="font-bold text-indigo-600 text-xl">0</span>
            </div>
            <div class="text-center p-2">
                <span class="block text-[10px] text-gray-500">إجمالي المكافآت</span>
                <span id="total_bonus" class="font-bold text-green-600 text-xl">0</span>
            </div>
            <div class="col-span-2 pt-2 border-t text-center">
                <span class="text-[10px] text-gray-400 italic">الراتب الأساسي المسجل: <span id="base_salary">0</span></span>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm border space-y-4">
            <h2 id="action_title" class="font-bold text-gray-700 border-r-4 border-indigo-600 pr-2">إرسال التقرير اليومي</h2>
            
            <div>
                <label class="block text-xs text-gray-500 mb-1">تحديد التاريخ</label>
                <input type="date" id="report_date" class="w-full p-3 bg-gray-50 border rounded-xl outline-none">
            </div>

            <div id="count_input_area">
                <label id="label_text" class="block text-xs text-gray-500 mb-1">عدد الحجوزات اليوم</label>
                <input type="number" id="daily_count" placeholder="0" class="w-full p-4 bg-gray-50 border rounded-xl outline-none text-2xl font-bold text-center">
            </div>

            <div id="followup_area" class="hidden">
                <label class="block text-xs text-gray-500 mb-1">اختر موظف الردود</label>
                <select id="staff_list" class="w-full p-3 bg-gray-50 border rounded-xl outline-none bg-white">
                    <option value="">-- اختر من القائمة --</option>
                </select>
            </div>

            <button onclick="submitReport()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold shadow-lg active:scale-95 transition-all">إرسال البيانات الآن</button>
            <div id="status" class="text-center text-sm font-bold hidden"></div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://iqagigpqwwtvriqvlfbv.supabase.co';
        const SB_KEY = 'sb_publishable_5xbaPlWHgjeeaIwceEFRrQ_d9aZ6Zax';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let user = JSON.parse(localStorage.getItem('user_session'));

        window.onload = async () => {
            if (!user) window.location.href = 'index.html';
            
            document.getElementById('user_info').innerText = `${user.username} (${user.role})`;
            document.getElementById('user_code').innerText = `الرمز الموحد: ${user.employee_code}`;
            document.getElementById('base_salary').innerText = user.salary;
            document.getElementById('report_date').valueAsDate = new Date();

            if (user.role === 'متابعة') {
                document.getElementById('action_title').innerText = "تأكيد الواصل (متابعة)";
                document.getElementById('label_text').innerText = "عدد الواصل الفعلي";
                document.getElementById('followup_area').classList.remove('hidden');
                loadStaffList();
            }
            
            loadUserStats();
        };

        // جلب قائمة موظفي الردود للمتابعة
        async function loadStaffList() {
            const { data } = await _supabase.from('users').select('username, employee_code').eq('role', 'ردود');
            const select = document.getElementById('staff_list');
            data.forEach(s => {
                let opt = document.createElement('option');
                opt.value = s.username;
                opt.text = `${s.username} (${s.employee_code})`;
                select.add(opt);
            });
        }

        async function submitReport() {
            const date = document.getElementById('report_date').value;
            const count = parseInt(document.getElementById('daily_count').value);
            const targetUser = (user.role === 'متابعة') ? document.getElementById('staff_list').value : user.username;

            if (!count || !targetUser) return alert("أكمل البيانات أولاً");

            let points = 0;
            if (user.role === 'ردود') {
                if (count > 35) points = 2; else if (count >= 25) points = 1;
            }

            const reportData = {
                employee_username: targetUser,
                report_date: date
            };

            if (user.role === 'ردود') {
                reportData.bookings_count = count;
                reportData.bonus_points = points;
            } else {
                reportData.confirmed_count = count;
            }

            // تحديث أو إدخال
            const { error } = await _supabase.from('bookings_reports').upsert([reportData], { onConflict: 'employee_username, report_date' });

            const status = document.getElementById('status');
            status.classList.remove('hidden');
            if (error) {
                status.innerText = "❌ خطأ في الإرسال";
                status.className = "text-red-500 text-center font-bold";
            } else {
                status.innerText = "✅ تم حفظ التقرير بنجاح";
                status.className = "text-green-600 text-center font-bold";
                loadUserStats();
            }
        }

        async function loadUserStats() {
            const { data } = await _supabase.from('bookings_reports')
                .select('*')
                .eq('employee_username', user.username);
            
            if (data) {
                document.getElementById('work_days').innerText = data.length;
                const totalBonus = data.reduce((sum, row) => sum + (row.bonus_points || 0), 0);
                document.getElementById('total_bonus').innerText = totalBonus;
            }
        }

        function logout() { localStorage.clear(); window.location.href = 'index.html'; }
    </script>
</body>
</html>
