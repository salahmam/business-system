<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إدارة صلاح الخليفة | الاحترافية</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f8fafc; }
        .glass-card { background: white; border-radius: 2rem; border: 1px solid #e2e8f0; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); z-index: 1000; items-center: center; justify-content: center; }
        .modal.active { display: flex; }
        .action-menu { display: none; position: absolute; left: 0; top: 100%; background: white; border-radius: 1rem; box-shadow: 0 10px 25px rgba(0,0,0,0.1); z-index: 50; min-width: 160px; border: 1px solid #eee; }
        .action-menu.active { display: block; }
    </style>
</head>
<body class="pb-24">

    <!-- Header -->
    <header class="sticky top-0 z-[100] bg-white border-b px-5 py-4 flex justify-between items-center shadow-sm">
        <h1 class="text-xl font-black text-slate-900">صلاح الخليفة</h1>
        <div class="flex gap-2">
            <button onclick="location.reload()" class="w-10 h-10 flex items-center justify-center bg-blue-50 text-blue-600 rounded-full border border-blue-100">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"></path><path d="M21 3v5h-5"></path></svg>
            </button>
        </div>
    </header>

    <div class="p-4 space-y-6">

        <!-- فلاتر التواريخ (موسطة) -->
        <div class="flex justify-center w-full">
            <div class="glass-card p-6 w-full max-w-md space-y-4 border-blue-50">
                <div class="grid grid-cols-2 gap-4">
                    <div class="text-center">
                        <label class="text-[10px] font-bold text-slate-400 block mb-1">من تاريخ</label>
                        <input type="date" id="d_from" class="w-full p-3 bg-slate-50 rounded-xl font-bold border-none text-sm text-center outline-none">
                    </div>
                    <div class="text-center">
                        <label class="text-[10px] font-bold text-slate-400 block mb-1">إلى تاريخ</label>
                        <input type="date" id="d_to" class="w-full p-3 bg-slate-50 rounded-xl font-bold border-none text-sm text-center outline-none">
                    </div>
                </div>
                <button onclick="loadAllData()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-black text-sm shadow-lg shadow-blue-200">عرض البيانات والنتائج</button>
            </div>
        </div>

        <!-- جدول التيمات -->
        <div class="glass-card overflow-hidden">
            <div class="p-4 bg-slate-50 border-b flex justify-between items-center">
                <h3 class="font-black text-xs">📊 التيمات والـ CPL</h3>
                <button onclick="addNewTeam()" class="bg-slate-200 p-2 rounded-lg text-slate-600">➕</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-right text-[12px]">
                    <thead class="bg-slate-50 text-slate-400 font-bold">
                        <tr><th class="p-4">اسم التيم</th><th class="text-center">المصرف</th><th class="text-center">الحجوزات</th><th class="text-center">الإجراء</th></tr>
                    </thead>
                    <tbody id="team_table" class="divide-y font-bold"></tbody>
                </table>
            </div>
        </div>

        <!-- أداء الردود -->
        <div class="glass-card overflow-hidden">
            <div class="p-4 bg-slate-50 border-b font-black text-xs uppercase">📈 أداء الحجوزات والمكافآت</div>
            <div class="overflow-x-auto">
                <table class="w-full text-right text-[12px]">
                    <thead class="bg-slate-50 text-slate-400 font-bold">
                        <tr class="text-center"><th class="p-4 text-right">الموظف</th><th>الحجوزات</th><th class="text-emerald-600">الواصل</th><th class="text-blue-600">المكافآت</th></tr>
                    </thead>
                    <tbody id="redod_table" class="divide-y text-center font-bold"></tbody>
                </table>
            </div>
        </div>

        <!-- أزرار الإدارة -->
        <div class="grid grid-cols-1 gap-4">
            <button onclick="toggleUserList()" class="bg-slate-900 text-white p-5 rounded-2xl font-black flex justify-between items-center">
                <span>👥 إدارة شؤون الموظفين</span>
                <span class="text-xs bg-white/20 px-2 py-1 rounded">عرض القائمة</span>
            </button>
            <button onclick="openAddModal()" class="bg-white border-2 border-blue-600 text-blue-600 p-5 rounded-2xl font-black flex justify-center items-center gap-2">
                <span>➕ إضافة موظف جديد</span>
            </button>
            <button onclick="resetDataByDate()" class="bg-red-50 text-red-500 p-4 rounded-xl font-bold text-xs border border-red-100">♻️ تصفير بيانات الفترة المحددة</button>
        </div>

        <div id="user_list_section" class="hidden space-y-3">
            <div id="detailed_user_list" class="space-y-3"></div>
        </div>

    </div>

    <!-- نافذة إضافة موظف -->
    <div id="add_modal" class="modal p-6">
        <div class="bg-white w-full max-w-sm p-6 rounded-[2rem] space-y-4 shadow-2xl">
            <h3 class="text-center font-black text-lg">بيانات الموظف</h3>
            <input id="in_name" placeholder="الاسم" class="w-full p-3 bg-slate-50 rounded-xl font-bold border-none">
            <input id="in_pass" placeholder="الباسورد" class="w-full p-3 bg-slate-50 rounded-xl font-bold border-none">
            <input id="in_code" placeholder="الكود" class="w-full p-3 bg-slate-50 rounded-xl font-bold border-none">
            <select id="in_role" onchange="handleRoleChange()" class="w-full p-3 bg-slate-50 rounded-xl font-bold border-none">
                <option value="ردود">ردود</option><option value="مروج">مروج</option><option value="متابعة">متابعة</option>
            </select>
            <div id="redod_fields" class="space-y-3">
                <select id="in_team" class="w-full p-3 bg-blue-50 rounded-xl font-bold border-none"></select>
            </div>
            <input id="in_sal" type="number" placeholder="الراتب" class="w-full p-3 bg-slate-50 rounded-xl font-bold border-none">
            <div class="flex gap-2">
                <button onclick="saveNewUser()" class="flex-1 bg-blue-600 text-white p-3 rounded-xl font-bold">حفظ</button>
                <button onclick="closeAddModal()" class="flex-1 bg-slate-100 p-3 rounded-xl font-bold">إغاء</button>
            </div>
        </div>
    </div>

    <script>
        const sb = supabase.createClient('https://iqagigpqwwtvriqvlfbv.supabase.co', 'sb_publishable_5xbaPlWHgjeeaIwceEFRrQ_d9aZ6Zax');

        // الدوال الأساسية
        function toggleUserList() { document.getElementById('user_list_section').classList.toggle('hidden'); }
        function openAddModal() { loadTeamsMenu(); document.getElementById('add_modal').classList.add('active'); }
        function closeAddModal() { document.getElementById('add_modal').classList.remove('active'); }
        function handleRoleChange() { document.getElementById('redod_fields').style.display = (document.getElementById('in_role').value === 'ردود') ? 'block' : 'none'; }

        async function loadTeamsMenu() {
            const { data } = await sb.from('teams').select('*');
            document.getElementById('in_team').innerHTML = data.map(t => `<option value="${t.team_name}">${t.team_name}</option>`).join('');
        }

        async function loadAllData() {
            const from = document.getElementById('d_from').value;
            const to = document.getElementById('d_to').value;
            
            const { data: users } = await sb.from('users').select('*').neq('role','مدير');
            const { data: teams } = await sb.from('teams').select('*');
            const { data: reports } = await sb.from('bookings_reports').select('*').gte('report_date', from).lte('report_date', to);
            const { data: exps } = await sb.from('marketing_expenses').select('*').gte('expense_date', from).lte('expense_date', to);
            const { data: adjs } = await sb.from('adjustments').select('*');

            // التيمات
            document.getElementById('team_table').innerHTML = teams.map(t => {
                let spent = exps.filter(e => e.target_team === t.team_name).reduce((a,b)=>a+Number(b.amount_spent),0);
                let bks = reports.filter(r => users.find(u=>u.username===r.employee_username && u.team===t.team_name)).reduce((a,b)=>a+Number(b.bookings_count),0);
                return `<tr><td class="p-4">${t.team_name}</td><td class="text-center text-amber-600">${spent}</td><td class="text-center">${bks}</td>
                <td class="text-center"><button onclick="editTeam('${t.id}','${t.team_name}')" class="text-blue-500">تعديل</button></td></tr>`;
            }).join('');

            // الردود
            document.getElementById('redod_table').innerHTML = users.filter(u=>u.user_job_role==='ردود').map(u => {
                let ur = reports.filter(r=>r.employee_username===u.username);
                let bks = ur.reduce((a,b)=>a+Number(b.bookings_count),0);
                let wasl = ur.reduce((a,b)=>a+Number(b.confirmed_count),0);
                let bonuses = adjs.filter(a=>a.user_id===u.id && a.type==='bonus').reduce((a,b)=>a+Number(b.amount),0);
                return `<tr class="border-b"><td class="p-4 text-right font-black">${u.username}</td><td>${bks}</td><td class="text-emerald-600">${wasl}</td><td class="text-blue-600">${bonuses}</td></tr>`;
            }).join('');

            // قائمة الموظفين مع زر الإجراءات
            document.getElementById('detailed_user_list').innerHTML = users.map(u => `
                <div class="bg-white p-4 rounded-2xl border flex justify-between items-center relative">
                    <div>
                        <div class="font-black text-sm">${u.username}</div>
                        <div class="text-[10px] text-slate-400">راتب: ${u.salary} | كود: ${u.employee_code}</div>
                    </div>
                    <div class="relative">
                        <button onclick="toggleMenu('${u.id}')" class="bg-slate-100 px-3 py-1 rounded-lg font-bold">إجراءات</button>
                        <div id="menu-${u.id}" class="action-menu shadow-xl border">
                            <button onclick="editUser('${u.id}')" class="w-full p-3 text-right text-blue-600 border-b">📝 تعديل بيانات</button>
                            <button onclick="addAdj('${u.id}','bonus')" class="w-full p-3 text-right text-emerald-600 border-b">🎁 مكافأة</button>
                            <button onclick="addAdj('${u.id}','penalty')" class="w-full p-3 text-right text-red-600 border-b">💸 خصم</button>
                            <button onclick="delU('${u.id}')" class="w-full p-3 text-right text-slate-800">🗑️ حذف</button>
                        </div>
                    </div>
                </div>`).join('');
        }

        function toggleMenu(id) {
            document.querySelectorAll('.action-menu').forEach(m => m.id !== 'menu-'+id && m.classList.remove('active'));
            document.getElementById('menu-'+id).classList.toggle('active');
        }

        // --- وظيفة التصفير حسب التاريخ ---
        async function resetDataByDate() {
            const from = document.getElementById('d_from').value;
            const to = document.getElementById('d_to').value;
            const { isConfirmed } = await Swal.fire({
                title: 'تصفير البيانات؟',
                text: `سيتم حذف الحجوزات والمصاريف من ${from} إلى ${to}`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: 'نعم، حذف'
            });
            if(isConfirmed) {
                await sb.from('bookings_reports').delete().gte('report_date', from).lte('report_date', to);
                await sb.from('marketing_expenses').delete().gte('expense_date', from).lte('expense_date', to);
                Swal.fire('تم التصفير'); loadAllData();
            }
        }

        // --- وظائف التعديل ---
        async function editUser(id) {
            const { value: formValues } = await Swal.fire({
                title: 'تعديل موظف',
                html: '<input id="swal-n" class="swal2-input" placeholder="الاسم الجديد"><input id="swal-s" class="swal2-input" placeholder="الراتب">',
                focusConfirm: false,
                preConfirm: () => [document.getElementById('swal-n').value, document.getElementById('swal-s').value]
            });
            if (formValues[0]) {
                await sb.from('users').update({ username: formValues[0], salary: formValues[1] }).eq('id', id);
                loadAllData();
            }
        }

        async function editTeam(id, oldName) {
            const { value: newName } = await Swal.fire({ title: 'تعديل اسم التيم', input: 'text', inputValue: oldName });
            if(newName) { await sb.from('teams').update({ team_name: newName }).eq('id', id); loadAllData(); }
        }

        async function saveNewUser() {
            const { error } = await sb.from('users').insert([{
                username: document.getElementById('in_name').value, password: document.getElementById('in_pass').value,
                employee_code: document.getElementById('in_code').value, user_job_role: document.getElementById('in_role').value,
                team: document.getElementById('in_team').value, salary: document.getElementById('in_sal').value, role: 'موظف'
            }]);
            if(!error) { closeAddModal(); loadAllData(); }
        }

        async function addAdj(uid, type) {
            const { value: amt } = await Swal.fire({ title: 'المبلغ', input: 'number' });
            if(amt) { await sb.from('adjustments').insert([{user_id: uid, amount: amt, type: type}]); loadAllData(); }
        }

        async function delU(id) { if(confirm("حذف؟")) { await sb.from('users').delete().eq('id', id); loadAllData(); } }
        async function addNewTeam() { const { value: t } = await Swal.fire({ title: 'تيم جديد', input: 'text' }); if(t) { await sb.from('teams').insert([{team_name: t}]); loadAllData(); } }

        window.onload = () => {
            const now = new Date().toISOString().split('T')[0];
            document.getElementById('d_from').value = now;
            document.getElementById('d_to').value = now;
            loadAllData();
        };
    </script>
</body>
</html>
