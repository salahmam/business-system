<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صلاح الخليفة | الإدارة العليا</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #f8fafc; }
        .action-btn { transition: all 0.2s; cursor: pointer; }
        .action-btn:active { transform: scale(0.9); }
        .glass { background: white; border-radius: 1.5rem; border: 1px solid #e2e8f0; box-shadow: 0 4px 20px -5px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="pb-10">

    <!-- Header -->
    <div class="bg-slate-900 text-white p-6 mb-6 shadow-2xl rounded-b-[3rem] sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black text-blue-400">صلاح الخليفة</h1>
                <p class="text-[10px] text-slate-400">نظام الإدارة المتكامل</p>
            </div>
            <div class="flex gap-2">
                <button onclick="loadAll()" class="bg-blue-600 px-4 py-2 rounded-xl font-bold text-sm action-btn">تحديث 🔄</button>
                <button onclick="location.href='index.html'" class="bg-red-500/20 text-red-400 px-4 py-2 rounded-xl text-sm font-bold action-btn">خروج</button>
            </div>
        </div>
    </div>

    <div class="max-w-6xl mx-auto px-4 space-y-6">
        
        <!-- التحكم بالتاريخ والحذف -->
        <div class="glass p-6 grid grid-cols-1 md:grid-cols-3 gap-4 items-end">
            <div><label class="text-xs font-bold text-slate-400 mr-2">من تاريخ</label><input type="date" id="d1" class="w-full p-3 bg-slate-50 rounded-xl font-bold border-none outline-none text-center"></div>
            <div><label class="text-xs font-bold text-slate-400 mr-2">إلى تاريخ</label><input type="date" id="d2" class="w-full p-3 bg-slate-50 rounded-xl font-bold border-none outline-none text-center"></div>
            <div class="flex gap-2">
                <button onclick="loadAll()" class="flex-1 bg-slate-800 text-white p-3 rounded-xl font-bold action-btn">عرض</button>
                <button onclick="clearByDate()" class="flex-1 bg-red-50 text-red-600 p-3 rounded-xl font-bold text-xs action-btn">تصفير التاريخ ♻️</button>
            </div>
        </div>

        <!-- أزرار الإدارة -->
        <div class="grid grid-cols-2 gap-4">
            <button onclick="addUserModal()" class="bg-blue-600 text-white p-5 rounded-2xl font-black shadow-lg action-btn text-sm">➕ إضافة موظف</button>
            <button onclick="toggleUsers()" class="bg-white text-slate-700 border p-5 rounded-2xl font-black shadow-sm action-btn text-sm">👥 قائمة اليوزرات</button>
        </div>

        <!-- قائمة اليوزرات (مخفية) -->
        <div id="users_box" class="hidden glass p-6"><div id="users_list" class="grid grid-cols-1 md:grid-cols-3 gap-2"></div></div>

        <!-- الجدول 1: التيمات والمصرف -->
        <div class="glass overflow-hidden">
            <div class="p-4 bg-slate-50 border-b flex justify-between items-center"><h3 class="font-black text-slate-800">💰 إحصائيات التيمات</h3><button onclick="addTeam()" class="text-xs text-blue-600 font-bold underline">+ تيم جديد</button></div>
            <table class="w-full text-right border-collapse">
                <thead class="bg-slate-50 text-[10px] text-slate-400 font-black"><tr><th class="p-4">التيم</th><th class="text-center">المصرف</th><th class="text-center">الحجز</th><th class="text-center text-blue-600">CPL</th></tr></thead>
                <tbody id="team_rows" class="font-bold text-sm divide-y divide-slate-50"></tbody>
            </table>
        </div>

        <!-- الجدول 2: الردود فقط -->
        <div class="glass overflow-hidden">
            <div class="p-4 bg-slate-50 border-b"><h3 class="font-black text-slate-800">👥 أداء موظفي الردود</h3></div>
            <div class="overflow-x-auto">
                <table class="w-full text-right">
                    <thead class="bg-slate-50 text-[10px] text-slate-400 font-black">
                        <tr><th class="p-4">الموظف</th><th class="text-center">الشفت</th><th class="text-center">الحجز</th><th class="text-center text-emerald-600">الواصل</th><th class="text-center text-amber-500">⭐</th><th class="text-center">الإجراءات</th></tr>
                    </thead>
                    <tbody id="redod_rows" class="font-bold text-sm divide-y divide-slate-50"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const sb = supabase.createClient('https://iqagigpqwwtvriqvlfbv.supabase.co', 'sb_publishable_5xbaPlWHgjeeaIwceEFRrQ_d9aZ6Zax');

        async function loadAll() {
            const f = document.getElementById('d1').value, t = document.getElementById('d2').value;
            const { data: u } = await sb.from('users').select('*').neq('role','مدير');
            const { data: tm } = await sb.from('teams').select('*');
            const { data: rp } = await sb.from('bookings_reports').select('*').gte('report_date', f).lte('report_date', t);
            const { data: ex } = await sb.from('marketing_expenses').select('*').gte('expense_date', f).lte('expense_date', t);

            // اليوزرات
            document.getElementById('users_list').innerHTML = u.map(x => `<div class="p-3 bg-slate-50 rounded-xl text-[10px]"><b>${x.username}</b><br>كود: ${x.employee_code} | سر: ${x.password}</div>`).join('');

            // التيمات
            document.getElementById('team_rows').innerHTML = tm.map(x => {
                let s = ex.filter(e => e.target_team === x.team_name).reduce((a,b)=>a+Number(b.amount_spent),0);
                let b = rp.filter(r => u.find(us=>us.username===r.employee_username && us.team===x.team_name)).reduce((a,b)=>a+Number(b.bookings_count),0);
                return `<tr><td class="p-4">${x.team_name}</td><td class="text-center text-amber-600">${s}</td><td class="text-center">${b}</td><td class="text-center text-blue-600 font-black">${b>0?(s/b).toFixed(0):0}</td></tr>`;
            }).join('');

            // الردود
            document.getElementById('redod_rows').innerHTML = u.filter(x=>x.user_job_role==='ردود').map(x => {
                let ur = rp.filter(r=>r.employee_username===x.username);
                let b = ur.reduce((a,b)=>a+Number(b.bookings_count),0);
                let w = ur.reduce((a,b)=>a+Number(b.confirmed_count),0);
                let s = x.shift_type==='شفت كامل' ? (w>=50?2:w>=30?1:0) : (w>=25?2:w>=15?1:0);
                return `<tr>
                    <td class="p-4">${x.username}</td><td class="text-center text-[10px]">${x.shift_type}</td><td class="text-center">${b}</td><td class="text-center text-emerald-600">${w}</td><td class="text-center text-amber-500">${s}⭐</td>
                    <td class="p-4 text-center">
                        <button onclick="editU('${x.id}')" class="text-blue-500 text-[10px] ml-2">تعديل</button>
                        <button onclick="delU('${x.id}')" class="text-red-500 text-[10px]">حذف</button>
                    </td>
                </tr>`;
            }).join('');
        }

        async function addUserModal() {
            const { value: formValues } = await Swal.fire({
                title: 'إضافة موظف',
                html: '<input id="sw_n" class="swal2-input" placeholder="الاسم"><input id="sw_p" class="swal2-input" placeholder="كلمة السر"><input id="sw_c" class="swal2-input" placeholder="الكود A01"><select id="sw_r" class="swal2-input"><option value="ردود">ردود</option><option value="مروج">مروج</option><option value="متابعة">متابعة</option></select><select id="sw_s" class="swal2-input"><option value="شفت كامل">شفت كامل</option><option value="نصف شفت">نصف شفت</option></select>',
                focusConfirm: false,
                preConfirm: () => [ document.getElementById('sw_n').value, document.getElementById('sw_p').value, document.getElementById('sw_c').value, document.getElementById('sw_r').value, document.getElementById('sw_s').value ]
            });
            if (formValues) {
                await sb.from('users').insert([{username:formValues[0], password:formValues[1], employee_code:formValues[2], user_job_role:formValues[3], shift_type:formValues[4], role:'موظف'}]);
                loadAll();
            }
        }

        function toggleUsers() { document.getElementById('users_box').classList.toggle('hidden'); }
        async function delU(id) { if(confirm("حذف؟")) { await sb.from('users').delete().eq('id', id); loadAll(); } }
        async function addTeam() { const { value: t } = await Swal.fire({ title: 'اسم التيم', input: 'text' }); if(t) { await sb.from('teams').insert([{team_name: t}]); loadAll(); } }
        async function clearByDate() { const d = document.getElementById('d1').value; if(confirm(`حذف إحصاء يوم ${d}؟`)) { await sb.from('bookings_reports').delete().eq('report_date', d); await sb.from('marketing_expenses').delete().eq('expense_date', d); loadAll(); } }

        window.onload = () => {
            const n = new Date().toISOString().split('T')[0];
            document.getElementById('d1').value = n; document.getElementById('d2').value = n;
            loadAll();
        };
    </script>
</body>
</html>
