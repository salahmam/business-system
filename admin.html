<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الإدارة | النظام المتكامل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Tajawal', sans-serif; }</style>
</head>
<body class="bg-gray-100 min-h-screen">
    <header class="bg-slate-800 text-white p-4 flex justify-between items-center shadow-lg">
        <h1 class="font-bold">لوحة التحكم المركزية</h1>
        <button onclick="localStorage.clear(); window.location.href='index.html'" class="bg-red-600 px-4 py-2 rounded-lg text-sm">خروج</button>
    </header>

    <div class="p-4 max-w-6xl mx-auto space-y-6">
        <div class="bg-white p-6 rounded-2xl shadow-sm border">
            <h2 class="font-bold text-blue-600 mb-4 border-r-4 border-blue-600 pr-2">إضافة موظف جديد</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4" id="add_form">
                <input type="text" id="new_name" placeholder="الاسم الكامل" class="p-3 border rounded-xl">
                <input type="text" id="new_pass" placeholder="كلمة المرور" class="p-3 border rounded-xl text-center">
                <input type="text" id="new_code" placeholder="الرمز (مثال: B01)" class="p-3 border rounded-xl text-center">
                <select id="new_role" onchange="toggleFields()" class="p-3 border rounded-xl bg-white font-bold">
                    <option value="">اختر الدور</option>
                    <option value="مروج">مروج</option>
                    <option value="ردود">موظف ردود</option>
                    <option value="متابعة">موظف متابعة</option>
                </select>
                <input type="text" id="new_team" placeholder="التيم (A, B, C...)" class="p-3 border rounded-xl text-center" style="display:none">
                <select id="new_shift" class="p-3 border rounded-xl bg-white font-bold" style="display:none">
                    <option value="صباحي">شفت صباحي</option>
                    <option value="مسائي">شفت مسائي</option>
                </select>
                <input type="number" id="new_salary" placeholder="الراتب الشهري" class="p-3 border rounded-xl text-center">
                <button onclick="addEmployee()" class="md:col-span-3 bg-blue-600 text-white py-3 rounded-xl font-bold">حفظ الموظف ✅</button>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border overflow-x-auto">
            <div class="p-4 border-b bg-gray-50 flex gap-2">
                <select id="f_role" onchange="loadEmployees()" class="p-2 border rounded-lg text-xs"><option value="">كل الأدوار</option><option value="مروج">مروج</option><option value="ردود">ردود</option></select>
                <input type="text" id="f_team" oninput="loadEmployees()" placeholder="فلتر بالتيم" class="p-2 border rounded-lg text-xs w-24">
            </div>
            <table class="w-full text-right text-sm">
                <thead class="bg-gray-100">
                    <tr><th class="p-3">الموظف</th><th class="p-3">الدور/التيم</th><th class="p-3">الشفت</th><th class="p-3 text-center">إجراءات</th></tr>
                </thead>
                <tbody id="emp_table"></tbody>
            </table>
        </div>
    </div>

    <script>
        const SB_URL = 'https://iqagigpqwwtvriqvlfbv.supabase.co';
        const SB_KEY = 'sb_publishable_5xbaPlWHgjeeaIwceEFRrQ_d9aZ6Zax';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        function toggleFields() {
            const role = document.getElementById('new_role').value;
            document.getElementById('new_team').style.display = (role === 'ردود' || role === 'مروج') ? 'block' : 'none';
            document.getElementById('new_shift').style.display = (role === 'ردود') ? 'block' : 'none';
        }

        async function addEmployee() {
            const d = {
                username: document.getElementById('new_name').value,
                password: document.getElementById('new_pass').value,
                employee_code: document.getElementById('new_code').value,
                role: document.getElementById('new_role').value,
                team: document.getElementById('new_team').value,
                shift: document.getElementById('new_shift').value,
                salary: parseFloat(document.getElementById('new_salary').value)
            };
            const { error } = await _supabase.from('users').insert([d]);
            if(error) alert(error.message); else { alert("تم الحفظ!"); location.reload(); }
        }

        async function loadEmployees() {
            let q = _supabase.from('users').select('*').neq('role', 'مدير');
            if(document.getElementById('f_role').value) q = q.eq('role', document.getElementById('f_role').value);
            if(document.getElementById('f_team').value) q = q.ilike('team', `%${document.getElementById('f_team').value}%`);
            
            const { data } = await q;
            const table = document.getElementById('emp_table');
            table.innerHTML = "";
            data.forEach(emp => {
                table.innerHTML += `<tr class="border-b hover:bg-gray-50">
                    <td class="p-3 font-bold">${emp.username}<br><span class="text-xs text-blue-500">${emp.employee_code}</span></td>
                    <td class="p-3">${emp.role} / ${emp.team || '--'}</td>
                    <td class="p-3">${emp.shift || '--'}</td>
                    <td class="p-3 text-center">
                        <button onclick="deleteUser('${emp.id}')" class="text-red-500 text-xs">حذف</button>
                    </td>
                </tr>`;
            });
        }
        window.onload = loadEmployees;
    </script>
</body>
</html>
