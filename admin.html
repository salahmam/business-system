<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الإدارة المركزية | صلاح الخليفة</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f1f5f9; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(4px); align-items: center; justify-content: center; z-index: 50; padding: 1rem; }
        .modal.active { display: flex; }
        .glass-card { background: white; max-height: 90vh; overflow-y: auto; border-radius: 2rem; width: 100%; max-width: 500px; padding: 2rem; }
        .tab-btn.active { background-color: #2563eb; color: white; }
    </style>
</head>
<body class="min-h-screen pb-24 text-right">

    <header class="bg-slate-900 text-white p-5 sticky top-0 z-40 shadow-xl flex justify-between items-center">
        <h2 class="font-bold text-lg text-blue-400">لوحة الإدارة المركزية</h2>
        <button onclick="localStorage.clear(); location.href='index.html'" class="bg-red-500/10 text-red-400 px-4 py-2 rounded-xl text-xs font-bold border border-red-500/20">خروج</button>
    </header>

    <div class="p-4 max-w-5xl mx-auto space-y-6">
        
        <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-200">
            <p class="text-[10px] font-black text-slate-400 mb-3 text-center uppercase tracking-widest">تحديد فترة التقرير</p>
            <div class="grid grid-cols-2 gap-4">
                <div class="flex flex-col items-center">
                    <span class="text-[9px] mb-1">من تاريخ</span>
                    <input type="date" id="date_from" onchange="loadAllData()" class="w-full p-3 bg-slate-50 border rounded-xl text-center font-bold outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="flex flex-col items-center">
                    <span class="text-[9px] mb-1">إلى تاريخ</span>
                    <input type="date" id="date_to" onchange="loadAllData()" class="w-full p-3 bg-slate-50 border rounded-xl text-center font-bold outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-2">
            <div class="bg-slate-800 text-white p-4 rounded-2xl text-center shadow-lg">
                <p class="text-[9px] text-slate-400">إجمالي الحجز</p>
                <h3 id="stat_bookings" class="font-black text-xl text-blue-400">0</h3>
            </div>
            <div class="bg-slate-800 text-white p-4 rounded-2xl text-center shadow-lg">
                <p class="text-[9px] text-slate-400">إجمالي الواصل</p>
                <h3 id="stat_confirmed" class="font-black text-xl text-emerald-400">0</h3>
            </div>
            <div class="bg-slate-800 text-white p-4 rounded-2xl text-center shadow-lg">
                <p class="text-[9px] text-slate-400">إجمالي المصرف</p>
                <h3 id="stat_spent" class="font-black text-xl text-amber-400">0</h3>
            </div>
        </div>

        <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-200">
            <h3 class="font-bold mb-4 text-slate-800 flex items-center gap-2 text-sm">
                <span class="w-2 h-5 bg-blue-600 rounded-full"></span> 📈 التقرير التحليلي الشامل
            </h3>
            <div class="overflow-x-auto">
                <table class="w-full text-right text-xs">
                    <thead class="text-slate-400 border-b">
                        <tr>
                            <th class="p-3">الموظف/التيم</th>
                            <th class="p-3 text-center">الرتبة</th>
                            <th class="p-3 text-center">حجز</th>
                            <th class="p-3 text-center">واصل</th>
                            <th class="p-3 text-center">مصرف</th>
                            <th class="p-3 text-center text-blue-600">CPL</th>
                        </tr>
                    </thead>
                    <tbody id="main_table_body" class="divide-y divide-slate-50 text-slate-700">
                        </tbody>
                </table>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <button onclick="openAddModal()" class="bg-blue-600 text-white p-5 rounded-2xl font-bold shadow-lg">➕ موظف جديد</button>
            <div class="flex flex-col gap-2">
                <button onclick="document.getElementById('emp_list_section').classList.toggle('hidden')" class="bg-slate-800 text-white p-3 rounded-2xl font-bold">👥 القائمة</button>
                <button onclick="fullReset()" class="bg-red-600 text-white p-3 rounded-2xl font-bold text-xs">♻️ تصفير النظام</button>
            </div>
        </div>

        <div id="emp_list_section" class="hidden space-y-3 bg-white p-4 rounded-[2rem] border shadow-inner">
            <div id="emp_list_mobile" class="space-y-2"></div>
        </div>
    </div>

    <div id="m" class="modal">
        <div class="glass-card space-y-4 shadow-2xl text-right max-w-[400px]">
            <div class="text-center border-b pb-3">
                <h4 id="mn" class="font-black text-slate-800 text-lg uppercase">الاسم</h4>
                <p id="m_role_display" class="text-[10px] text-blue-500 font-bold"></p>
            </div>
            <div class="grid grid-cols-3 gap-2 text-center text-xs font-bold">
                <div class="bg-slate-50 p-3 rounded-2xl"><span>أيام</span><br><span id="det_days">0</span></div>
                <div class="bg-amber-50 p-3 rounded-2xl"><span>نقاط</span><br><span id="det_points">0</span></div>
                <div class="bg-red-50 p-3 rounded-2xl"><span>خصم</span><br><span id="det_abs">0</span></div>
            </div>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="addAdj('bonus')" class="py-3 bg-emerald-600 text-white rounded-xl font-bold text-xs">⭐ مكافأة</button>
                <button onclick="addAdj('absence')" class="py-3 bg-red-600 text-white rounded-xl font-bold text-xs">💰 خصم</button>
            </div>
            <div class="border-t pt-3">
                <p class="text-[10px] font-black text-slate-400 mb-2 uppercase">سجل الحركات للفترة المختارة:</p>
                <div id="adj_log" class="space-y-2 max-h-[150px] overflow-y-auto pr-1"></div>
            </div>
            <div class="grid grid-cols-2 gap-2 pt-2 border-t">
                <button onclick="editEmp()" class="py-2 bg-slate-100 text-slate-600 rounded-xl font-bold text-xs">✏️ تعديل</button>
                <button onclick="deleteEmployee()" class="py-2 bg-red-50 text-red-500 rounded-xl font-bold text-xs">🗑️ حذف</button>
            </div>
            <button onclick="toggleModal('m')" class="text-slate-400 text-[10px] block w-full text-center underline">إغلاق</button>
        </div>
    </div>

    <div id="add_emp_modal" class="modal">
        <div class="glass-card space-y-4 shadow-2xl">
            <h3 id="modal_title" class="font-black text-xl text-center">إضافة موظف</h3>
            <div class="flex flex-col gap-3">
                <input id="en" placeholder="الاسم الكامل" class="p-4 bg-slate-50 border rounded-2xl text-center font-bold outline-none">
                <input id="ep" type="password" placeholder="كلمة السر" class="p-4 bg-slate-50 border rounded-2xl text-center">
                <input id="ec" placeholder="الكود A01" class="p-4 bg-slate-50 border rounded-2xl text-center font-black text-blue-600">
                
                <select id="user_job_role" class="p-4 bg-slate-50 border rounded-2xl font-bold text-center">
                    <option value="ردود">ردود</option>
                    <option value="مروج">مروج</option>
                    <option value="متابعة">متابعة</option>
                </select>

                <select id="shift_type" onchange="toggleShiftUI()" class="p-4 bg-slate-50 border rounded-2xl font-bold text-center">
                    <option value="شفت كامل">شفت كامل</option>
                    <option value="نصف شفت">نصف شفت</option>
                </select>

                <div id="shift_time_div" class="hidden">
                    <select id="shift_time" class="p-4 bg-amber-50 border border-amber-200 rounded-2xl font-bold text-center w-full">
                        <option value="صباحي">صباحي ☀️</option>
                        <option value="مسائي">مسائي 🌙</option>
                    </select>
                </div>

                <input id="et" placeholder="اسم التيم (للمروج والردود)" class="p-4 bg-slate-50 border rounded-2xl text-center">
                <input id="ey" type="number" placeholder="الراتب الأساسي" class="p-4 bg-slate-50 border rounded-2xl text-center">
            </div>
            <div class="grid grid-cols-2 gap-3 mt-4">
                <button onclick="saveEmployee()" class="bg-blue-600 text-white p-4 rounded-2xl font-bold shadow-lg">حفظ</button>
                <button onclick="toggleModal('add_emp_modal')" class="bg-slate-200 p-4 rounded-2xl font-bold">إلغاء</button>
            </div>
        </div>
    </div>

    <script>
        const sb = supabase.createClient('https://iqagigpqwwtvriqvlfbv.supabase.co', 'sb_publishable_5xbaPlWHgjeeaIwceEFRrQ_d9aZ6Zax');
        let cur = null, allUsers = [];

        function toggleModal(id) { document.getElementById(id).classList.toggle('active'); }
        function toggleShiftUI() {
            const type = document.getElementById('shift_type').value;
            document.getElementById('shift_time_div').classList.toggle('hidden', type !== 'نصف شفت');
        }

        async function loadAllData() {
            const from = document.getElementById('date_from').value;
            const to = document.getElementById('date_to').value;
            if(!from || !to) return;

            // 1. جلب الموظفين
            const { data: users } = await sb.from('users').select('*').neq('role','مدير');
            allUsers = users || [];

            // 2. جلب التقارير (حجز وواصل)
            const { data: reports } = await sb.from('bookings_reports').select('*').gte('report_date', from).lte('report_date', to);
            
            // 3. جلب المصاريف
            const { data: expenses } = await sb.from('marketing_expenses').select('*').gte('expense_date', from).lte('expense_date', to);

            // تجميع البيانات
            const summary = {};
            let tBookings = 0, tConfirmed = 0, tSpent = 0;

            allUsers.forEach(u => {
                summary[u.username] = { ...u, bookings: 0, confirmed: 0, spent: 0 };
            });

            if(reports) reports.forEach(r => {
                if(summary[r.employee_username]) {
                    summary[r.employee_username].bookings += Number(r.bookings_count || 0);
                    summary[r.employee_username].confirmed += Number(r.confirmed_count || 0);
                    tBookings += Number(r.bookings_count || 0);
                    tConfirmed += Number(r.confirmed_count || 0);
                }
            });

            // تجميع المصاريف حسب التيم
            const teamExpenses = {};
            if(expenses) expenses.forEach(ex => {
                teamExpenses[ex.target_team] = (teamExpenses[ex.target_team] || 0) + Number(ex.amount_spent);
                tSpent += Number(ex.amount_spent);
            });

            // عرض البيانات في الجدول
            const tbody = document.getElementById('main_table_body');
            tbody.innerHTML = "";
            for (let name in summary) {
                const s = summary[name];
                const myTeamSpent = teamExpenses[s.team] || 0;
                const cpl = s.bookings > 0 ? (myTeamSpent / s.bookings).toFixed(0) : 0;

                tbody.innerHTML += `
                    <tr class="border-b">
                        <td class="p-4 font-bold">
                            <button onclick="pop('${s.id}','${s.username}')" class="text-blue-600 text-right hover:underline">${name}</button>
                            <p class="text-[8px] text-slate-400 font-normal">${s.team || '---'}</p>
                        </td>
                        <td class="p-4 text-center text-[9px] font-bold text-slate-500">${s.user_job_role}</td>
                        <td class="p-4 text-center font-bold">${s.bookings}</td>
                        <td class="p-4 text-center text-emerald-600 font-bold">${s.confirmed}</td>
                        <td class="p-4 text-center text-[9px]">${myTeamSpent.toLocaleString()}</td>
                        <td class="p-4 text-center font-black text-blue-600">${cpl}</td>
                    </tr>`;
            }

            document.getElementById('stat_bookings').innerText = tBookings;
            document.getElementById('stat_confirmed').innerText = tConfirmed;
            document.getElementById('stat_spent').innerText = tSpent.toLocaleString();
            
            // تحديث قائمة الموظفين
            const list = document.getElementById('emp_list_mobile');
            list.innerHTML = "";
            allUsers.forEach(u => {
                list.innerHTML += `<div class="bg-slate-50 p-4 rounded-2xl flex justify-between items-center border">
                    <div class="text-right">
                        <p class="font-bold">${u.username}</p>
                        <p class="text-[9px] text-slate-400">${u.user_job_role} | ${u.shift_type}</p>
                    </div>
                    <button onclick="pop('${u.id}','${u.username}')" class="w-10 h-10 bg-white border rounded-xl flex items-center justify-center">⚙️</button>
                </div>`;
            });
        }

        async function pop(id, n) {
            cur = { id, n }; const u = allUsers.find(x => x.id == id);
            document.getElementById('mn').innerText = n;
            document.getElementById('m_role_display').innerText = `${u.user_job_role} | ${u.employee_code}`;
            toggleModal('m');
            refreshEmpStats();
        }

        async function refreshEmpStats() {
            const from = document.getElementById('date_from').value;
            const to = document.getElementById('date_to').value;
            const u = allUsers.find(x => x.id == cur.id);

            // نقاط واصل
            const { data: reports } = await sb.from('bookings_reports').select('confirmed_count').eq('employee_username', cur.n).gte('report_date', from).lte('report_date', to);
            let autoPoints = 0;
            if(reports) reports.forEach(r => {
                const c = r.confirmed_count || 0;
                if(u.shift_type === 'شفت كامل') { if(c >= 50) autoPoints += 2; else if(c >= 30) autoPoints += 1; }
                else { if(c >= 25) autoPoints += 2; else if(c >= 15) autoPoints += 1; }
            });

            // تعديلات يدوية
            const { data: adjs } = await sb.from('adjustments').select('*').eq('user_id', cur.id).gte('created_at', from).lte('created_at', to);
            let manPoints = 0, totalAbs = 0;
            const logDiv = document.getElementById('adj_log'); logDiv.innerHTML = "";

            if(adjs) adjs.forEach(a => {
                if(a.type==='bonus') manPoints += Number(a.amount); else totalAbs += Number(a.amount);
                logDiv.innerHTML += `<div class="flex justify-between items-center bg-slate-50 p-2 rounded-xl border">
                    <span class="text-[10px] font-bold ${a.type==='bonus'?'text-emerald-600':'text-red-600'}">${a.type==='bonus'?'⭐':'💰'} ${a.amount}</span>
                    <button onclick="deleteAdj('${a.id}')" class="text-red-400 text-[9px] bg-white px-2 py-1 rounded-lg border shadow-sm">حذف</button>
                </div>`;
            });

            document.getElementById('det_days').innerText = reports?.length || 0;
            document.getElementById('det_points').innerText = autoPoints + manPoints;
            document.getElementById('det_abs').innerText = totalAbs.toLocaleString();
        }

        async function addAdj(t) {
            const { value: v } = await Swal.fire({ title: 'أدخل القيمة', input: 'number' });
            if(v) { 
                await sb.from('adjustments').insert([{ user_id:cur.id, type:t, amount:v, created_at: document.getElementById('date_from').value }]); 
                refreshEmpStats(); 
            }
        }

        async function deleteAdj(adjId) {
            if(confirm('هل تريد حذف هذه العملية؟')) {
                await sb.from('adjustments').delete().eq('id', adjId);
                refreshEmpStats();
            }
        }

        async function saveEmployee() {
            const obj = {
                username: document.getElementById('en').value,
                password: document.getElementById('ep').value,
                employee_code: document.getElementById('ec').value,
                user_job_role: document.getElementById('user_job_role').value,
                shift_type: document.getElementById('shift_type').value,
                shift_time: document.getElementById('shift_type').value === 'نصف شفت' ? document.getElementById('shift_time').value : 'كامل',
                team: document.getElementById('et').value,
                salary: document.getElementById('ey').value,
                role: 'موظف'
            };
            if(cur && document.getElementById('modal_title').innerText.includes("تعديل")) {
                await sb.from('users').update(obj).eq('id', cur.id);
            } else {
                await sb.from('users').insert([obj]);
            }
            location.reload();
        }

        async function editEmp() {
            const u = allUsers.find(x => x.id == cur.id);
            document.getElementById('modal_title').innerText = "تعديل: " + u.username;
            document.getElementById('en').value = u.username;
            document.getElementById('ec').value = u.employee_code;
            document.getElementById('user_job_role').value = u.user_job_role;
            document.getElementById('shift_type').value = u.shift_type;
            document.getElementById('et').value = u.team || "";
            document.getElementById('ey').value = u.salary || 0;
            toggleShiftUI();
            toggleModal('m');
            toggleModal('add_emp_modal');
        }

        async function deleteEmployee() {
            if(confirm('سيتم حذف الموظف وكافة بياناته نهائياً! هل أنت متأكد؟')) {
                await sb.from('users').delete().eq('id', cur.id);
                location.reload();
            }
        }

        async function fullReset() {
            const { isConfirmed } = await Swal.fire({ title: 'تصفير شامل؟', text: "سيتم مسح كافة التقارير والمصاريف!", icon: 'warning', showCancelButton: true });
            if(isConfirmed) {
                await sb.from('bookings_reports').delete().neq('id', 0);
                await sb.from('marketing_expenses').delete().neq('id', 0);
                await sb.from('adjustments').delete().neq('id', 0);
                location.reload();
            }
        }

        function openAddModal() {
            cur = null; document.getElementById('modal_title').innerText = "إضافة موظف جديد";
            ['en','ep','ec','et','ey'].forEach(i => document.getElementById(i).value = "");
            toggleModal('add_emp_modal');
        }

        window.onload = () => {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('date_from').value = today;
            document.getElementById('date_to').value = today;
            loadAllData();
        };
    </script>
</body>
</html>
