<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة صلاح الخليفة | الإدارة العليا</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f1f5f9; }
        .glass-card { background: white; border-radius: 2rem; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .btn-action { transition: all 0.2s; cursor: pointer; }
        .btn-action:active { scale: 0.95; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
    </style>
</head>
<body class="pb-10">

    <!-- Header: صلاح الخليفة -->
    <header class="bg-slate-900 text-white p-6 sticky top-0 z-50 shadow-xl rounded-b-[2.5rem]">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black text-blue-400">صلاح الخليفة</h1>
                <p class="text-[10px] text-slate-400 font-bold tracking-widest uppercase">المدير العام للنظام</p>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="loadAllData()" class="bg-blue-600 hover:bg-blue-700 px-5 py-2 rounded-xl font-bold text-sm btn-action">تحديث البيانات 🔄</button>
                <button onclick="logout()" class="bg-red-500/20 text-red-400 border border-red-500/30 px-4 py-2 rounded-xl text-sm font-bold btn-action">خروج 🚪</button>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto p-4 space-y-6">

        <!-- الفلترة الزمنية والتصفير -->
        <div class="glass-card p-6 grid grid-cols-1 md:grid-cols-3 gap-4 items-end">
            <div>
                <label class="block text-[10px] font-black text-slate-400 mb-2 mr-2">من تاريخ</label>
                <input type="date" id="date_from" class="w-full p-4 bg-slate-50 border-none rounded-2xl font-bold text-center">
            </div>
            <div>
                <label class="block text-[10px] font-black text-slate-400 mb-2 mr-2">إلى تاريخ</label>
                <input type="date" id="date_to" class="w-full p-4 bg-slate-50 border-none rounded-2xl font-bold text-center">
            </div>
            <div class="flex gap-2">
                <button onclick="loadAllData()" class="flex-1 bg-slate-800 text-white p-4 rounded-2xl font-bold btn-action">عرض الإحصائيات</button>
                <button onclick="resetByDate()" class="flex-1 bg-red-50 text-red-600 border border-red-100 p-4 rounded-2xl font-bold text-[10px] btn-action">تصفير التاريخ المحدد ♻️</button>
            </div>
        </div>

        <!-- أزرار التحكم واليوزرات -->
        <div class="grid grid-cols-2 gap-4">
            <button onclick="openAddModal()" class="bg-blue-600 text-white p-6 rounded-[2rem] font-black text-lg shadow-lg btn-action">➕ إضافة موظف</button>
            <button onclick="toggleUserList()" class="bg-white border text-slate-700 p-6 rounded-[2rem] font-black text-lg shadow-sm btn-action">👥 قائمة اليوزرات</button>
        </div>

        <div id="user_list_box" class="hidden glass-card p-6">
            <h3 class="font-black text-blue-600 mb-4 underline text-sm">بيانات الدخول للموظفين:</h3>
            <div id="user_grid" class="grid grid-cols-1 md:grid-cols-3 gap-3"></div>
        </div>

        <!-- الجدول العلوي: التيمات والمصرف -->
        <div class="glass-card overflow-hidden">
            <div class="p-5 bg-slate-50 border-b flex justify-between items-center">
                <h3 class="font-black text-slate-800 flex items-center gap-2">💰 إحصائيات التيمات والـ CPL</h3>
                <button onclick="addNewTeam()" class="text-xs bg-blue-50 text-blue-600 px-4 py-2 rounded-lg font-bold border border-blue-100">+ إضافة تيم</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-right">
                    <thead class="bg-slate-50 text-[10px] text-slate-400 font-black uppercase">
                        <tr>
                            <th class="p-4">اسم التيم</th>
                            <th class="p-4 text-center">إجمالي المصرف</th>
                            <th class="p-4 text-center">إجمالي الحجز</th>
                            <th class="p-4 text-center text-blue-600">سعر الطلب CPL</th>
                        </tr>
                    </thead>
                    <tbody id="teams_table_body" class="divide-y divide-slate-50 font-bold text-sm"></tbody>
                </table>
            </div>
        </div>

        <!-- الجدول السفلي: الردود فقط مع النجوم -->
        <div class="glass-card overflow-hidden">
            <div class="p-5 bg-slate-50 border-b">
                <h3 class="font-black text-slate-800">📉 أداء موظفي الردود (حجز / واصل)</h3>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-right">
                    <thead class="bg-slate-50 text-[10px] text-slate-400 font-black uppercase">
                        <tr>
                            <th class="p-4 text-center">الموظف</th>
                            <th class="p-4 text-center">الشفت</th>
                            <th class="p-4 text-center">الحجز</th>
                            <th class="p-4 text-center text-emerald-600">الواصل</th>
                            <th class="p-4 text-center text-amber-500">النقاط ⭐</th>
                            <th class="p-4 text-center">مكافأة / خصم</th>
                            <th class="p-4 text-center">الإجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="redod_table_body" class="divide-y divide-slate-50 font-bold text-sm text-center"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- نافذة إضافة موظف -->
    <div id="add_modal" class="modal">
        <div class="bg-white w-full max-w-md p-8 rounded-[2.5rem] space-y-4 mx-4 shadow-2xl border">
            <h3 class="text-center font-black text-xl text-slate-800">إضافة موظف جديد</h3>
            <input id="n_name" placeholder="الاسم الكامل" class="w-full p-4 bg-slate-50 rounded-xl font-bold text-center border-none outline-none focus:ring-2 focus:ring-blue-500">
            <input id="n_pass" type="text" placeholder="كلمة السر" class="w-full p-4 bg-slate-50 rounded-xl font-bold text-center border-none outline-none focus:ring-2 focus:ring-blue-500">
            <input id="n_code" placeholder="الكود (A01)" class="w-full p-4 bg-slate-50 rounded-xl font-bold text-center text-blue-600 border-none outline-none focus:ring-2 focus:ring-blue-500">
            
            <div class="grid grid-cols-2 gap-2">
                <select id="n_role" class="p-4 bg-slate-50 rounded-xl font-bold text-center outline-none">
                    <option value="ردود">رتبة: ردود</option>
                    <option value="مروج">رتبة: مروج</option>
                    <option value="متابعة">رتبة: متابعة</option>
                </select>
                <select id="n_shift" class="p-4 bg-slate-50 rounded-xl font-bold text-center outline-none">
                    <option value="صباحي">شفت صباحي</option>
                    <option value="مسائي">شفت مسائي</option>
                    <option value="شفت كامل">شفت كامل</option>
                </select>
            </div>
            
            <select id="n_team" class="w-full p-4 bg-blue-50 text-blue-700 rounded-xl font-bold text-center outline-none"></select>
            <input id="n_sal" type="number" placeholder="الراتب" class="w-full p-4 bg-slate-50 rounded-xl font-bold text-center outline-none">

            <div class="flex gap-2 pt-4">
                <button onclick="saveUser()" class="flex-1 bg-blue-600 text-white p-4 rounded-xl font-bold btn-action">حفظ الحساب</button>
                <button onclick="closeAddModal()" class="flex-1 bg-slate-100 text-slate-500 p-4 rounded-xl font-bold btn-action">إلغاء</button>
            </div>
        </div>
    </div>

    <script>
        const sb = supabase.createClient('https://iqagigpqwwtvriqvlfbv.supabase.co', 'sb_publishable_5xbaPlWHgjeeaIwceEFRrQ_d9aZ6Zax');

        function openAddModal() { 
            loadTeamsMenu();
            document.getElementById('add_modal').classList.add('active'); 
        }
        function closeAddModal() { document.getElementById('add_modal').classList.remove('active'); }
        function toggleUserList() { document.getElementById('user_list_box').classList.toggle('hidden'); }

        async function loadTeamsMenu() {
            const { data } = await sb.from('teams').select('*');
            document.getElementById('n_team').innerHTML = data.map(t => `<option value="${t.team_name}">${t.team_name}</option>`).join('');
        }

        async function saveUser() {
            const payload = {
                username: document.getElementById('n_name').value,
                password: document.getElementById('n_pass').value,
                employee_code: document.getElementById('n_code').value,
                user_job_role: document.getElementById('n_role').value,
                shift_type: document.getElementById('n_shift').value,
                team: document.getElementById('n_team').value,
                salary: document.getElementById('n_sal').value,
                role: 'موظف'
            };
            const { error } = await sb.from('users').insert([payload]);
            if(!error) { 
                Swal.fire('تم!', 'تمت إضافة الموظف بنجاح', 'success');
                closeAddModal();
                loadAllData();
            }
        }

        async function loadAllData() {
            const from = document.getElementById('date_from').value;
            const to = document.getElementById('date_to').value;
            
            const { data: users } = await sb.from('users').select('*').neq('role','مدير');
            const { data: teams } = await sb.from('teams').select('*');
            const { data: reports } = await sb.from('bookings_reports').select('*').gte('report_date', from).lte('report_date', to);
            const { data: expenses } = await sb.from('marketing_expenses').select('*').gte('expense_date', from).lte('expense_date', to);
            const { data: adjustments } = await sb.from('adjustments').select('*');

            // 1. عرض اليوزرات وباسورداتهم
            document.getElementById('user_grid').innerHTML = users.map(u => `
                <div class="p-3 bg-slate-50 border rounded-xl text-[10px] relative">
                    <button onclick="delUser('${u.id}')" class="absolute top-1 left-1 text-red-300 hover:text-red-600">×</button>
                    <b>${u.username}</b><br>
                    <span class="text-blue-500">كود: ${u.employee_code}</span> | <span>سر: ${u.password}</span>
                </div>
            `).join('');

            // 2. جدول التيمات والـ CPL
            document.getElementById('teams_table_body').innerHTML = teams.map(t => {
                let spent = expenses.filter(e => e.target_team === t.team_name).reduce((a, b) => a + Number(b.amount_spent), 0);
                let bks = reports.filter(r => {
                    let u = users.find(us => us.username === r.employee_username);
                    return u && u.team === t.team_name;
                }).reduce((a, b) => a + Number(b.bookings_count), 0);
                let cpl = bks > 0 ? (spent / bks).toFixed(0) : 0;
                return `<tr><td class="p-4">${t.team_name}</td><td class="text-center text-amber-600">${spent.toLocaleString()}</td><td class="text-center">${bks}</td><td class="text-center text-blue-600 font-black">${cpl}</td></tr>`;
            }).join('');

            // 3. جدول الردود والنجوم حسب الشفت
            document.getElementById('redod_table_body').innerHTML = users.filter(u => u.user_job_role === 'ردود').map(u => {
                let uReps = reports.filter(r => r.employee_username === u.username);
                let hzn = uReps.reduce((a, b) => a + Number(b.bookings_count), 0);
                let wasl = uReps.reduce((a, b) => a + Number(b.confirmed_count), 0);
                
                // حساب النجوم بدقة
                let stars = 0;
                if(u.shift_type === 'شفت كامل') {
                    if(wasl >= 50) stars = 2; else if(wasl >= 30) stars = 1;
                } else { // صباحي أو مسائي (نصف شفت)
                    if(wasl >= 25) stars = 2; else if(wasl >= 15) stars = 1;
                }

                let uAdjs = adjustments.filter(a => a.user_id === u.id);
                let bonus = uAdjs.filter(a => a.type === 'bonus').reduce((a, b) => a + Number(b.amount), 0);
                let penalty = uAdjs.filter(a => a.type === 'penalty').reduce((a, b) => a + Number(b.amount), 0);

                return `<tr>
                    <td class="p-4">${u.username}<br><span class="text-[9px] text-slate-400">${u.team}</span></td>
                    <td class="text-[10px] text-slate-500">${u.shift_type}</td>
                    <td>${hzn}</td>
                    <td class="text-emerald-600">${wasl}</td>
                    <td class="text-amber-500">${stars} ⭐</td>
                    <td class="text-[9px]">
                        <div class="text-emerald-600">+${bonus}</div>
                        <div class="text-red-500">-${penalty}</div>
                    </td>
                    <td class="p-4 flex gap-1 justify-center">
                        <button onclick="addAdj('${u.id}', 'bonus')" class="bg-emerald-50 text-emerald-600 p-2 rounded-lg text-[10px] btn-action">مكافأة</button>
                        <button onclick="addAdj('${u.id}', 'penalty')" class="bg-red-50 text-red-500 p-2 rounded-lg text-[10px] btn-action">خصم</button>
                        <button onclick="delUser('${u.id}')" class="bg-slate-100 text-red-500 p-2 rounded-lg text-[10px] btn-action">حذف</button>
                    </td>
                </tr>`;
            }).join('');
        }

        async function addAdj(uid, type) {
            const { value: amt } = await Swal.fire({ title: 'المبلغ', input: 'number' });
            if(amt) {
                await sb.from('adjustments').insert([{ user_id: uid, amount: amt, type: type }]);
                loadAllData();
            }
        }

        async function resetByDate() {
            const d = document.getElementById('date_from').value;
            const { isConfirmed } = await Swal.fire({ title: 'تصفير إحصائيات يوم ' + d, text: "لا يمكن التراجع!", icon: 'warning', showCancelButton: true });
            if(isConfirmed) {
                await sb.from('bookings_reports').delete().eq('report_date', d);
                await sb.from('marketing_expenses').delete().eq('expense_date', d);
                loadAllData();
            }
        }

        async function delUser(id) { if(confirm("حذف الموظف نهائياً؟")) { await sb.from('users').delete().eq('id', id); loadAllData(); } }
        async function addNewTeam() { 
            const { value: t } = await Swal.fire({ title: 'اسم التيم الجديد', input: 'text' });
            if(t) { await sb.from('teams').insert([{team_name: t}]); loadAllData(); }
        }
        function logout() { localStorage.clear(); location.href='index.html'; }

        window.onload = () => {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('date_from').value = today;
            document.getElementById('date_to').value = today;
            loadAllData();
        };
    </script>
</body>
</html>
