<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام صلاح الخليفة v4.5</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f4f7fa; }
        .glass-card { background: white; border-radius: 2rem; border: 1px solid #e2e8f0; box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
        .loader { border-top-color: #3b82f6; animation: spinner 0.6s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(8px); z-index: 1000; align-items: center; justify-content: center; padding: 1.5rem; }
        .modal.active { display: flex; }
    </style>
</head>
<body class="pb-20">

    <header class="p-5 flex justify-between items-center bg-white border-b sticky top-0 z-[100]">
        <div class="flex items-center gap-3">
             <button onclick="logout()" class="w-10 h-10 flex items-center justify-center rounded-xl bg-red-50 text-red-500 border border-red-100">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            </button>
            <div>
                <h1 class="text-xl font-black text-slate-900 leading-none">صلاح الخليفة</h1>
                <span class="text-[9px] text-blue-500 font-bold tracking-widest uppercase">Admin Management</span>
            </div>
        </div>
        <button onclick="resetDates()" class="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-50 text-slate-600 border border-slate-200" title="تصفير التاريخ">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>
        </button>
    </header>

    <div class="p-4 space-y-6 max-w-lg mx-auto">

        <div class="glass-card p-6">
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="text-[10px] font-black text-slate-400 block mb-1 mr-1">من تاريخ</label>
                    <input type="date" id="d_from" class="w-full bg-slate-50 border-none rounded-xl p-3 text-xs font-bold text-center outline-none ring-1 ring-slate-100 focus:ring-blue-500/20">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 block mb-1 mr-1">إلى تاريخ</label>
                    <input type="date" id="d_to" class="w-full bg-slate-50 border-none rounded-xl p-3 text-xs font-bold text-center outline-none ring-1 ring-slate-100 focus:ring-blue-500/20">
                </div>
            </div>
            <button id="update_btn" onclick="loadAllData()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-sm shadow-xl flex items-center justify-center gap-3 active:scale-[0.97] transition-all">
                <span id="btn_text">تحديث البيانات والنتائج</span>
                <div id="btn_loader" class="hidden loader w-4 h-4 border-2 border-white/30 rounded-full"></div>
            </button>
        </div>

        <div class="glass-card overflow-hidden">
            <div class="p-4 bg-slate-50 border-b flex justify-between items-center">
                <h3 class="font-black text-[10px] text-slate-500">TEAM PERFORMANCE</h3>
                <button onclick="addNewTeam()" class="text-blue-600 font-black text-[10px]">+ إضافة تيم</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-[11px] text-center">
                    <thead class="bg-slate-50 text-slate-400 font-bold border-b">
                        <tr><th class="p-3 text-right">التيم</th><th>المصرف</th><th>الحجوزات</th><th>CPL</th></tr>
                    </thead>
                    <tbody id="team_table" class="divide-y font-bold text-slate-700"></tbody>
                    <tfoot id="team_foot" class="bg-slate-900 text-white font-black"></tfoot>
                </table>
            </div>
        </div>

        <div class="glass-card overflow-hidden">
            <div class="p-4 bg-slate-50 border-b">
                <h3 class="font-black text-[10px] text-slate-500 uppercase">Employee Stats & Rewards</h3>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-[9px] text-center">
                    <thead class="bg-slate-50 text-slate-400 font-bold border-b">
                        <tr class="uppercase">
                            <th class="p-3 text-right">الموظف</th>
                            <th>التيم</th>
                            <th>أيام</th>
                            <th>حجز</th>
                            <th class="text-emerald-600">واصل</th>
                            <th class="text-blue-500">تلقائي</th>
                            <th class="text-blue-500">يدوي</th>
                            <th class="text-red-500">خصم</th>
                            <th class="bg-slate-100 text-slate-900">الإجمالي</th>
                        </tr>
                    </thead>
                    <tbody id="stats_table" class="divide-y font-bold text-slate-700"></tbody>
                </table>
            </div>
        </div>

        <div class="space-y-3">
            <button onclick="toggleUserList()" class="w-full bg-white border border-slate-200 p-5 rounded-3xl font-black flex justify-between items-center px-8 shadow-sm active:scale-95 transition-all">
                <span class="text-slate-700">📂 إدارة شؤون الموظفين</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle></svg>
            </button>
            <div id="user_list_section" class="hidden space-y-2">
                <div id="detailed_user_list" class="space-y-2"></div>
            </div>

            <button onclick="openAddModal()" class="w-full bg-blue-600 text-white p-5 rounded-3xl font-black shadow-lg shadow-blue-100 flex justify-between items-center px-8 active:scale-95 transition-all">
                <span>➕ تسجيل موظف جديد</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </button>
        </div>
    </div>

    <div id="user_modal" class="modal">
        <div class="bg-white w-full max-w-sm p-6 rounded-[2.5rem] space-y-4 shadow-2xl overflow-y-auto max-h-[90vh]">
            <h3 id="modal_title" class="font-black text-center text-slate-900 text-lg">بيانات الموظف</h3>
            <input id="m_id" type="hidden">
            <div class="space-y-3">
                <input id="m_name" type="text" placeholder="اسم الموظف" class="w-full p-3 bg-slate-50 rounded-xl font-bold border-none text-sm">
                <div class="grid grid-cols-2 gap-2">
                    <input id="m_pass" type="text" placeholder="كلمة السر" class="w-full p-3 bg-slate-50 rounded-xl font-bold border-none text-sm text-center">
                    <input id="m_code" type="text" placeholder="الكود" class="w-full p-3 bg-slate-50 rounded-xl font-bold border-none text-sm text-center">
                </div>
                <select id="m_role" onchange="handleModalRole()" class="w-full p-3 bg-slate-50 rounded-xl font-black border-none text-xs">
                    <option value="ردود">ردود</option>
                    <option value="مروج">مروج</option>
                    <option value="متابعة">متابعة</option>
                </select>
                <div id="m_redod_fields" class="space-y-3 bg-blue-50/30 p-4 rounded-2xl">
                    <select id="m_team" class="w-full p-3 rounded-xl border-none font-bold text-xs bg-white shadow-sm"></select>
                    <div class="grid grid-cols-2 gap-2">
                        <select id="m_shift_type" onchange="handleShift()" class="w-full p-3 rounded-xl border-none font-bold text-[10px] bg-white shadow-sm">
                            <option value="شفت كامل">شفت كامل</option>
                            <option value="نصف شفت">نصف شفت</option>
                        </select>
                        <select id="m_shift_time" class="hidden w-full p-3 rounded-xl border-none font-bold text-[10px] bg-white shadow-sm">
                            <option value="صباحي">صباحي</option>
                            <option value="مسائي">مسائي</option>
                        </select>
                    </div>
                </div>
                <input id="m_sal" type="number" placeholder="الراتب الأساسي" class="w-full p-3 bg-slate-50 rounded-xl font-bold border-none text-center text-sm">
            </div>
            <div class="flex gap-2 pt-2">
                <button onclick="saveUser()" class="flex-1 bg-slate-900 text-white p-4 rounded-xl font-black shadow-lg active:scale-95 text-sm">حفظ البيانات</button>
                <button onclick="closeModal()" class="bg-slate-100 p-4 rounded-xl font-black text-slate-400 text-sm">إلغاء</button>
            </div>
            <button id="del_btn" onclick="deleteUser()" class="hidden w-full text-red-400 font-bold text-[10px] pt-1">حذف الموظف نهائياً</button>
        </div>
    </div>

    <script>
        const sb = supabase.createClient('https://iqagigpqwwtvriqvlfbv.supabase.co', 'sb_publishable_5xbaPlWHgjeeaIwceEFRrQ_d9aZ6Zax');

        function logout() { localStorage.clear(); location.reload(); }
        function resetDates() {
            const now = new Date().toISOString().split('T')[0];
            document.getElementById('d_from').value = now;
            document.getElementById('d_to').value = now;
            loadAllData();
        }
        function toggleUserList() { document.getElementById('user_list_section').classList.toggle('hidden'); }
        function closeModal() { document.getElementById('user_modal').classList.remove('active'); }
        function handleShift() { document.getElementById('m_shift_time').classList.toggle('hidden', document.getElementById('m_shift_type').value !== 'نصف شفت'); }
        function handleModalRole() { document.getElementById('m_redod_fields').style.display = (document.getElementById('m_role').value === 'ردود' ? 'block' : 'none'); }

        async function loadAllData() {
            const btn = document.getElementById('update_btn');
            const loader = document.getElementById('btn_loader');
            const from = document.getElementById('d_from').value;
            const to = document.getElementById('d_to').value;

            if(!from || !to) return;
            loader.classList.remove('hidden');
            btn.disabled = true;

            try {
                const { data: users } = await sb.from('users').select('*').neq('role','مدير');
                const { data: teams } = await sb.from('teams').select('*');
                const { data: reports } = await sb.from('bookings_reports').select('*').gte('report_date', from).lte('report_date', to);
                const { data: exps } = await sb.from('marketing_expenses').select('*').gte('expense_date', from).lte('expense_date', to);
                const { data: bonuses } = await sb.from('bonuses').select('*').gte('bonus_date', from).lte('bonus_date', to);
                const { data: penalties } = await sb.from('penalties').select('*').gte('penalty_date', from).lte('penalty_date', to);

                // الجدول الأول
                let ts=0, tb=0;
                document.getElementById('team_table').innerHTML = teams.map(t => {
                    let s = exps.filter(e => e.target_team === t.team_name).reduce((a,b)=>a+Number(b.amount_spent),0);
                    let b = reports.filter(r => users.find(u=>u.username===r.employee_username && u.team===t.team_name)).reduce((a,b)=>a+Number(b.bookings_count),0);
                    ts+=s; tb+=b;
                    return `<tr class="border-b"><td class="p-3 text-right font-black">${t.team_name}</td><td>${s}</td><td>${b}</td><td class="text-blue-600">${b?(s/b).toFixed(1):0}</td></tr>`;
                }).join('');
                document.getElementById('team_foot').innerHTML = `<tr><td class="p-3 text-right italic">الإجمالي العام</td><td>${ts}</td><td>${tb}</td><td>${tb?(ts/tb).toFixed(1):0}</td></tr>`;

                // الجدول الثاني
                document.getElementById('stats_table').innerHTML = users.filter(u=>u.user_job_role==='ردود').map(u => {
                    const ur = reports.filter(r => r.employee_username === u.username);
                    const w = ur.reduce((a,b)=>a+Number(b.confirmed_count),0);
                    const h = ur.reduce((a,b)=>a+Number(b.bookings_count),0);
                    const days = new Set(ur.map(r=>r.report_date)).size;
                    
                    let autoP = 0;
                    if(u.shift_type?.includes("كامل")) { if(w >= 50) autoP = 2; else if(w >= 30) autoP = 1; }
                    else { if(w >= 25) autoP = 2; else if(w >= 15) autoP = 1; }

                    const manualB = bonuses.filter(b => b.employee_username === u.username).reduce((a,b)=>a+Number(b.bonus_amount),0);
                    const manualP = penalties.filter(p => p.employee_username === u.username).reduce((a,b)=>a+Number(p.penalty_amount),0);

                    return `<tr class="border-b hover:bg-slate-50">
                        <td class="p-3 text-right font-black text-slate-800">${u.username}</td>
                        <td class="text-slate-400">${u.team || '-'}</td>
                        <td>${days}</td><td>${h}</td><td class="text-emerald-600">${w}</td>
                        <td class="text-blue-500">${autoP}</td><td class="text-blue-500">${manualB}</td>
                        <td class="text-red-500">${manualP}</td>
                        <td class="bg-slate-50 font-black text-slate-900">${autoP + manualB - manualP}</td>
                    </tr>`;
                }).join('');

                updateUserCards(users);
            } catch (err) { console.error(err); } 
            finally { loader.classList.add('hidden'); btn.disabled = false; }
        }

        function updateUserCards(users) {
            document.getElementById('detailed_user_list').innerHTML = users.map(u => `
                <div class="bg-white p-4 rounded-2xl border border-slate-100 flex justify-between items-center shadow-sm">
                    <div class="text-right">
                        <div class="font-black text-slate-800 text-xs">${u.username}</div>
                        <div class="text-[8px] text-slate-400 font-bold uppercase mt-1">${u.user_job_role} | ${u.team || 'N/A'} | ${u.shift_type || '-'}</div>
                    </div>
                    <div class="flex gap-1.5">
                        <button onclick='addP("${u.username}", "bonus")' class="w-8 h-8 flex items-center justify-center bg-blue-50 text-blue-600 rounded-lg font-black text-xs">+</button>
                        <button onclick='addP("${u.username}", "penalty")' class="w-8 h-8 flex items-center justify-center bg-red-50 text-red-500 rounded-lg font-black text-xs">-</button>
                        <button onclick='openEditModal(${JSON.stringify(u)})' class="bg-slate-900 text-white px-3 py-2 rounded-lg text-[9px] font-black">تعديل</button>
                    </div>
                </div>`).join('');
        }

        async function openAddModal() {
            document.getElementById('m_id').value = "";
            document.getElementById('m_name').value = "";
            document.getElementById('modal_title').innerText = "إضافة موظف جديد";
            const { data } = await sb.from('teams').select('*');
            document.getElementById('m_team').innerHTML = data.map(t => `<option value="${t.team_name}">${t.team_name}</option>`).join('');
            document.getElementById('user_modal').classList.add('active');
        }

        async function openEditModal(u) {
            await openAddModal();
            document.getElementById('m_id').value = u.id;
            document.getElementById('m_name').value = u.username;
            document.getElementById('m_pass').value = u.password;
            document.getElementById('m_code').value = u.employee_code;
            document.getElementById('m_role').value = u.user_job_role;
            document.getElementById('m_sal').value = u.salary;
            document.getElementById('m_team').value = u.team || '';
            document.getElementById('del_btn').classList.remove('hidden');
            handleModalRole();
            document.getElementById('user_modal').classList.add('active');
        }

        async function saveUser() {
            const id = document.getElementById('m_id').value;
            const shift = document.getElementById('m_shift_type').value === 'نصف شفت' ? `نصف (${document.getElementById('m_shift_time').value})` : "شفت كامل";
            const obj = {
                username: document.getElementById('m_name').value,
                password: document.getElementById('m_pass').value,
                employee_code: document.getElementById('m_code').value,
                user_job_role: document.getElementById('m_role').value,
                salary: document.getElementById('m_sal').value,
                team: document.getElementById('m_team').value,
                shift_type: shift,
                role: 'موظف'
            };
            if(id) await sb.from('users').update(obj).eq('id', id);
            else await sb.from('users').insert([obj]);
            closeModal(); loadAllData();
        }

        async function addP(name, type) {
            const { value: pts } = await Swal.fire({ title: 'عدد النقاط', input: 'number', confirmButtonColor: '#0f172a' });
            if (pts) {
                const table = type === 'bonus' ? 'bonuses' : 'penalties';
                await sb.from(table).insert([{ employee_username: name, [type+'_amount']: pts, [type+'_date']: new Date().toISOString().split('T')[0] }]);
                loadAllData();
            }
        }

        window.onload = resetDates;
    </script>
</body>
</html>
