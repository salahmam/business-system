<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>صلاح الخليفة | الإدارة المتكاملة</title>
    <!-- المكتبات -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .app-gradient-blue { background: linear-gradient(135deg, #2563eb, #1d4ed8); }
        .app-gradient-red { background: linear-gradient(135deg, #ef4444, #b91c1c); }
        .app-gradient-dark { background: linear-gradient(135deg, #1e293b, #0f172a); }
        .glass-card { background: white; border-radius: 1.5rem; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); border: 1px solid rgba(226, 232, 240, 0.8); }
        .table-header { background: #f1f5f9; text-transform: uppercase; letter-spacing: 0.05em; font-size: 0.65rem; color: #64748b; }
        .loader { border-top-color: transparent; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(4px); z-index: 1000; align-items: center; justify-content: center; padding: 1rem; }
        .modal.active { display: flex; }
        
        /* إصلاح زحف مربعات التاريخ وتحسين مظهرها */
        input[type="date"] {
            position: relative;
            text-align: center;
            appearance: none;
            -webkit-appearance: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* تعديل محاذاة النص داخل المربع للآيفون والكمبيوتر */
        input[type="date"]::-webkit-date-and-time-value {
            text-align: center;
            width: 100%;
        }

        button:active { transform: scale(0.96); transition: 0.1s; }
    </style>
</head>
<body class="pb-10">

    <!-- Header المطور -->
    <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-100 p-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 app-gradient-blue rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-200">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
            </div>
            <div>
                <h1 class="text-lg font-black text-slate-900 leading-tight">صلاح الخليفة</h1>
                <p class="text-[10px] font-bold text-blue-600 tracking-tighter">نظام الإدارة المتكامل</p>
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="resetDates()" class="w-10 h-10 bg-slate-100 rounded-xl flex items-center justify-center text-slate-600 border border-slate-200" title="تصفير التاريخ">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8m0 0V3m0 5h5"></path></svg>
            </button>
            <button onclick="logout()" class="w-10 h-10 bg-red-50 rounded-xl flex items-center justify-center text-red-500 border border-red-100">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4m7 14l5-5-5-5m5 5H9"></path></svg>
            </button>
        </div>
    </header>

    <main class="p-4 space-y-6 max-w-2xl mx-auto">

        <!-- الفلاتر والتحكم -->
        <section class="glass-card p-5 space-y-4">
            <div class="grid grid-cols-2 gap-3">
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-400 pr-1">من تاريخ</label>
                    <input type="date" id="d_from" class="w-full bg-slate-50 border-none rounded-xl p-3 text-xs font-bold text-center ring-1 ring-slate-100 focus:ring-2 focus:ring-blue-500 transition-all outline-none">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-400 pr-1">إلى تاريخ</label>
                    <input type="date" id="d_to" class="w-full bg-slate-50 border-none rounded-xl p-3 text-xs font-bold text-center ring-1 ring-slate-100 focus:ring-2 focus:ring-blue-500 transition-all outline-none">
                </div>
            </div>
            
            <button id="update_btn" onclick="loadAllData()" class="w-full app-gradient-blue text-white py-4 rounded-2xl font-black text-sm shadow-xl shadow-blue-100 flex items-center justify-center gap-3">
                <span id="btn_text">تحديث البيانات والنتائج</span>
                <div id="btn_loader" class="hidden loader w-4 h-4 border-2 border-white rounded-full"></div>
            </button>

            <button onclick="clearDatabaseByDate()" class="w-full bg-white text-red-500 border-2 border-red-50 py-3 rounded-2xl font-bold text-[11px] flex items-center justify-center gap-2">
                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                تصفير قاعدة البيانات للمدة المحددة
            </button>
        </section>

        <!-- الجدول 1: التيمات -->
        <section class="glass-card overflow-hidden">
            <div class="p-4 border-b border-slate-50 flex justify-between items-center bg-slate-50/50">
                <h3 class="font-black text-[11px] text-slate-500 uppercase tracking-widest">Team Performance</h3>
                <button onclick="addNewTeam()" class="text-blue-600 font-black text-[10px]">+ تيم جديد</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-[11px] text-center border-collapse">
                    <thead class="table-header">
                        <tr>
                            <th class="p-3 text-right">اسم التيم</th>
                            <th>المصرف</th>
                            <th>الحجوزات</th>
                            <th>CPL</th>
                        </tr>
                    </thead>
                    <tbody id="team_table" class="divide-y divide-slate-50 font-bold"></tbody>
                    <tfoot id="team_foot" class="app-gradient-dark text-white font-black"></tfoot>
                </table>
            </div>
        </section>

        <!-- الجدول 2: الموظفين -->
        <section class="glass-card overflow-hidden">
            <div class="p-4 border-b border-slate-50 bg-slate-50/50">
                <h3 class="font-black text-[11px] text-slate-500 uppercase tracking-widest">Employee Analytics Board</h3>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-[10px] text-center border-collapse">
                    <thead class="table-header">
                        <tr>
                            <th class="p-3 text-right">الموظف</th>
                            <th>أيام</th>
                            <th>حجز</th>
                            <th class="text-emerald-600">واصل</th>
                            <th class="text-blue-600">تلقائي</th>
                            <th class="text-blue-600">يدوي</th>
                            <th class="text-red-500">خصم</th>
                            <th class="bg-blue-50 text-blue-900">الإجمالي</th>
                        </tr>
                    </thead>
                    <tbody id="stats_table" class="divide-y divide-slate-50 font-medium"></tbody>
                </table>
            </div>
        </section>

        <!-- الإدارة السريعة -->
        <section class="space-y-3">
            <button onclick="toggleUserList()" class="w-full glass-card p-5 flex justify-between items-center px-6 transition-all active:bg-slate-50">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center text-slate-500">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                    </div>
                    <span class="font-black text-slate-700">إدارة شؤون الموظفين</span>
                </div>
                <svg id="chevron_icon" class="transition-transform" width="18" height="18" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7"></path></svg>
            </button>

            <div id="user_list_section" class="hidden grid grid-cols-1 gap-2">
                <div id="detailed_user_list" class="space-y-2"></div>
                <button onclick="openAddModal()" class="w-full py-4 border-2 border-dashed border-slate-200 rounded-2xl text-slate-400 font-bold text-xs flex items-center justify-center gap-2 hover:bg-slate-50">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    إضافة موظف جديد للنظام
                </button>
            </div>
        </section>
    </main>

    <!-- Modal -->
    <div id="user_modal" class="modal">
        <div class="bg-white w-full max-w-sm p-6 rounded-[2rem] space-y-5 shadow-2xl overflow-y-auto max-h-[90vh]">
            <div class="text-center">
                <h3 id="modal_title" class="font-black text-lg text-slate-900">بيانات الموظف</h3>
                <p class="text-[10px] text-slate-400 font-bold">يرجى ملء الحقول بدقة</p>
            </div>
            
            <div class="space-y-3">
                <input id="m_id" type="hidden">
                <div class="group">
                    <label class="text-[10px] font-black text-slate-400 pr-2">اسم الموظف الكامل</label>
                    <input id="m_name" type="text" class="w-full p-3.5 bg-slate-50 rounded-xl font-bold border-none text-sm outline-none ring-1 ring-slate-100 focus:ring-2 focus:ring-blue-500">
                </div>
                
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[10px] font-black text-slate-400 pr-2">كلمة السر</label>
                        <input id="m_pass" type="text" class="w-full p-3.5 bg-slate-50 rounded-xl font-bold border-none text-sm text-center outline-none ring-1 ring-slate-100">
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-400 pr-2">كود الموظف</label>
                        <input id="m_code" type="text" class="w-full p-3.5 bg-slate-50 rounded-xl font-bold border-none text-sm text-center outline-none ring-1 ring-slate-100">
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-black text-slate-400 pr-2">الدور الوظيفي</label>
                    <select id="m_role" onchange="handleModalRole()" class="w-full p-3.5 bg-slate-50 rounded-xl font-black border-none text-xs outline-none ring-1 ring-slate-100">
                        <option value="ردود">موظف ردود</option>
                        <option value="مروج">موظف مروج</option>
                        <option value="متابعة">موظف متابعة</option>
                    </select>
                </div>

                <div id="m_redod_fields" class="p-4 bg-blue-50/50 rounded-2xl space-y-3 border border-blue-100/50">
                    <div class="grid grid-cols-1 gap-2">
                        <label class="text-[10px] font-black text-blue-400 pr-1">التيم الملحق به</label>
                        <select id="m_team" class="w-full p-3 rounded-xl border-none font-bold text-xs bg-white shadow-sm outline-none"></select>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="text-[10px] font-black text-blue-400 pr-1">نوع الشفت</label>
                            <select id="m_shift_type" onchange="handleShiftUI()" class="w-full p-3 rounded-xl border-none font-bold text-[10px] bg-white shadow-sm">
                                <option value="شفت كامل">شفت كامل</option>
                                <option value="نصف شفت">نصف شفت</option>
                            </select>
                        </div>
                        <div id="shift_time_container" class="hidden">
                            <label class="text-[10px] font-black text-blue-400 pr-1">التوقيت</label>
                            <select id="m_shift_time" class="w-full p-3 rounded-xl border-none font-bold text-[10px] bg-white shadow-sm">
                                <option value="صباحي">صباحي</option>
                                <option value="مسائي">مسائي</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-black text-slate-400 pr-2">الراتب الأساسي</label>
                    <input id="m_sal" type="number" class="w-full p-3.5 bg-slate-50 rounded-xl font-black border-none text-center text-sm outline-none ring-1 ring-slate-100">
                </div>
            </div>

            <div class="grid grid-cols-1 gap-2 pt-2">
                <button onclick="saveUser()" class="w-full app-gradient-dark text-white p-4 rounded-xl font-black shadow-lg shadow-slate-200">حفظ الموظف</button>
                <button onclick="closeModal()" class="w-full bg-slate-100 text-slate-400 p-3 rounded-xl font-bold text-xs">إلغاء</button>
                <button id="del_btn" onclick="deleteUser()" class="hidden w-full text-red-400 font-bold text-[10px] pt-2 underline">حذف الموظف نهائياً من النظام</button>
            </div>
        </div>
    </div>

    <script>
        const sb = supabase.createClient('https://iqagigpqwwtvriqvlfbv.supabase.co', 'sb_publishable_5xbaPlWHgjeeaIwceEFRrQ_d9aZ6Zax');

        // --- إصلاح تسجيل الخروج ---
        function logout() {
            localStorage.clear();
            location.href = 'index.html';
        }
        
        // --- إضافة دالة تعديل التيم (التي كانت ناقصة) ---
        async function editTeam(oldName) {
            const { value: newName } = await Swal.fire({
                title: 'تعديل اسم التيم',
                input: 'text',
                inputValue: oldName,
                showCancelButton: true,
                confirmButtonText: 'تحديث',
                cancelButtonText: 'إلغاء'
            });

            if (newName && newName !== oldName) {
                const { error } = await sb.from('teams').update({ team_name: newName }).eq('team_name', oldName);
                if (!error) {
                    Swal.fire('تم', 'تم تحديث اسم التيم بنجاح', 'success');
                    loadAllData();
                } else {
                    Swal.fire('خطأ', 'تعذر تحديث الاسم', 'error');
                }
            }
        }

        async function addNewTeam() {
            const { value: name } = await Swal.fire({
                title: 'إضافة تيم جديد',
                input: 'text',
                inputPlaceholder: 'ادخل اسم التيم',
                showCancelButton: true
            });
            if(name) {
                await sb.from('teams').insert([{team_name: name}]);
                loadAllData();
            }
        }

        function resetDates() {
            const now = new Date().toISOString().split('T')[0];
            document.getElementById('d_from').value = now;
            document.getElementById('d_to').value = now;
            loadAllData();
        }

        function toggleUserList() {
            const sec = document.getElementById('user_list_section');
            const icon = document.getElementById('chevron_icon');
            sec.classList.toggle('hidden');
            if (sec.classList.contains('hidden')) {
                icon.style.transform = 'rotate(0deg)';
            } else {
                icon.style.transform = 'rotate(180deg)';
            }
        }

        function handleShiftUI() {
            const isHalf = document.getElementById('m_shift_type').value === 'نصف شفت';
            document.getElementById('shift_time_container').classList.toggle('hidden', !isHalf);
        }

        function handleModalRole() {
            const isRedod = document.getElementById('m_role').value === 'ردود';
            document.getElementById('m_redod_fields').style.display = isRedod ? 'block' : 'none';
        }

        function closeModal() {
            document.getElementById('user_modal').classList.remove('active');
        }

        async function loadAllData() {
            const btn = document.getElementById('update_btn');
            const loader = document.getElementById('btn_loader');
            const from = document.getElementById('d_from').value;
            const to = document.getElementById('d_to').value;

            if(!from || !to) return Swal.fire('تنبيه', 'يرجى اختيار التاريخ أولاً', 'warning');

            loader.classList.remove('hidden');
            btn.disabled = true;
            document.getElementById('btn_text').innerText = 'جاري مزامنة البيانات...';

            try {
                const { data: users } = await sb.from('users').select('*').neq('role','مدير');
                const { data: teams } = await sb.from('teams').select('*');
                const { data: reports } = await sb.from('bookings_reports').select('*').gte('report_date', from).lte('report_date', to);
                const { data: expenses } = await sb.from('marketing_expenses').select('*').gte('expense_date', from).lte('expense_date', to);
                const { data: bonuses } = await sb.from('bonuses').select('*').gte('bonus_date', from).lte('bonus_date', to);
                const { data: penalties } = await sb.from('penalties').select('*').gte('penalty_date', from).lte('penalty_date', to);

                renderTeams(teams, users, reports, expenses);
                renderEmployeeStats(users, reports, bonuses, penalties);
                renderUserCards(users);

            } catch (error) {
                Swal.fire('خطأ في الاتصال', 'تعذر جلب البيانات من السيرفر', 'error');
            } finally {
                loader.classList.add('hidden');
                btn.disabled = false;
                document.getElementById('btn_text').innerText = 'تحديث البيانات والنتائج';
            }
        }

        function renderTeams(teams, users, reports, expenses) {
            let totalS = 0;
            let totalB = 0;
            
            const html = teams.map(t => {
                const spent = expenses.filter(e => e.target_team === t.team_name).reduce((sum, current) => sum + Number(current.amount_spent), 0);
                const bookings = reports.filter(r => {
                    const u = users.find(user => user.username === r.employee_username);
                    return u && u.team === t.team_name;
                }).reduce((sum, current) => sum + Number(current.bookings_count), 0);
                
                totalS += spent; 
                totalB += bookings;
                const cpl = bookings > 0 ? (spent / bookings).toFixed(1) : 0;

                return `
                <tr class="border-b border-slate-50">
                    <td class="p-3 text-right">
                        <div class="flex items-center gap-2">
                            <span class="text-blue-600 cursor-pointer" onclick="editTeam('${t.team_name}')">✎</span>
                            ${t.team_name}
                        </div>
                    </td>
                    <td>${spent}</td>
                    <td>${bookings}</td>
                    <td class="text-blue-600 font-black">${cpl}</td>
                </tr>`;
            }).join('');

            document.getElementById('team_table').innerHTML = html;
            document.getElementById('team_foot').innerHTML = `
                <tr>
                    <td class="p-3 text-right italic">الإجمالي العام</td>
                    <td>${totalS}</td>
                    <td>${totalB}</td>
                    <td>${totalB > 0 ? (totalS / totalB).toFixed(1) : 0}</td>
                </tr>`;
        }

        function renderEmployeeStats(users, reports, bonuses, penalties) {
            const html = users.filter(u => u.user_job_role === 'ردود').map(u => {
                const userReports = reports.filter(r => r.employee_username === u.username);
                const bookings = userReports.reduce((s, r) => s + Number(r.bookings_count), 0);
                const confirmed = userReports.reduce((s, r) => s + Number(r.confirmed_count), 0);
                const workingDays = new Set(userReports.map(r => r.report_date)).size;
                
                let autoBonus = 0;
                if(u.shift_type?.includes("كامل")) {
                    if(confirmed >= 50) autoBonus = 2;
                    else if(confirmed >= 30) autoBonus = 1;
                } else {
                    if(confirmed >= 25) autoBonus = 2;
                    else if(confirmed >= 15) autoBonus = 1;
                }

                const manualBonus = bonuses.filter(b => b.employee_username === u.username).reduce((s, b) => s + Number(b.bonus_amount), 0);
                const manualPenalty = penalties.filter(p => p.employee_username === u.username).reduce((s, p) => s + Number(p.penalty_amount), 0);
                const finalPoints = autoBonus + manualBonus - manualPenalty;

                return `
                <tr class="border-b border-slate-50 hover:bg-slate-50">
                    <td class="p-3 text-right">
                        <div class="font-black text-slate-800">${u.username}</div>
                        <div class="text-[8px] text-slate-400 uppercase">${u.team || '-'}</div>
                    </td>
                    <td>${workingDays}</td>
                    <td>${bookings}</td>
                    <td class="text-emerald-600 font-bold">${confirmed}</td>
                    <td class="text-blue-500">${autoBonus}</td>
                    <td class="text-blue-500">${manualBonus}</td>
                    <td class="text-red-400">${manualPenalty}</td>
                    <td class="bg-blue-50/50 font-black text-slate-900 text-xs">${finalPoints}</td>
                </tr>`;
            }).join('');
            document.getElementById('stats_table').innerHTML = html;
        }

        function renderUserCards(users) {
            document.getElementById('detailed_user_list').innerHTML = users.map(u => `
                <div class="glass-card p-4 flex justify-between items-center shadow-sm border-slate-100">
                    <div>
                        <div class="font-black text-slate-800 text-xs">${u.username}</div>
                        <div class="text-[9px] font-bold text-slate-400 mt-0.5 uppercase">${u.user_job_role} | ${u.shift_type || 'غير محدد'}</div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick='addQuickPoint("${u.username}", "bonus")' class="w-8 h-8 flex items-center justify-center bg-blue-50 text-blue-600 rounded-lg font-black">+</button>
                        <button onclick='addQuickPoint("${u.username}", "penalty")' class="w-8 h-8 flex items-center justify-center bg-red-50 text-red-500 rounded-lg font-black">-</button>
                        <button onclick='openEditModal(${JSON.stringify(u)})' class="bg-slate-900 text-white px-3 rounded-lg text-[9px] font-black h-8">تعديل</button>
                    </div>
                </div>
            `).join('');
        }

        async function addQuickPoint(name, type) {
            const title = type === 'bonus' ? 'إضافة مكافأة يدوية' : 'إضافة خصم يدوي';
            const { value: pts } = await Swal.fire({
                title: title,
                input: 'number',
                inputPlaceholder: 'أدخل عدد النقاط',
                confirmButtonText: 'حفظ',
                confirmButtonColor: '#0f172a'
            });

            if (pts) {
                const table = type === 'bonus' ? 'bonuses' : 'penalties';
                const col = type === 'bonus' ? 'bonus_amount' : 'penalty_amount';
                const dateCol = type === 'bonus' ? 'bonus_date' : 'penalty_date';

                await sb.from(table).insert([{
                    employee_username: name,
                    [col]: pts,
                    [dateCol]: new Date().toISOString().split('T')[0]
                }]);
                loadAllData();
            }
        }

        async function openAddModal() {
            document.getElementById('m_id').value = "";
            document.getElementById('m_name').value = "";
            document.getElementById('m_pass').value = "";
            document.getElementById('m_code').value = "";
            document.getElementById('m_sal').value = "";
            document.getElementById('modal_title').innerText = "تسجيل موظف جديد";
            document.getElementById('del_btn').classList.add('hidden');
            
            const { data: teams } = await sb.from('teams').select('*');
            document.getElementById('m_team').innerHTML = teams.map(t => `<option value="${t.team_name}">${t.team_name}</option>`).join('');
            
            handleModalRole();
            document.getElementById('user_modal').classList.add('active');
        }

        async function openEditModal(u) {
            await openAddModal();
            document.getElementById('m_id').value = u.id;
            document.getElementById('m_name').value = u.username;
            document.getElementById('m_pass').value = u.password;
            document.getElementById('m_code').value = u.employee_code;
            document.getElementById('m_role').value = u.user_job_role;
            document.getElementById('m_sal').value = u.salary;
            document.getElementById('m_team').value = u.team || '';
            document.getElementById('modal_title').innerText = "تعديل بيانات الموظف";
            document.getElementById('del_btn').classList.remove('hidden');

            if(u.shift_type?.includes("نصف")) {
                document.getElementById('m_shift_type').value = "نصف شفت";
                document.getElementById('m_shift_time').value = u.shift_type.includes("صباحي") ? "صباحي" : "مسائي";
            } else {
                document.getElementById('m_shift_type').value = "شفت كامل";
            }
            
            handleModalRole();
            handleShiftUI();
        }

        async function saveUser() {
            const id = document.getElementById('m_id').value;
            let shift = document.getElementById('m_shift_type').value;
            if(shift === 'نصف شفت') {
                shift = `نصف (${document.getElementById('m_shift_time').value})`;
            }

            const userData = {
                username: document.getElementById('m_name').value,
                password: document.getElementById('m_pass').value,
                employee_code: document.getElementById('m_code').value,
                user_job_role: document.getElementById('m_role').value,
                salary: document.getElementById('m_sal').value,
                team: document.getElementById('m_team').value,
                shift_type: shift,
                role: 'موظف'
            };

            if(id) {
                await sb.from('users').update(userData).eq('id', id);
            } else {
                await sb.from('users').insert([userData]);
            }

            closeModal();
            loadAllData();
            Swal.fire('تم الحفظ', 'تمت العملية بنجاح', 'success');
        }

        async function clearDatabaseByDate() {
            const from = document.getElementById('d_from').value;
            const to = document.getElementById('d_to').value;

            if(!from || !to) return Swal.fire('خطأ', 'حدد التاريخ أولاً', 'error');

            const result = await Swal.fire({
                title: 'تصفير البيانات؟',
                text: `سيتم حذف الحجوزات والمصاريف والمكافآت من ${from} إلى ${to}. هذا الإجراء لا يمكن التراجع عنه!`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                confirmButtonText: 'نعم، احذف الآن',
                cancelButtonText: 'إلغاء'
            });

            if (result.isConfirmed) {
                try {
                    await sb.from('bookings_reports').delete().gte('report_date', from).lte('report_date', to);
                    await sb.from('marketing_expenses').delete().gte('expense_date', from).lte('expense_date', to);
                    await sb.from('bonuses').delete().gte('bonus_date', from).lte('bonus_date', to);
                    await sb.from('penalties').delete().gte('penalty_date', from).lte('penalty_date', to);
                    
                    Swal.fire('تم التصفير', 'تم حذف بيانات الفترة المحددة بنجاح', 'success');
                    loadAllData();
                } catch (e) {
                    Swal.fire('فشل', 'حدث خطأ أثناء الحذف', 'error');
                }
            }
        }

        async function deleteUser() {
            const id = document.getElementById('m_id').value;
            const result = await Swal.fire({
                title: 'حذف الموظف؟',
                text: "سيتم حذف الموظف نهائياً من قاعدة البيانات",
                icon: 'error',
                showCancelButton: true,
                confirmButtonText: 'حذف نهائي'
            });

            if (result.isConfirmed) {
                await sb.from('users').delete().eq('id', id);
                closeModal();
                loadAllData();
            }
        }

        window.onload = resetDates;
    </script>
</body>
</html>
