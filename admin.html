<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة النظام | صلاح الخليفة</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f8fafc; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(4px); align-items: center; justify-content: center; z-index: 50; padding: 1rem; }
        .modal.active { display: flex; }
        .glass-card { background: rgba(255, 255, 255, 0.95); border: 1px solid rgba(226, 232, 240, 1); }
        .hidden-list { display: none; }
        .date-center-box { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        /* تمييز الأرقام القابلة للتعديل بوضوح */
        .editable-btn { 
            cursor: pointer; 
            background: rgba(59, 130, 246, 0.1); 
            padding: 2px 8px; 
            border-radius: 8px; 
            border: 1px dashed #3b82f6;
            display: inline-block;
        }
    </style>
</head>
<body class="min-h-screen pb-24 text-right">

    <header class="bg-slate-900 text-white p-5 sticky top-0 z-40 shadow-xl flex justify-between items-center border-b border-slate-700">
        <div class="flex items-center gap-3">
            <button onclick="location.reload()" class="bg-blue-600 text-white px-3 py-2 rounded-xl text-xs font-bold shadow-lg active:scale-95 transition-all">🔄 تحديث</button>
            <div>
                <h2 class="font-bold text-lg text-blue-400">صلاح الخليفة</h2>
                <p class="text-[10px] text-slate-400 uppercase tracking-widest text-right">التحكم المركزي</p>
            </div>
        </div>
        <button onclick="localStorage.clear(); location.href='index.html'" class="bg-red-500/10 text-red-400 px-4 py-2 rounded-xl text-xs font-bold border border-red-500/20 active:scale-95 transition-all text-right">خروج</button>
    </header>

    <div class="p-4 max-w-4xl mx-auto space-y-6">
        <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-200 date-center-box">
            <label class="block text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest text-right">تاريخ التقرير اليومي</label>
            <input type="date" id="rep_date" onchange="getRep()" class="w-full max-w-[220px] p-4 bg-slate-50 border border-slate-200 rounded-2xl text-center font-bold text-slate-700 outline-none focus:ring-2 focus:ring-blue-500 shadow-inner transition-all">
        </div>

        <div class="bg-slate-900 p-6 rounded-[2.5rem] shadow-2xl border border-slate-800">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 gap-4 text-right">
                <h3 class="font-bold text-white flex items-center gap-2 text-sm">
                    <span class="w-2 h-5 bg-blue-500 rounded-full"></span> 💵 أداء التيمات (مالي)
                </h3>
                <div id="total_stats_header" class="flex flex-wrap gap-2 text-[9px] font-bold text-slate-400">
                    <div class="bg-slate-800 p-2 rounded-lg border border-slate-700">الطلبات: <span id="total_books_sum" class="text-blue-400">0</span></div>
                    <div class="bg-slate-800 p-2 rounded-lg border border-slate-700">الصرف: <span id="total_spent_sum" class="text-red-400">0</span></div>
                    <div class="bg-blue-900/30 p-2 rounded-lg border border-blue-500/30">متوسط السعر: <span id="overall_avg_cpl" class="text-emerald-400">0</span></div>
                </div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-right text-xs text-white">
                    <thead class="text-slate-500 border-b border-slate-800">
                        <tr>
                            <th class="p-3 text-right">التيم</th>
                            <th class="p-3 text-center">الصرف / الطلب</th>
                            <th class="p-3 text-center text-emerald-400">الحجوزات</th>
                        </tr>
                    </thead>
                    <tbody id="team_body" class="font-bold"></tbody>
                </table>
            </div>
        </div>

        <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-200 text-right">
            <h3 class="font-bold mb-4 text-slate-800 flex items-center gap-2 text-sm">
                <span class="w-2 h-5 bg-purple-500 rounded-full"></span> 📊 تقرير الأداء اليومي
            </h3>
            <div class="overflow-x-auto">
                <table class="w-full text-right text-xs">
                    <thead class="text-slate-400 border-b border-slate-100">
                        <tr>
                            <th class="p-3 text-right">الموظف</th>
                            <th class="p-3 text-center">حجوزات</th>
                            <th class="p-3 text-center text-emerald-600">واصل</th>
                            <th class="p-3 text-center text-purple-600">النسبة</th>
                        </tr>
                    </thead>
                    <tbody id="rep_body" class="divide-y divide-slate-50 text-slate-700 font-medium"></tbody>
                </table>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 pt-2">
            <button onclick="openAddModal()" class="bg-blue-600 text-white p-5 rounded-2xl font-bold shadow-lg active:scale-95 transition-all">➕ إضافة موظف</button>
            <div class="flex flex-col gap-2">
                <button onclick="toggleEmpList()" class="bg-slate-800 text-white p-3 rounded-2xl font-bold shadow-lg active:scale-95">👥 قائمة الموظفين</button>
                <button onclick="monthlyReset()" class="bg-red-600/10 text-red-600 border border-red-200 p-3 rounded-2xl font-bold text-xs active:scale-95">♻️ تصفير شهري</button>
            </div>
        </div>

        <div id="emp_list_section" class="hidden-list space-y-3 bg-slate-100 p-4 rounded-[2rem]">
            <div id="emp_list_mobile" class="space-y-2 text-right"></div>
        </div>
    </div>

    <div id="m" class="modal">
        <div class="glass-card p-6 rounded-[2.5rem] w-full max-w-[350px] space-y-4 shadow-2xl text-right">
            <div class="border-b pb-3 text-center">
                <h4 id="mn" class="font-black text-slate-800 text-lg uppercase italic">اسم الموظف</h4>
                <p id="m_role" class="text-[10px] text-blue-500 font-bold tracking-widest"></p>
            </div>
            <div class="bg-slate-50 p-4 rounded-2xl space-y-2 border border-slate-100 font-bold text-xs">
                <div class="flex justify-between"><span>الراتب:</span><span id="det_salary">0</span></div>
                <div class="flex justify-between text-blue-600"><span>أيام العمل:</span><span id="det_days">0</span></div>
                <div class="flex justify-between text-amber-600"><span>النقاط (⭐):</span><span id="det_points">0</span></div>
                <div class="flex justify-between text-red-600"><span>إجمالي الخصومات:</span><span id="det_abs">0</span></div>
            </div>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="adj('bonus')" class="py-3 bg-emerald-50 text-emerald-600 rounded-xl font-bold text-xs active:scale-95">⭐ نقاط</button>
                <button onclick="adj('absence')" class="py-3 bg-orange-50 text-orange-600 rounded-xl font-bold text-xs active:scale-95">💰 خصم</button>
            </div>
            <button onclick="removeLastAdj()" class="w-full py-2 bg-white text-red-400 border border-red-100 rounded-xl text-[10px] font-bold">🔄 تراجع</button>
            <button onclick="editEmp()" class="w-full py-3 bg-blue-50 text-blue-600 rounded-xl font-bold border border-blue-100">✏️ تعديل البيانات</button>
            <button onclick="kill()" class="w-full py-3 bg-red-50 text-red-600 rounded-xl font-bold border border-red-100 text-right">🗑️ حذف</button>
            <button onclick="toggleModal('m')" class="text-slate-400 text-[10px] block w-full text-center underline font-bold">إغلاق</button>
        </div>
    </div>

    <div id="add_emp_modal" class="modal">
        <div class="glass-card p-6 rounded-[2.5rem] w-full max-w-md space-y-4 shadow-2xl text-right">
            <h3 id="modal_title" class="font-extrabold text-xl text-slate-800 text-center">بيانات الموظف</h3>
            <div class="flex flex-col gap-3">
                <input id="en" placeholder="الاسم (Username)" class="p-4 bg-slate-50 border rounded-2xl text-right">
                <input id="ep" type="password" placeholder="الباسورد" class="p-4 bg-slate-50 border rounded-2xl text-right">
                <input id="ec" placeholder="الكود (A01)" class="p-4 bg-slate-50 border rounded-2xl text-right uppercase">
                <select id="er" class="p-4 bg-slate-50 border rounded-2xl text-right font-bold"><option value="ردود">ردود</option><option value="مروج">مروج</option><option value="متابعة">متابعة</option></select>
                <input id="et" placeholder="اسم التيم" class="p-4 bg-slate-50 border rounded-2xl text-right">
                <input id="ey" type="number" placeholder="الراتب" class="p-4 bg-slate-50 border rounded-2xl text-right">
            </div>
            <div class="grid grid-cols-2 gap-3 mt-4">
                <button onclick="save()" class="bg-blue-600 text-white p-4 rounded-2xl font-bold shadow-lg">حفظ</button>
                <button onclick="toggleModal('add_emp_modal')" class="bg-slate-200 text-slate-600 p-4 rounded-2xl font-bold">إلغاء</button>
            </div>
        </div>
    </div>

    <script>
        const sb = supabase.createClient('https://iqagigpqwwtvriqvlfbv.supabase.co', 'sb_publishable_5xbaPlWHgjeeaIwceEFRrQ_d9aZ6Zax');
        let cur = null; let allUsers = [];

        function toggleModal(id) { document.getElementById(id).classList.toggle('active'); }
        function toggleEmpList() { document.getElementById('emp_list_section').classList.toggle('hidden-list'); }

        // --- وظيفة التعديل المباشر (تفتح الكيبورد فوراً وتحفظ) ---
        async function editFast(table, field, id, oldVal) {
            let newVal = prompt("أدخل الرقم الجديد:", oldVal);
            if (newVal !== null && newVal !== "" && newVal != oldVal) {
                const { error } = await sb.from(table).update({ [field]: parseFloat(newVal) }).eq('id', id);
                if(!error) { getRep(); } else { alert("فشل الحفظ: " + error.message); }
            }
        }

        async function getRep() {
            const d = document.getElementById('rep_date').value;
            if(!d) return;
            const { data: reports } = await sb.from('bookings_reports').select('*').eq('report_date', d);
            const { data: expenses } = await sb.from('marketing_expenses').select('*').eq('expense_date', d);
            
            const teamBody = document.getElementById('team_body');
            const empBody = document.getElementById('rep_body');
            teamBody.innerHTML = ""; empBody.innerHTML = "";
            const teamSum = {};
            let overallSpent = 0; let overallBooks = 0;

            if (expenses) {
                expenses.forEach(ex => {
                    const t = ex.target_team || "بدون تيم";
                    if (!teamSum[t]) teamSum[t] = { spent: 0, books: 0, id: ex.id };
                    teamSum[t].spent += Number(ex.amount_spent);
                    overallSpent += Number(ex.amount_spent);
                });
            }

            if (reports) {
                reports.forEach(r => {
                    const user = allUsers.find(u => u.username === r.employee_username);
                    const tName = user?.team || "عام";
                    const b = Number(r.bookings_count) || 0;
                    const c = Number(r.confirmed_count) || 0;
                    overallBooks += b;
                    if (!teamSum[tName]) teamSum[tName] = { spent: 0, books: 0 };
                    teamSum[tName].books += b;
                    const p = b > 0 ? ((c / b) * 100).toFixed(1) : "0.0";
                    
                    empBody.innerHTML += `<tr class="border-b border-slate-50 text-right">
                        <td class="p-4 font-bold">${r.employee_username}<br><span class="text-[9px] text-slate-400 italic">(${tName})</span></td>
                        <td class="p-4 text-center"><span class="editable-btn text-blue-600" onclick="editFast('bookings_reports','bookings_count',${r.id},${b})">${b}</span></td>
                        <td class="p-4 text-center"><span class="editable-btn text-emerald-600" onclick="editFast('bookings_reports','confirmed_count',${r.id},${c})">${c}</span></td>
                        <td class="p-4 text-center text-purple-600 font-black">${p}%</td></tr>`;
                });
            }

            document.getElementById('total_books_sum').innerText = overallBooks;
            document.getElementById('total_spent_sum').innerText = overallSpent.toLocaleString() + " د.ع";
            document.getElementById('overall_avg_cpl').innerText = overallBooks > 0 ? (overallSpent / overallBooks).toFixed(0) : 0;

            for (let t in teamSum) {
                const s = teamSum[t].spent; const b = teamSum[t].books;
                teamBody.innerHTML += `<tr class="border-b border-slate-800 text-right">
                    <td class="p-4 text-blue-400">${t}</td>
                    <td class="p-4 text-center"><span class="editable-btn text-red-400" onclick="editFast('marketing_expenses','amount_spent',${teamSum[t].id},${s})">${s.toLocaleString()}</span></td>
                    <td class="p-4 text-center text-emerald-400 font-black text-lg">${b}</td></tr>`;
            }
        }

        async function load() {
            const { data } = await sb.from('users').select('*').neq('role','مدير');
            allUsers = data || [];
            const list = document.getElementById('emp_list_mobile');
            list.innerHTML = "";
            allUsers.forEach(e => {
                list.innerHTML += `<div class="bg-white p-4 rounded-3xl border border-slate-200 flex justify-between items-center mb-2"><div class="text-right font-bold">${e.username} <span class="text-[9px] text-blue-500">${e.employee_code}</span></div><button onclick="pop('${e.id}','${e.username}')" class="bg-slate-50 p-3 rounded-2xl border">⚙️</button></div>`;
            });
            getRep();
        }

        async function pop(id, n) {
            cur = { id, n }; const u = allUsers.find(x => x.id == id);
            document.getElementById('mn').innerText = n;
            document.getElementById('m_role').innerText = `${u.role} | ${u.employee_code}`;
            document.getElementById('det_salary').innerText = `${u.salary || 0} د.ع`;
            toggleModal('m');
            const { data: reports } = await sb.from('bookings_reports').select('bookings_count').eq('employee_username', n);
            document.getElementById('det_days').innerText = reports ? reports.length : 0;
            const { data: adjData } = await sb.from('adjustments').select('amount, type').eq('user_id', id);
            let totalAbs = 0; let bonus = 0;
            if (adjData) adjData.forEach(a => { if(a.type === 'bonus') bonus += Number(a.amount); else totalAbs += Number(a.amount); });
            document.getElementById('det_abs').innerText = totalAbs.toLocaleString() + " د.ع";
            document.getElementById('det_points').innerText = bonus;
        }

        async function adj(t) { 
            const v = prompt("أدخل القيمة:");
            if(v) { await sb.from('adjustments').insert([{ user_id:cur.id, type:t, amount:v }]); toggleModal('m'); load(); } 
        }

        async function save() { 
            const obj = { username: document.getElementById('en').value, password: document.getElementById('ep').value, employee_code: document.getElementById('ec').value, role: document.getElementById('er').value, team: document.getElementById('et').value, salary: document.getElementById('ey').value };
            if(cur && document.getElementById('modal_title').innerText.includes("تعديل")) await sb.from('users').update(obj).eq('id', cur.id);
            else await sb.from('users').insert([obj]);
            location.reload();
        }

        async function monthlyReset() { if(confirm('تصفير كافة التقارير؟')) { await sb.from('adjustments').delete().neq('id', 0); await sb.from('bookings_reports').delete().neq('id', 0); location.reload(); } }
        async function editEmp() { toggleModal('m'); const u = allUsers.find(x => x.id == cur.id); document.getElementById('modal_title').innerText = "تعديل الموظف"; ['en','ep','ec','et','ey'].forEach(id => document.getElementById(id).value = u[id] || ""); toggleModal('add_emp_modal'); }
        async function kill() { if(confirm('حذف نهائي؟')) { await sb.from('users').delete().eq('id',cur.id); location.reload(); } }
        async function removeLastAdj() { const { data } = await sb.from('adjustments').select('*').eq('user_id', cur.id).order('created_at', { ascending: false }).limit(1); if(data?.[0]) { if(confirm("حذف آخر عملية؟")) { await sb.from('adjustments').delete().eq('id', data[0].id); toggleModal('m'); load(); } } }
        function openAddModal() { cur = null; document.getElementById('modal_title').innerText = "إضافة موظف"; toggleModal('add_emp_modal'); }
        
        window.onload = () => { document.getElementById('rep_date').valueAsDate = new Date(); load(); };
    </script>
</body>
</html>
