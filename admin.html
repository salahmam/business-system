<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إدارة صلاح الخليفة</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f8fafc; touch-action: manipulation; }
        .glass-card { background: white; border-radius: 1.5rem; border: 1px solid #e2e8f0; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
        .btn-pulse { animation: pulse-blue 2s infinite; }
        @keyframes pulse-blue { 0% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(37, 99, 235, 0); } 100% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0); } }
        .action-menu { display: none; position: absolute; left: 0; top: 100%; background: white; border: 1px solid #e2e8f0; border-radius: 1rem; box-shadow: 0 10px 25px rgba(0,0,0,0.1); z-index: 50; min-width: 160px; }
        .action-menu.active { display: block; animation: slideUp 0.2s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="pb-32">

    <!-- Header الموبايل -->
    <header class="bg-slate-900 text-white sticky top-0 z-[100] px-5 py-4 rounded-b-[2rem] shadow-xl">
        <div class="flex justify-between items-center">
            <div>
                <h1 class="text-lg font-black tracking-tight">صلاح الخليفة</h1>
                <p class="text-[8px] text-blue-400 font-bold uppercase">Management System</p>
            </div>
            <div class="flex gap-3">
                <button onclick="loadAllData()" class="w-10 h-10 flex items-center justify-center bg-slate-800 rounded-full text-xl border border-slate-700">🔄</button>
                <button onclick="logout()" class="w-10 h-10 flex items-center justify-center bg-red-500/20 rounded-full text-xl border border-red-500/30">🚪</button>
            </div>
        </div>
    </header>

    <div class="p-4 space-y-6">

        <!-- الفلترة (تصميم للهاتف) -->
        <div class="glass-card p-5 space-y-4">
            <div class="grid grid-cols-2 gap-3">
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-400 mr-1">من</label>
                    <input type="date" id="d_from" class="w-full p-3 bg-slate-50 rounded-xl font-bold border-none text-sm outline-none">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-400 mr-1">إلى</label>
                    <input type="date" id="d_to" class="w-full p-3 bg-slate-50 rounded-xl font-bold border-none text-sm outline-none">
                </div>
            </div>
            <button onclick="loadAllData()" class="btn-pulse w-full bg-blue-600 text-white p-4 rounded-2xl font-black text-sm shadow-lg">عرض الإحصائيات ⚡</button>
        </div>

        <!-- جدول التيمات (تمرير أفقي للموبايل) -->
        <div class="glass-card overflow-hidden">
            <div class="p-4 border-b flex justify-between items-center">
                <h3 class="font-black text-xs">📊 التيمات والـ CPL</h3>
                <button onclick="addNewTeam()" class="text-[9px] bg-slate-100 px-3 py-1 rounded-full font-bold">تيم +</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-right text-[12px]">
                    <thead class="bg-slate-50 text-slate-400 font-bold uppercase">
                        <tr><th class="p-4">التيم</th><th class="text-center">المصرف</th><th class="text-center">الحجز</th><th class="text-center text-blue-600">CPL</th></tr>
                    </thead>
                    <tbody id="team_table" class="divide-y font-bold"></tbody>
                </table>
            </div>
        </div>

        <!-- جدول الموظفين (أداء) -->
        <div class="glass-card overflow-hidden">
            <div class="p-4 border-b"><h3 class="font-black text-xs">📈 أداء الردود</h3></div>
            <div class="overflow-x-auto">
                <table class="w-full text-right text-[12px]">
                    <thead class="bg-slate-50 text-slate-400 font-bold">
                        <tr class="text-center"><th class="p-4 text-right">الموظف</th><th>الحجز</th><th class="text-emerald-600">الواصل</th><th class="text-amber-500">⭐</th></tr>
                    </thead>
                    <tbody id="redod_table" class="divide-y text-center font-bold"></tbody>
                </table>
            </div>
        </div>

        <!-- أزرار الإدارة (أسفل) -->
        <div class="grid grid-cols-1 gap-3">
            <button onclick="toggleUserList()" class="bg-slate-900 text-white p-5 rounded-2xl font-black shadow-xl flex items-center justify-between">
                <span>👥 قائمة الموظفين والإجراءات</span>
                <span class="bg-white/20 px-3 py-1 rounded-lg text-xs">عرض</span>
            </button>
            <button onclick="openAddModal()" class="bg-white border-2 border-slate-900 p-5 rounded-2xl font-black text-slate-900 shadow-sm flex items-center justify-center gap-2">
                <span>➕ إضافة موظف جديد</span>
            </button>
        </div>

        <!-- قائمة الموظفين بتصميم منسدل للهاتف -->
        <div id="user_list_section" class="hidden space-y-3">
            <div id="detailed_user_list" class="space-y-3"></div>
        </div>

    </div>

    <!-- نافذة الإضافة (مودال) -->
    <div id="add_modal" class="modal">
        <div class="bg-white w-full max-w-xs p-6 rounded-[2rem] space-y-4 shadow-2xl overflow-y-auto max-h-[90vh]">
            <h3 class="text-center font-black text-lg">موظف جديد</h3>
            <input id="in_name" placeholder="الاسم" class="w-full p-3 bg-slate-50 rounded-xl font-bold border-none text-sm">
            <input id="in_pass" placeholder="الباسورد" class="w-full p-3 bg-slate-50 rounded-xl font-bold border-none text-sm">
            <input id="in_code" placeholder="الكود" class="w-full p-3 bg-slate-50 rounded-xl font-bold border-none text-sm text-blue-600">
            <select id="in_role" onchange="handleRoleChange()" class="w-full p-3 bg-slate-50 rounded-xl font-bold text-sm">
                <option value="ردود">ردود</option><option value="مروج">مروج</option><option value="متابعة">متابعة</option>
            </select>
            <div id="redod_fields" class="space-y-3">
                <select id="in_shift_type" onchange="handleShiftChange()" class="w-full p-3 bg-slate-100 rounded-xl font-bold text-sm">
                    <option value="شفت كامل">شفت كامل</option><option value="نصف شفت">نصف شفت</option>
                </select>
                <select id="in_half_detail" class="hidden w-full p-3 bg-amber-50 rounded-xl font-bold text-sm text-amber-700">
                    <option value="صباحي">صباحي</option><option value="مسائي">مسائي</option>
                </select>
                <select id="in_team" class="w-full p-3 bg-blue-50 rounded-xl font-bold text-sm text-blue-700"></select>
            </div>
            <input id="in_sal" type="number" placeholder="الراتب" class="w-full p-3 bg-slate-50 rounded-xl font-bold text-sm">
            <div class="flex gap-2">
                <button onclick="saveNewUser()" class="flex-1 bg-blue-600 text-white p-3 rounded-xl font-bold text-sm">حفظ</button>
                <button onclick="closeAddModal()" class="flex-1 bg-slate-100 text-slate-400 p-3 rounded-xl font-bold text-sm">إلغاء</button>
            </div>
        </div>
    </div>

    <script>
        const sb = supabase.createClient('https://iqagigpqwwtvriqvlfbv.supabase.co', 'sb_publishable_5xbaPlWHgjeeaIwceEFRrQ_d9aZ6Zax');

        // الدوال الأساسية
        function handleRoleChange() {
            document.getElementById('redod_fields').style.display = (document.getElementById('in_role').value === 'ردود') ? 'block' : 'none';
        }
        function handleShiftChange() {
            document.getElementById('in_half_detail').classList.toggle('hidden', document.getElementById('in_shift_type').value !== 'نصف شفت');
        }
        function toggleUserList() { document.getElementById('user_list_section').classList.toggle('hidden'); }
        function openAddModal() { loadTeamsMenu(); document.getElementById('add_modal').classList.add('active'); }
        function closeAddModal() { document.getElementById('add_modal').classList.remove('active'); }

        async function loadTeamsMenu() {
            const { data } = await sb.from('teams').select('*');
            document.getElementById('in_team').innerHTML = data.map(t => `<option value="${t.team_name}">${t.team_name}</option>`).join('');
        }

        // جلب البيانات مع الفلترة
        async function loadAllData() {
            const from = document.getElementById('d_from').value;
            const to = document.getElementById('d_to').value;
            
            const { data: users } = await sb.from('users').select('*').neq('role','مدير');
            const { data: teams } = await sb.from('teams').select('*');
            const { data: reports } = await sb.from('bookings_reports').select('*').gte('report_date', from).lte('report_date', to);
            const { data: exps } = await sb.from('marketing_expenses').select('*').gte('expense_date', from).lte('expense_date', to);
            const { data: adjs } = await sb.from('adjustments').select('*');

            // تيمات
            document.getElementById('team_table').innerHTML = teams.map(t => {
                let spent = exps.filter(e => e.target_team === t.team_name).reduce((a,b)=>a+Number(b.amount_spent),0);
                let bks = reports.filter(r => users.find(u=>u.username===r.employee_username && u.team===t.team_name)).reduce((a,b)=>a+Number(b.bookings_count),0);
                return `<tr><td class="p-4">${t.team_name}</td><td class="text-center text-amber-600">${spent}</td><td class="text-center">${bks}</td><td class="text-center text-blue-600 font-black">${bks>0?(spent/bks).toFixed(0):0}</td></tr>`;
            }).join('');

            // ردود
            document.getElementById('redod_table').innerHTML = users.filter(u=>u.user_job_role==='ردود').map(u => {
                let ur = reports.filter(r=>r.employee_username===u.username);
                let b = ur.reduce((a,b)=>a+Number(b.bookings_count),0);
                let w = ur.reduce((a,b)=>a+Number(b.confirmed_count),0);
                let stars = u.shift_type.includes('كامل') ? (w>=50?2:w>=30?1:0) : (w>=25?2:w>=15?1:0);
                return `<tr class="border-b"><td class="p-4 text-right">${u.username}</td><td>${b}</td><td class="text-emerald-600">${w}</td><td class="text-amber-500">${'⭐'.repeat(stars)}</td></tr>`;
            }).join('');

            // قائمة الموظفين مع (زر الإجراءات المنبثق)
            document.getElementById('detailed_user_list').innerHTML = users.map(u => {
                return `
                <div class="bg-white p-4 rounded-2xl border flex justify-between items-center relative">
                    <div class="text-right">
                        <div class="font-black text-sm">${u.username} <span class="text-[9px] bg-slate-100 px-2 py-0.5 rounded">${u.user_job_role}</span></div>
                        <div class="text-[10px] text-slate-400 mt-1">كود: ${u.employee_code} | سر: ${u.password}</div>
                    </div>
                    <div class="relative">
                        <button onclick="toggleActionMenu('${u.id}')" class="bg-slate-100 w-10 h-10 rounded-full flex items-center justify-center font-bold">⋮</button>
                        <div id="menu-${u.id}" class="action-menu shadow-2xl border text-[12px]">
                            <button onclick="addAdj('${u.id}','bonus')" class="w-full p-3 text-right text-emerald-600 border-b">🎁 إضافة مكافأة</button>
                            <button onclick="clearAdj('${u.id}','bonus')" class="w-full p-3 text-right text-emerald-300 border-b text-[10px]">حذف المكافآت</button>
                            <button onclick="addAdj('${u.id}','penalty')" class="w-full p-3 text-right text-red-600 border-b">💸 إضافة خصم</button>
                            <button onclick="clearAdj('${u.id}','penalty')" class="w-full p-3 text-right text-red-300 border-b text-[10px]">حذف الخصومات</button>
                            <button onclick="delU('${u.id}')" class="w-full p-3 text-right text-slate-900 font-black">🗑️ حذف الموظف</button>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        // تحكم القائمة المنبثقة
        function toggleActionMenu(id) {
            document.querySelectorAll('.action-menu').forEach(m => { if(m.id !== 'menu-'+id) m.classList.remove('active'); });
            document.getElementById('menu-'+id).classList.toggle('active');
        }

        // إغلاق القائمة عند الضغط في أي مكان
        window.onclick = (e) => { if(!e.target.matches('button')) document.querySelectorAll('.action-menu').forEach(m => m.classList.remove('active')); }

        async function saveNewUser() {
            const role = document.getElementById('in_role').value;
            const shiftType = document.getElementById('in_shift_type').value;
            const detail = document.getElementById('in_half_detail').value;
            const finalShift = (role === 'ردود') ? (shiftType === 'نصف شفت' ? `نصف (${detail})` : 'شفت كامل') : '-';
            
            const { error } = await sb.from('users').insert([{
                username: document.getElementById('in_name').value,
                password: document.getElementById('in_pass').value,
                employee_code: document.getElementById('in_code').value,
                user_job_role: role,
                shift_type: finalShift,
                team: (role === 'ردود') ? document.getElementById('in_team').value : '-',
                salary: document.getElementById('in_sal').value,
                role: 'موظف'
            }]);
            if(!error) { closeAddModal(); loadAllData(); Swal.fire('تم', 'تمت الإضافة بنجاح', 'success'); }
        }

        async function addAdj(uid, type) {
            const { value: amt } = await Swal.fire({ title: 'المبلغ', input: 'number' });
            if(amt) { await sb.from('adjustments').insert([{user_id: uid, amount: amt, type: type}]); loadAllData(); }
        }

        async function clearAdj(uid, type) { if(confirm("حذف السجلات؟")) { await sb.from('adjustments').delete().eq('user_id', uid).eq('type', type); loadAllData(); } }
        async function delU(id) { if(confirm("حذف نهائي؟")) { await sb.from('users').delete().eq('id', id); loadAllData(); } }
        async function addNewTeam() { const { value: t } = await Swal.fire({ title: 'اسم التيم', input: 'text' }); if(t) { await sb.from('teams').insert([{team_name: t}]); loadAllData(); } }
        function logout() { localStorage.clear(); location.href='index.html'; }

        window.onload = () => {
            const now = new Date().toISOString().split('T')[0];
            document.getElementById('d_from').value = now;
            document.getElementById('d_to').value = now;
            loadAllData();
        };
    </script>
</body>
</html>
