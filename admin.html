<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة النظام | صلاح الخليفة</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f8fafc; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(4px); align-items: center; justify-content: center; z-index: 50; padding: 1rem; }
        .modal.active { display: flex; }
        .glass-card { background: rgba(255, 255, 255, 0.95); border: 1px solid rgba(226, 232, 240, 1); }
        .hidden-list { display: none; }
    </style>
</head>
<body class="min-h-screen pb-24 text-right">

    <header class="bg-slate-900 text-white p-5 sticky top-0 z-40 shadow-xl flex justify-between items-center border-b border-slate-700">
        <div class="flex items-center gap-3">
            <button onclick="location.reload()" class="bg-blue-600 text-white px-3 py-2 rounded-xl text-xs font-bold">🔄 تحديث</button>
            <h2 class="font-bold text-lg text-blue-400">صلاح الخليفة</h2>
        </div>
        <button onclick="localStorage.clear(); location.href='index.html'" class="bg-red-500/10 text-red-400 px-4 py-2 rounded-xl text-xs font-bold border border-red-500/20">خروج</button>
    </header>

    <div class="p-4 max-w-4xl mx-auto space-y-6">
        
        <!-- التاريخ -->
        <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-200 flex flex-col items-center">
            <label class="block text-[10px] font-black text-slate-400 mb-2">تاريخ التقرير اليومي</label>
            <input type="date" id="rep_date" onchange="getRep()" class="w-full max-w-[220px] p-4 bg-slate-50 border rounded-2xl text-center font-bold outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <!-- جدول المتابعة -->
        <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-200">
            <h3 class="font-bold mb-4 text-slate-800 flex items-center gap-2 text-sm">
                <span class="w-2 h-5 bg-purple-500 rounded-full"></span> 📊 تقرير الأداء والمكافآت
            </h3>
            <div class="overflow-x-auto">
                <table class="w-full text-right text-xs">
                    <thead class="text-slate-400 border-b">
                        <tr>
                            <th class="p-3">الموظف</th>
                            <th class="p-3 text-center">واصل</th>
                            <th class="p-3 text-center">نوع الشفت</th>
                            <th class="p-3 text-center">المكافأة اليومية</th>
                        </tr>
                    </thead>
                    <tbody id="rep_body" class="divide-y divide-slate-50 text-slate-700 font-medium"></tbody>
                </table>
            </div>
        </div>

        <!-- أزرار التحكم -->
        <div class="grid grid-cols-2 gap-4 pt-2">
            <button onclick="openAddModal()" class="bg-blue-600 text-white p-5 rounded-2xl font-bold shadow-lg active:scale-95 transition-all">➕ إضافة موظف</button>
            <div class="flex flex-col gap-2">
                <button onclick="toggleEmpList()" class="bg-slate-800 text-white p-3 rounded-2xl font-bold shadow-lg">👥 قائمة الموظفين</button>
                <button onclick="monthlyReset()" class="bg-red-600/10 text-red-600 border border-red-200 p-3 rounded-2xl font-bold text-xs">♻️ تصفير البيانات</button>
            </div>
        </div>

        <div id="emp_list_section" class="hidden-list space-y-3 bg-slate-100 p-4 rounded-[2rem]">
            <div id="emp_list_mobile" class="space-y-2 text-right"></div>
        </div>
    </div>

    <!-- نافذة تفاصيل الموظف -->
    <div id="m" class="modal">
        <div class="glass-card p-6 rounded-[2.5rem] w-full max-w-[350px] space-y-4 shadow-2xl text-right">
            <div class="border-b pb-3 text-center">
                <h4 id="mn" class="font-black text-slate-800 text-lg uppercase">اسم الموظف</h4>
                <p id="m_role" class="text-[10px] text-blue-500 font-bold"></p>
            </div>
            <div class="bg-slate-50 p-4 rounded-2xl space-y-2 border border-slate-100">
                <div class="flex justify-between items-center text-xs"><span>أيام العمل:</span><span id="det_days" class="font-bold text-blue-600">0</span></div>
                <div class="flex justify-between items-center text-xs"><span>النقاط الكلية:</span><span id="det_points" class="font-bold text-amber-600">0</span></div>
                <div class="flex justify-between items-center text-xs"><span>الخصومات:</span><span id="det_abs" class="font-bold text-red-600">0</span></div>
            </div>
            <div class="grid grid-cols-1 gap-2 pt-2">
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="adj('bonus')" class="py-3 bg-emerald-50 text-emerald-600 rounded-xl font-bold text-xs">⭐ إضافة نقاط</button>
                    <button onclick="adj('absence')" class="py-3 bg-orange-50 text-orange-600 rounded-xl font-bold text-xs">💰 إضافة خصم</button>
                </div>
                <button onclick="editEmp()" class="w-full py-3 bg-blue-50 text-blue-600 rounded-xl font-bold text-sm">✏️ تعديل البيانات</button>
                <button onclick="kill()" class="w-full py-3 bg-red-50 text-red-600 rounded-xl font-bold text-xs">🗑️ حذف نهائي</button>
            </div>
            <button onclick="toggleModal('m')" class="text-slate-400 text-[10px] block w-full text-center underline">إغلاق النافذة</button>
        </div>
    </div>

    <!-- نافذة الإضافة/التعديل -->
    <div id="add_emp_modal" class="modal">
        <div class="glass-card p-6 rounded-[2.5rem] w-full max-w-md space-y-4 text-right shadow-2xl">
            <h3 id="modal_title" class="font-extrabold text-xl text-slate-800 text-center">بيانات الموظف</h3>
            <div class="flex flex-col gap-3">
                <input id="en" placeholder="الاسم" class="p-4 bg-slate-50 border rounded-2xl text-center font-bold outline-none">
                <input id="ep" type="password" placeholder="الباسورد" class="p-4 bg-slate-50 border rounded-2xl text-center">
                <input id="ec" placeholder="الكود (A01)" class="p-4 bg-slate-50 border rounded-2xl text-center font-black text-blue-600">
                <select id="shift_type" onchange="toggleShiftTime()" class="p-4 bg-slate-50 border rounded-2xl font-bold text-center appearance-none">
                    <option value="شفت كامل">شفت كامل</option>
                    <option value="نصف شفت">نصف شفت</option>
                </select>
                <div id="shift_time_div" class="hidden">
                    <select id="shift_time" class="p-4 bg-amber-50 border border-amber-200 rounded-2xl font-bold text-center w-full text-amber-700 appearance-none">
                        <option value="صباحي">صباحي ☀️</option>
                        <option value="مسائي">مسائي 🌙</option>
                    </select>
                </div>
                <input id="ey" type="number" placeholder="الراتب الأساسي" class="p-4 bg-slate-50 border rounded-2xl text-center font-bold">
            </div>
            <div class="grid grid-cols-2 gap-3 mt-4">
                <button onclick="save()" class="bg-blue-600 text-white p-4 rounded-2xl font-bold shadow-lg transition-all">حفظ</button>
                <button onclick="toggleModal('add_emp_modal')" class="bg-slate-200 text-slate-600 p-4 rounded-2xl font-bold">إلغاء</button>
            </div>
        </div>
    </div>

    <script>
        const sb = supabase.createClient('https://iqagigpqwwtvriqvlfbv.supabase.co', 'sb_publishable_5xbaPlWHgjeeaIwceEFRrQ_d9aZ6Zax');
        let cur = null; let allUsers = [];

        function toggleModal(id) { document.getElementById(id).classList.toggle('active'); }
        function toggleEmpList() { document.getElementById('emp_list_section').classList.toggle('hidden-list'); }
        function toggleShiftTime() {
            const type = document.getElementById('shift_type').value;
            document.getElementById('shift_time_div').classList.toggle('hidden', type !== 'نصف شفت');
        }

        async function load() {
            const { data } = await sb.from('users').select('*').neq('role','مدير');
            allUsers = data || [];
            const list = document.getElementById('emp_list_mobile');
            list.innerHTML = "";
            allUsers.forEach(e => {
                list.innerHTML += `<div class="bg-white p-4 rounded-3xl border flex justify-between items-center shadow-sm">
                    <div class="text-right">
                        <p class="font-bold">${e.username} <span class="text-[9px] text-blue-500">${e.employee_code}</span></p>
                        <p class="text-[10px] text-slate-500">${e.shift_type} ${e.shift_type === 'نصف شفت' ? '('+e.shift_time+')' : ''}</p>
                    </div>
                    <button onclick="pop('${e.id}','${e.username}')" class="w-10 h-10 bg-slate-50 rounded-xl border flex items-center justify-center">⚙️</button>
                </div>`;
            });
            getRep();
        }

        async function getRep() {
            const d = document.getElementById('rep_date').value;
            if(!d) return;
            const { data: reports } = await sb.from('bookings_reports').select('*').eq('report_date', d);
            const body = document.getElementById('rep_body');
            body.innerHTML = "";

            if (reports) {
                reports.forEach(r => {
                    const u = allUsers.find(x => x.username === r.employee_username);
                    if(!u) return;
                    const c = Number(r.confirmed_count) || 0;
                    
                    let bonusText = "---";
                    if(u.shift_type === 'شفت كامل') {
                        if(c >= 50) bonusText = "<span class='text-emerald-600 font-black'>+2 ⭐⭐</span>";
                        else if(c >= 30) bonusText = "<span class='text-emerald-500 font-bold'>+1 ⭐</span>";
                    } else { // نصف شفت
                        if(c >= 25) bonusText = "<span class='text-blue-600 font-black'>+2 ⭐⭐</span>";
                        else if(c >= 15) bonusText = "<span class='text-blue-500 font-bold'>+1 ⭐</span>";
                    }

                    body.innerHTML += `<tr class="border-b">
                        <td class="p-4 font-bold">${r.employee_username}</td>
                        <td class="p-4 text-center text-slate-900 font-black text-sm">${c}</td>
                        <td class="p-4 text-center text-[10px] text-slate-500">${u.shift_type}</td>
                        <td class="p-4 text-center">${bonusText}</td>
                    </tr>`;
                });
            }
        }

        async function pop(id, n) {
            cur = { id, n }; const u = allUsers.find(x => x.id == id);
            document.getElementById('mn').innerText = n;
            document.getElementById('m_role').innerText = `${u.shift_type} | ${u.employee_code}`;
            toggleModal('m');
            
            const { data: reports } = await sb.from('bookings_reports').select('confirmed_count').eq('employee_username', n);
            let autoPoints = 0;
            if (reports) reports.forEach(r => {
                const c = r.confirmed_count || 0;
                if(u.shift_type === 'شفت كامل') {
                    if(c >= 50) autoPoints += 2; else if(c >= 30) autoPoints += 1;
                } else {
                    if(c >= 25) autoPoints += 2; else if(c >= 15) autoPoints += 1;
                }
            });

            const { data: adjData } = await sb.from('adjustments').select('amount, type').eq('user_id', id);
            let manualPoints = 0; let totalAbs = 0;
            if (adjData) adjData.forEach(a => { if(a.type === 'bonus') manualPoints += Number(a.amount); else totalAbs += Number(a.amount); });

            document.getElementById('det_days').innerText = (reports ? reports.length : 0) + " يوم";
            document.getElementById('det_points').innerText = (autoPoints + manualPoints) + " نقطة";
            document.getElementById('det_abs').innerText = totalAbs.toLocaleString() + " د.ع";
        }

        async function save() {
            const obj = {
                username: document.getElementById('en').value,
                password: document.getElementById('ep').value,
                employee_code: document.getElementById('ec').value,
                shift_type: document.getElementById('shift_type').value,
                shift_time: document.getElementById('shift_type').value === 'نصف شفت' ? document.getElementById('shift_time').value : 'كامل',
                salary: document.getElementById('ey').value,
                role: 'موظف'
            };
            if(cur && document.getElementById('modal_title').innerText.includes("تعديل")) {
                await sb.from('users').update(obj).eq('id', cur.id);
            } else {
                await sb.from('users').insert([obj]);
            }
            location.reload();
        }

        async function adj(t) {
            const { value: v } = await Swal.fire({ title: 'أدخل القيمة', input: 'number', showCancelButton: true });
            if(v) { 
                await sb.from('adjustments').insert([{ user_id:cur.id, type:t, amount:v, reason: 'يدوي' }]);
                Swal.fire('تم التحديث'); pop(cur.id, cur.n); 
            }
        }

        async function kill() {
            if(confirm('هل أنت متأكد من الحذف النهائي؟')) {
                await sb.from('adjustments').delete().eq('user_id', cur.id);
                await sb.from('users').delete().eq('id', cur.id);
                location.reload();
            }
        }

        async function monthlyReset() {
            const { isConfirmed } = await Swal.fire({
                title: 'تصفير شامل؟',
                text: "سيتم حذف كافة التقارير والنقاط لجميع الموظفين!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: 'نعم، صفر الكل'
            });
            if(isConfirmed) {
                // الحذف باستخدام gt(id, 0) لضمان تجاوز الـ RLS في بعض الحالات
                await sb.from('adjustments').delete().gt('id', 0);
                await sb.from('bookings_reports').delete().gt('id', 0);
                Swal.fire('تم التصفير بنجاح').then(() => location.reload());
            }
        }

        async function editEmp() {
            toggleModal('m');
            const u = allUsers.find(x => x.id == cur.id);
            document.getElementById('modal_title').innerText = "تعديل: " + u.username;
            document.getElementById('en').value = u.username;
            document.getElementById('ep').value = u.password;
            document.getElementById('ec').value = u.employee_code;
            document.getElementById('shift_type').value = u.shift_type;
            document.getElementById('shift_time').value = u.shift_time || 'صباحي';
            document.getElementById('ey').value = u.salary || 0;
            toggleShiftTime();
            toggleModal('add_emp_modal');
        }

        function openAddModal() {
            cur = null; document.getElementById('modal_title').innerText = "إضافة موظف جديد";
            ['en','ep','ec','ey'].forEach(id => document.getElementById(id).value = "");
            document.getElementById('shift_type').value = "شفت كامل";
            toggleShiftTime();
            toggleModal('add_emp_modal');
        }

        window.onload = () => { 
            document.getElementById('rep_date').valueAsDate = new Date(); 
            load(); 
        };
    </script>
</body>
</html>
