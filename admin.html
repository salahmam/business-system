<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة صلاح الخليفة | الإدارة العليا</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f8fafc; }
        .glass-card { background: white; border-radius: 2rem; border: 1px solid #e2e8f0; box-shadow: 0 10px 25px rgba(0,0,0,0.03); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .hidden-field { display: none; }
    </style>
</head>
<body class="pb-24">

    <!-- Header -->
    <header class="bg-white/80 backdrop-blur-md border-b sticky top-0 z-50 p-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black text-slate-800">صلاح الخليفة</h1>
                <p class="text-[9px] text-blue-600 font-bold tracking-tighter">PREMIUM MANAGEMENT</p>
            </div>
            <div class="flex gap-4">
                <button onclick="loadAllData()" title="تحديث البيانات" class="text-2xl hover:scale-110 transition">🔄</button>
                <button onclick="logout()" title="خروج" class="text-2xl hover:scale-110 transition">🚪</button>
            </div>
        </div>
    </header>

    <div class="max-w-6xl mx-auto p-4 space-y-6">

        <!-- الفلترة -->
        <div class="glass-card p-6 grid grid-cols-1 md:grid-cols-3 gap-4 items-end text-right">
            <div><label class="text-[10px] font-bold mr-2">من</label><input type="date" id="d_from" class="w-full p-3 bg-slate-50 rounded-xl font-bold text-center border-none"></div>
            <div><label class="text-[10px] font-bold mr-2">إلى</label><input type="date" id="d_to" class="w-full p-3 bg-slate-50 rounded-xl font-bold text-center border-none"></div>
            <button onclick="loadAllData()" class="w-full bg-slate-900 text-white p-3 rounded-xl font-bold">عرض النتائج</button>
        </div>

        <!-- جدول التيمات والمصارف -->
        <div class="glass-card overflow-hidden">
            <div class="p-4 bg-slate-50/50 border-b flex justify-between items-center">
                <h3 class="font-black text-sm">📊 إحصائيات التيمات والـ CPL</h3>
                <button onclick="addNewTeam()" class="text-[10px] bg-blue-600 text-white px-3 py-1 rounded-full font-bold">تيم جديد +</button>
            </div>
            <table class="w-full text-right text-sm font-bold">
                <thead class="bg-slate-50 text-[10px] text-slate-400 font-black">
                    <tr><th class="p-4">التيم</th><th class="text-center">المصرف</th><th class="text-center">الحجز</th><th class="text-center text-blue-600">CPL</th></tr>
                </thead>
                <tbody id="team_table" class="divide-y divide-slate-50"></tbody>
            </table>
        </div>

        <!-- جدول الردود -->
        <div class="glass-card overflow-hidden">
            <div class="p-4 bg-slate-50/50 border-b"><h3 class="font-black text-sm">📈 أداء موظفي الردود</h3></div>
            <div class="overflow-x-auto">
                <table class="w-full text-right text-sm font-bold">
                    <thead class="bg-slate-50 text-[10px] text-slate-400 font-black text-center">
                        <tr><th class="p-4 text-right">الموظف</th><th>الشفت</th><th>الحجز</th><th class="text-emerald-600">الواصل</th><th class="text-amber-500">⭐</th></tr>
                    </thead>
                    <tbody id="redod_table" class="divide-y divide-slate-50 text-center"></tbody>
                </table>
            </div>
        </div>

        <!-- أزرار الإدارة السفلية -->
        <div class="grid grid-cols-2 gap-4">
            <button onclick="openAddModal()" class="bg-white border-2 border-slate-900 text-slate-900 p-5 rounded-[2rem] font-black shadow-sm">➕ إضافة موظف</button>
            <button onclick="toggleUserList()" class="bg-slate-900 text-white p-5 rounded-[2rem] font-black shadow-lg">👥 قائمة الموظفين والإجراءات</button>
        </div>

        <!-- قائمة الموظفين (المخفية) مع الإجراءات -->
        <div id="user_list_section" class="hidden glass-card p-6 space-y-4">
            <h3 class="font-black text-blue-600 underline text-sm">إدارة الحسابات والإجراءات:</h3>
            <div id="detailed_user_list" class="space-y-3"></div>
        </div>

        <!-- زر تصفير البيانات -->
        <button onclick="resetByDate()" class="w-full text-red-500 text-[10px] font-bold py-4">تصفير إحصائيات التاريخ المحدد ♻️</button>

    </div>

    <!-- نافذة إضافة موظف -->
    <div id="add_modal" class="modal">
        <div class="bg-white w-full max-w-md p-8 rounded-[2.5rem] space-y-4 mx-4 shadow-2xl">
            <h3 class="text-center font-black text-xl">إضافة موظف جديد</h3>
            
            <input id="in_name" placeholder="الاسم" class="w-full p-4 bg-slate-50 rounded-xl font-bold text-center border-none outline-none">
            <input id="in_pass" placeholder="كلمة السر" class="w-full p-4 bg-slate-50 rounded-xl font-bold text-center border-none outline-none">
            <input id="in_code" placeholder="الكود" class="w-full p-4 bg-slate-50 rounded-xl font-bold text-center text-blue-600 border-none outline-none">

            <!-- الرتبة -->
            <select id="in_role" onchange="handleRoleChange()" class="w-full p-4 bg-slate-50 rounded-xl font-bold text-center border-none outline-none">
                <option value="ردود">رتبة: ردود</option>
                <option value="مروج">رتبة: مروج</option>
                <option value="متابعة">رتبة: متابعة</option>
            </select>

            <!-- حقول الردود فقط -->
            <div id="redod_fields" class="space-y-4">
                <select id="in_shift_type" onchange="handleShiftChange()" class="w-full p-4 bg-slate-50 rounded-xl font-bold text-center border-none outline-none">
                    <option value="شفت كامل">شفت كامل</option>
                    <option value="نصف شفت">نصف شفت</option>
                </select>
                
                <select id="in_half_shift_detail" class="hidden-field w-full p-4 bg-amber-50 text-amber-700 rounded-xl font-bold text-center border-none outline-none">
                    <option value="صباحي">صباحي</option>
                    <option value="مسائي">مسائي</option>
                </select>

                <select id="in_team" class="w-full p-4 bg-blue-50 text-blue-700 rounded-xl font-bold text-center border-none outline-none"></select>
            </div>

            <input id="in_sal" type="number" placeholder="الراتب" class="w-full p-4 bg-slate-50 rounded-xl font-bold text-center border-none outline-none">

            <div class="flex gap-2">
                <button onclick="saveNewUser()" class="flex-1 bg-slate-900 text-white p-4 rounded-xl font-bold">حفظ</button>
                <button onclick="closeAddModal()" class="flex-1 bg-slate-100 text-slate-400 p-4 rounded-xl font-bold">إغلاق</button>
            </div>
        </div>
    </div>

    <script>
        const sb = supabase.createClient('https://iqagigpqwwtvriqvlfbv.supabase.co', 'sb_publishable_5xbaPlWHgjeeaIwceEFRrQ_d9aZ6Zax');

        function handleRoleChange() {
            const role = document.getElementById('in_role').value;
            document.getElementById('redod_fields').style.display = (role === 'ردود') ? 'block' : 'none';
        }

        function handleShiftChange() {
            const type = document.getElementById('in_shift_type').value;
            document.getElementById('in_half_shift_detail').classList.toggle('hidden-field', type !== 'نصف شفت');
        }

        function toggleUserList() { document.getElementById('user_list_section').classList.toggle('hidden'); }
        function openAddModal() { loadTeamsIntoSelect(); document.getElementById('add_modal').classList.add('active'); }
        function closeAddModal() { document.getElementById('add_modal').classList.remove('active'); }

        async function loadTeamsIntoSelect() {
            const { data } = await sb.from('teams').select('*');
            document.getElementById('in_team').innerHTML = data.map(t => `<option value="${t.team_name}">${t.team_name}</option>`).join('');
        }

        async function loadAllData() {
            const from = document.getElementById('d_from').value, to = document.getElementById('d_to').value;
            const { data: users } = await sb.from('users').select('*').neq('role','مدير');
            const { data: teams } = await sb.from('teams').select('*');
            const { data: reports } = await sb.from('bookings_reports').select('*').gte('report_date', from).lte('report_date', to);
            const { data: exps } = await sb.from('marketing_expenses').select('*').gte('expense_date', from).lte('expense_date', to);
            const { data: adjs } = await sb.from('adjustments').select('*');

            // 1. جدول التيمات
            document.getElementById('team_table').innerHTML = teams.map(t => {
                let s = exps.filter(e => e.target_team === t.team_name).reduce((a,b)=>a+Number(b.amount_spent),0);
                let b = reports.filter(r => users.find(u=>u.username===r.employee_username && u.team===t.team_name)).reduce((a,b)=>a+Number(b.bookings_count),0);
                return `<tr><td class="p-4">${t.team_name}</td><td class="text-center text-amber-600">${s}</td><td class="text-center">${b}</td><td class="text-center text-blue-600 font-black">${b>0?(s/b).toFixed(0):0}</td></tr>`;
            }).join('');

            // 2. جدول الردود
            document.getElementById('redod_table').innerHTML = users.filter(u=>u.user_job_role==='ردود').map(u => {
                let ur = reports.filter(r=>r.employee_username===u.username);
                let b = ur.reduce((a,b)=>a+Number(b.bookings_count),0);
                let w = ur.reduce((a,b)=>a+Number(b.confirmed_count),0);
                let stars = u.shift_type==='شفت كامل' ? (w>=50?2:w>=30?1:0) : (w>=25?2:w>=15?1:0);
                return `<tr><td class="p-4 text-right">${u.username}</td><td>${u.shift_type}</td><td>${b}</td><td class="text-emerald-600">${w}</td><td class="text-amber-500">${stars}⭐</td></tr>`;
            }).join('');

            // 3. قائمة الموظفين مع الإجراءات
            document.getElementById('detailed_user_list').innerHTML = users.map(u => {
                let uAdjs = adjs.filter(a => a.user_id === u.id);
                let bonus = uAdjs.filter(a => a.type === 'bonus').reduce((a,b)=>a+Number(b.amount),0);
                let penalty = uAdjs.filter(a => a.type === 'penalty').reduce((a,b)=>a+Number(b.amount),0);

                return `
                <div class="p-4 bg-slate-50 rounded-2xl flex flex-col md:flex-row justify-between items-center gap-4 border border-slate-100">
                    <div class="text-right">
                        <div class="font-black">${u.username} <span class="text-[9px] text-slate-400">(${u.user_job_role})</span></div>
                        <div class="text-[10px] text-blue-500">كود: ${u.employee_code} | سر: ${u.password}</div>
                        <div class="text-[9px] text-emerald-600 mt-1">مكافآت: ${bonus} | خصومات: ${penalty}</div>
                    </div>
                    <div class="flex flex-wrap gap-1 justify-center">
                        <button onclick="addAdj('${u.id}','bonus')" class="bg-emerald-500 text-white text-[9px] px-3 py-2 rounded-lg font-bold">🎁 +مكافأة</button>
                        <button onclick="clearAdj('${u.id}','bonus')" class="bg-emerald-100 text-emerald-700 text-[9px] px-2 py-2 rounded-lg italic">حذف مكافأة</button>
                        <button onclick="addAdj('${u.id}','penalty')" class="bg-red-500 text-white text-[9px] px-3 py-2 rounded-lg font-bold">💸 +خصم</button>
                        <button onclick="clearAdj('${u.id}','penalty')" class="bg-red-100 text-red-700 text-[9px] px-2 py-2 rounded-lg italic">حذف خصم</button>
                        <button onclick="editU('${u.id}')" class="bg-slate-200 text-slate-700 text-[9px] px-3 py-2 rounded-lg font-bold">✏️ تعديل</button>
                        <button onclick="delU('${u.id}')" class="bg-slate-900 text-white text-[9px] px-3 py-2 rounded-lg font-bold">🗑️ حذف</button>
                    </div>
                </div>`;
            }).join('');
        }

        async function saveNewUser() {
            const shiftVal = document.getElementById('in_shift_type').value;
            const detailVal = document.getElementById('in_half_shift_detail').value;
            const finalShift = (shiftVal === 'نصف شفت') ? `نصف شفت (${detailVal})` : 'شفت كامل';

            const payload = {
                username: document.getElementById('in_name').value,
                password: document.getElementById('in_pass').value,
                employee_code: document.getElementById('in_code').value,
                user_job_role: document.getElementById('in_role').value,
                shift_type: (document.getElementById('in_role').value === 'ردود') ? finalShift : '-',
                team: (document.getElementById('in_role').value === 'ردود') ? document.getElementById('in_team').value : '-',
                salary: document.getElementById('in_sal').value,
                role: 'موظف'
            };
            const { error } = await sb.from('users').insert([payload]);
            if(!error) { closeAddModal(); loadAllData(); }
        }

        async function addAdj(uid, type) {
            const { value: amt } = await Swal.fire({ title: 'أدخل المبلغ', input: 'number' });
            if(amt) { await sb.from('adjustments').insert([{user_id: uid, amount: amt, type: type}]); loadAllData(); }
        }

        async function clearAdj(uid, type) {
            if(confirm("هل تريد حذف جميع هذه السجلات للموظف؟")) {
                await sb.from('adjustments').delete().eq('user_id', uid).eq('type', type);
                loadAllData();
            }
        }

        async function delU(id) { if(confirm("حذف الموظف نهائياً؟")) { await sb.from('users').delete().eq('id', id); loadAllData(); } }
        async function resetByDate() {
            const d = document.getElementById('d_from').value;
            if(confirm(`تأكيد حذف إحصائيات يوم ${d}؟`)) {
                await sb.from('bookings_reports').delete().eq('report_date', d);
                await sb.from('marketing_expenses').delete().eq('expense_date', d);
                loadAllData();
            }
        }
        function logout() { localStorage.clear(); location.href='index.html'; }

        window.onload = () => {
            const now = new Date().toISOString().split('T')[0];
            document.getElementById('d_from').value = now;
            document.getElementById('d_to').value = now;
            loadAllData();
        };
    </script>
</body>
</html>
