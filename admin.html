<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام صلاح الخليفة v4.1</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f8fafc; }
        .glass-card { background: white; border-radius: 2.5rem; border: 1px solid #e2e8f0; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.05); }
        .loader { border-top-color: #3b82f6; animation: spinner 0.6s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(8px); z-index: 1000; align-items: center; justify-content: center; padding: 1rem; }
        .modal.active { display: flex; }
    </style>
</head>
<body class="pb-24">

    <header class="p-6 flex justify-between items-center bg-white border-b sticky top-0 z-[100]">
        <div>
            <h1 class="text-2xl font-black text-slate-900">صلاح الخليفة</h1>
            <span class="text-[10px] text-blue-500 font-bold tracking-widest uppercase">Management System V4.1</span>
        </div>
        <div class="flex gap-2">
            <button onclick="location.reload()" class="w-12 h-12 flex items-center justify-center rounded-2xl bg-slate-50 text-blue-600 border border-slate-200">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"></path><path d="M21 3v5h-5"></path></svg>
            </button>
        </div>
    </header>

    <div class="p-4 space-y-8 max-w-lg mx-auto">

        <div class="glass-card p-8 border-blue-50 relative overflow-hidden">
            <div class="grid grid-cols-2 gap-6 mb-6">
                <div class="text-right">
                    <label class="text-xs font-black text-slate-400 mr-2 mb-2 block">من تاريخ</label>
                    <input type="date" id="d_from" class="w-full bg-slate-50 border-none rounded-2xl p-4 text-sm font-bold text-center outline-none ring-2 ring-transparent focus:ring-blue-500/20">
                </div>
                <div class="text-right">
                    <label class="text-xs font-black text-slate-400 mr-2 mb-2 block">إلى تاريخ</label>
                    <input type="date" id="d_to" class="w-full bg-slate-50 border-none rounded-2xl p-4 text-sm font-bold text-center outline-none ring-2 ring-transparent focus:ring-blue-500/20">
                </div>
            </div>
            <button id="update_btn" onclick="loadAllData()" class="w-full bg-slate-900 text-white py-5 rounded-[1.8rem] font-black text-sm shadow-xl flex items-center justify-center gap-3 active:scale-95 transition-all">
                <span id="btn_text">تحديث البيانات والنتائج</span>
                <div id="btn_loader" class="hidden loader w-5 h-5 border-2 border-slate-300 rounded-full"></div>
            </button>
        </div>

        <div class="glass-card overflow-hidden">
            <div class="p-5 bg-slate-50 border-b flex justify-between items-center">
                <h3 class="font-black text-xs text-slate-500 italic">TEAM PERFORMANCE</h3>
                <button onclick="addNewTeam()" class="text-blue-600 font-bold text-[10px] bg-blue-50 px-4 py-2 rounded-xl">+ إضافة تيم</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-[11px] text-center">
                    <thead class="bg-slate-50 text-slate-400 font-bold border-b">
                        <tr><th class="p-4 text-right">التيم</th><th>المصرف</th><th>الحجوزات</th><th>CPL</th><th>⚙️</th></tr>
                    </thead>
                    <tbody id="team_table" class="divide-y font-bold text-slate-700"></tbody>
                    <tfoot id="team_foot" class="bg-slate-900 text-white font-black"></tfoot>
                </table>
            </div>
        </div>

        <div class="glass-card overflow-hidden">
            <div class="p-5 bg-slate-50 border-b">
                <h3 class="font-black text-xs text-slate-500 italic uppercase">Employee Incentives & Performance</h3>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-[10px] text-center">
                    <thead class="bg-slate-50 text-slate-400 font-bold border-b uppercase">
                        <tr>
                            <th class="p-4 text-right">الموظف</th>
                            <th>التيم</th>
                            <th>أيام</th>
                            <th>حجز</th>
                            <th class="text-emerald-600">واصل</th>
                            <th class="text-red-500">خصم</th>
                            <th class="text-blue-500">مكافأة</th>
                            <th class="bg-blue-50 text-blue-700">الصافي</th>
                        </tr>
                    </thead>
                    <tbody id="redod_table" class="divide-y font-bold text-slate-700"></tbody>
                </table>
            </div>
        </div>

        <div class="space-y-4">
            <button onclick="toggleUserList()" class="w-full bg-white border-2 border-slate-900 p-6 rounded-[2.5rem] font-black flex justify-between items-center px-10 shadow-sm active:scale-95 transition-all">
                <span>📂 إدارة شؤون الموظفين</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle></svg>
            </button>
            <div id="user_list_section" class="hidden space-y-3 animate-in fade-in slide-in-from-top-4 duration-300">
                <div id="detailed_user_list" class="space-y-3"></div>
            </div>
            <button onclick="openAddModal()" class="w-full bg-blue-600 text-white p-6 rounded-[2.5rem] font-black shadow-2xl shadow-blue-200 flex justify-between items-center px-10 active:scale-95 transition-all">
                <span>➕ تسجيل موظف جديد</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </button>
        </div>
    </div>

    <script>
        const sb = supabase.createClient('https://iqagigpqwwtvriqvlfbv.supabase.co', 'sb_publishable_5xbaPlWHgjeeaIwceEFRrQ_d9aZ6Zax');

        async function loadAllData() {
            const btn = document.getElementById('update_btn');
            const loader = document.getElementById('btn_loader');
            const text = document.getElementById('btn_text');
            const from = document.getElementById('d_from').value;
            const to = document.getElementById('d_to').value;

            if(!from || !to) return Swal.fire('تنبيه', 'يرجى تحديد التاريخ أولاً', 'info');

            // تفعيل حالة التحميل
            btn.disabled = true;
            loader.classList.remove('hidden');
            text.innerText = 'جاري التحديث...';

            try {
                const { data: users } = await sb.from('users').select('*').neq('role','مدير');
                const { data: teams } = await sb.from('teams').select('*');
                const { data: reports } = await sb.from('bookings_reports').select('*').gte('report_date', from).lte('report_date', to);
                const { data: exps } = await sb.from('marketing_expenses').select('*').gte('expense_date', from).lte('expense_date', to);
                const { data: bonuses } = await sb.from('bonuses').select('*').gte('bonus_date', from).lte('bonus_date', to);
                const { data: penalties } = await sb.from('penalties').select('*').gte('penalty_date', from).lte('penalty_date', to);

                // معالجة جدول التيمات
                let ts=0, tb=0;
                document.getElementById('team_table').innerHTML = teams.map(t => {
                    let s = exps.filter(e => e.target_team === t.team_name).reduce((a,b)=>a+Number(b.amount_spent),0);
                    let b = reports.filter(r => users.find(u=>u.username===r.employee_username && u.team===t.team_name)).reduce((a,b)=>a+Number(b.bookings_count),0);
                    ts+=s; tb+=b;
                    return `<tr class="border-b"><td class="p-4 text-right font-black text-slate-800">${t.team_name}</td><td>${s}</td><td>${b}</td><td class="text-blue-600 font-black">${b? (s/b).toFixed(1):0}</td><td><button onclick="editTeamName('${t.id}','${t.team_name}')" class="text-blue-300">✎</button></td></tr>`;
                }).join('');
                document.getElementById('team_foot').innerHTML = `<tr><td class="p-4 text-right italic">الإجمالي العام</td><td>${ts}</td><td>${tb}</td><td>${tb?(ts/tb).toFixed(1):0}</td><td>-</td></tr>`;

                // معالجة جدول الموظفين المطور
                document.getElementById('redod_table').innerHTML = users.filter(u=>u.user_job_role==='ردود').map(u => {
                    const ur = reports.filter(r => r.employee_username === u.username);
                    const w = ur.reduce((a,b)=>a+Number(b.confirmed_count),0);
                    const h = ur.reduce((a,b)=>a+Number(b.bookings_count),0);
                    const days = new Set(ur.map(r=>r.report_date)).size;
                    
                    // حساب النقاط التلقائية
                    let autoP = 0;
                    if(u.shift_type?.includes("كامل")) { if(w >= 50) autoP = 2; else if(w >= 30) autoP = 1; }
                    else { if(w >= 25) autoP = 2; else if(w >= 15) autoP = 1; }

                    const manualB = bonuses.filter(b => b.employee_username === u.username).reduce((a,b)=>a+Number(b.bonus_amount),0);
                    const manualP = penalties.filter(p => p.employee_username === u.username).reduce((a,b)=>a+Number(p.penalty_amount),0);
                    const net = autoP + manualB - manualP;

                    return `<tr class="border-b hover:bg-slate-50 transition-colors">
                        <td class="p-4 text-right font-black text-slate-800">${u.username}</td>
                        <td class="text-slate-400 font-bold">${u.team || '-'}</td>
                        <td>${days} ي</td>
                        <td>${h}</td>
                        <td class="text-emerald-600">${w}</td>
                        <td class="text-red-500">${manualP}</td>
                        <td class="text-blue-500">${manualB}</td>
                        <td class="bg-blue-50/50 text-blue-700 font-black">${net} pts</td>
                    </tr>`;
                }).join('');

                // تحديث قائمة المربعات
                updateUserCards(users);

            } catch (err) {
                Swal.fire('خطأ', 'حدث خلل أثناء جلب البيانات', 'error');
            } finally {
                // إنهاء حالة التحميل
                setTimeout(() => {
                    btn.disabled = false;
                    loader.classList.add('hidden');
                    text.innerText = 'تحديث البيانات والنتائج';
                }, 500);
            }
        }

        function updateUserCards(users) {
            document.getElementById('detailed_user_list').innerHTML = users.map(u => `
                <div class="bg-white p-5 rounded-[2rem] border border-slate-100 flex justify-between items-center shadow-sm">
                    <div class="text-right">
                        <div class="font-black text-slate-800 text-sm">${u.username}</div>
                        <div class="text-[9px] text-slate-400 font-bold uppercase mt-1">${u.user_job_role} | ${u.team || 'بدون تيم'}</div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick='addPoints("${u.username}", "bonus")' class="w-10 h-10 flex items-center justify-center bg-emerald-50 text-emerald-600 rounded-xl font-black">+</button>
                        <button onclick='addPoints("${u.username}", "penalty")' class="w-10 h-10 flex items-center justify-center bg-red-50 text-red-500 rounded-xl font-black">-</button>
                        <button onclick='openEditModal(${JSON.stringify(u)})' class="bg-slate-900 text-white px-5 py-2 rounded-xl text-[10px] font-black">تعديل</button>
                    </div>
                </div>`).join('');
        }

        async function addPoints(name, type) {
            const title = type === 'bonus' ? 'إضافة نقاط مكافأة' : 'خصم نقاط';
            const { value: pts } = await Swal.fire({ title, input: 'number', confirmButtonColor: '#0f172a' });
            if (pts) {
                const table = type === 'bonus' ? 'bonuses' : 'penalties';
                const col = type === 'bonus' ? 'bonus_amount' : 'penalty_amount';
                const dateCol = type === 'bonus' ? 'bonus_date' : 'penalty_date';
                await sb.from(table).insert([{ employee_username: name, [col]: pts, [dateCol]: new Date().toISOString().split('T')[0] }]);
                loadAllData();
            }
        }

        function toggleUserList() { document.getElementById('user_list_section').classList.toggle('hidden'); }
        window.onload = () => {
            const now = new Date().toISOString().split('T')[0];
            document.getElementById('d_from').value = now;
            document.getElementById('d_to').value = now;
            loadAllData();
        };
    </script>
</body>
</html>
