<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لوحة صلاح الخليفة | Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f1f5f9; color: #1e293b; overflow-x: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-radius: 2rem; border: 1px solid rgba(226, 232, 240, 0.8); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05); }
        .btn-modern { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .btn-modern:active { transform: scale(0.95); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(10px); z-index: 1000; align-items: center; justify-content: center; padding: 1rem; }
        .modal.active { display: flex; }
        .action-menu { display: none; position: absolute; left: 0; top: 50px; background: white; border-radius: 1.5rem; box-shadow: 0 15px 35px rgba(0,0,0,0.15); z-index: 100; min-width: 180px; border: 1px solid #edf2f7; overflow: hidden; }
        .action-menu.active { display: block; animation: popIn 0.2s ease-out; }
        @keyframes popIn { from { opacity: 0; transform: scale(0.9) translateY(-10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .nav-icon { width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 1rem; transition: 0.3s; background: #f8fafc; }
        .nav-icon:hover { background: #e2e8f0; }
    </style>
</head>
<body class="pb-24">

    <header class="sticky top-0 z-[100] bg-white/80 backdrop-blur-md px-5 py-4 border-b flex justify-between items-center shadow-sm">
        <div>
            <h1 class="text-xl font-black text-slate-900 tracking-tight">صلاح الخليفة</h1>
            <div class="flex items-center gap-1">
                <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                <span class="text-[9px] font-bold text-slate-400 uppercase">النظام مفعل</span>
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="loadAllData()" class="nav-icon text-blue-600 border" title="تحديث">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"></path><path d="M21 3v5h-5"></path></svg>
            </button>
            <button onclick="logout()" class="nav-icon text-red-500 border" title="خروج">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            </button>
        </div>
    </header>

    <div class="p-4 space-y-6 max-w-lg mx-auto">

        <div class="glass-card p-5 space-y-4 border-blue-100 bg-gradient-to-br from-white to-blue-50/30">
            <div class="grid grid-cols-2 gap-3">
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-500 pr-1">تبدأ من</label>
                    <input type="date" id="d_from" class="w-full p-3.5 bg-white rounded-2xl font-bold border-none shadow-inner text-sm">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-500 pr-1">تنتهي في</label>
                    <input type="date" id="d_to" class="w-full p-3.5 bg-white rounded-2xl font-bold border-none shadow-inner text-sm">
                </div>
            </div>
            <button onclick="loadAllData()" class="btn-modern w-full bg-slate-900 text-white p-4 rounded-2xl font-black text-sm shadow-xl flex items-center justify-center gap-3">
                تحديث العرض
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            </button>
        </div>

        <div class="glass-card overflow-hidden border-none shadow-sm">
            <div class="p-4 bg-slate-50/50 border-b flex justify-between items-center">
                <h3 class="font-black text-xs text-slate-700 uppercase tracking-wide">📦 التيمات والـ CPL</h3>
                <button onclick="addNewTeam()" class="bg-blue-600 text-white p-2 rounded-lg"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg></button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-right text-[12px]">
                    <thead class="bg-slate-50 text-slate-400 font-bold">
                        <tr><th class="p-4">اسم التيم</th><th class="text-center">المصرف</th><th class="text-center">الحجوزات</th><th class="text-center text-blue-600">CPL</th></tr>
                    </thead>
                    <tbody id="team_table" class="divide-y font-bold text-slate-700"></tbody>
                </table>
            </div>
        </div>

        <div class="glass-card overflow-hidden border-none shadow-sm">
            <div class="p-4 bg-slate-50/50 border-b font-black text-xs text-slate-700 tracking-wide uppercase">🚀 أداء موظفي الردود</div>
            <div class="overflow-x-auto">
                <table class="w-full text-right text-[12px]">
                    <thead class="bg-slate-50 text-slate-400 font-bold text-center">
                        <tr><th class="p-4 text-right">الموظف</th><th>الحجوزات</th><th class="text-emerald-600">الواصل</th><th class="text-amber-500">النجوم</th></tr>
                    </thead>
                    <tbody id="redod_table" class="divide-y text-center font-bold text-slate-700"></tbody>
                </table>
            </div>
        </div>

        <div class="grid grid-cols-1 gap-4">
            <button onclick="toggleUserList()" class="btn-modern bg-white text-slate-900 border-2 border-slate-900 p-5 rounded-3xl font-black shadow-sm flex justify-between items-center px-6">
                قائمة الموظفين والإجراءات
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
            </button>
            <button onclick="openAddModal()" class="btn-modern bg-blue-600 text-white p-5 rounded-3xl font-black shadow-xl flex justify-between items-center px-6">
                إضافة موظف جديد
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </button>
        </div>

        <div id="user_list_section" class="hidden space-y-4 animate-in fade-in slide-in-from-bottom-4 duration-300">
            <div id="detailed_user_list" class="space-y-3"></div>
        </div>

        <button onclick="resetByDate()" class="w-full text-slate-400 text-[10px] font-bold py-4">تصفير بيانات اليوم ♻️</button>
    </div>

    <div id="add_modal" class="modal">
        <div class="bg-white w-full max-w-sm p-8 rounded-[2.5rem] space-y-4 shadow-2xl relative">
            <button onclick="closeAddModal()" class="absolute top-6 left-6 text-slate-300">✕</button>
            <h3 class="font-black text-xl text-slate-900 mb-6 text-center">إضافة موظف جديد</h3>
            
            <input id="in_name" placeholder="الاسم الكامل" class="w-full p-4 bg-slate-50 rounded-2xl font-bold border-none outline-none focus:ring-2 focus:ring-blue-500/20 transition">
            <input id="in_pass" placeholder="كلمة السر" class="w-full p-4 bg-slate-50 rounded-2xl font-bold border-none outline-none focus:ring-2 focus:ring-blue-500/20 transition">
            <input id="in_code" placeholder="الكود (A01)" class="w-full p-4 bg-slate-50 rounded-2xl font-bold border-none outline-none text-blue-600">
            
            <select id="in_role" onchange="handleRoleChange()" class="w-full p-4 bg-slate-50 rounded-2xl font-bold border-none">
                <option value="ردود">رتبة: ردود</option>
                <option value="مروج">رتبة: مروج</option>
                <option value="متابعة">رتبة: متابعة</option>
            </select>

            <div id="redod_fields" class="space-y-4">
                <select id="in_shift_type" onchange="handleShiftChange()" class="w-full p-4 bg-slate-100 rounded-2xl font-bold border-none">
                    <option value="شفت كامل">شفت كامل</option>
                    <option value="نصف شفت">نصف شفت</option>
                </select>
                <select id="in_half_detail" class="hidden w-full p-4 bg-amber-50 text-amber-700 rounded-2xl font-bold border-none">
                    <option value="صباحي">دوام صباحي</option>
                    <option value="مسائي">دوام مسائي</option>
                </select>
                <select id="in_team" class="w-full p-4 bg-blue-50 text-blue-700 rounded-2xl font-bold border-none"></select>
            </div>

            <input id="in_sal" type="number" placeholder="الراتب" class="w-full p-4 bg-slate-50 rounded-2xl font-bold border-none">

            <div class="flex gap-3 pt-4">
                <button onclick="saveNewUser()" class="btn-modern flex-[2] bg-blue-600 text-white p-4 rounded-2xl font-black">حفظ الموظف</button>
                <button onclick="closeAddModal()" class="btn-modern flex-1 bg-slate-100 text-slate-400 p-4 rounded-2xl font-bold text-sm">إلغاء</button>
            </div>
        </div>
    </div>

    <script>
        const sb = supabase.createClient('https://iqagigpqwwtvriqvlfbv.supabase.co', 'sb_publishable_5xbaPlWHgjeeaIwceEFRrQ_d9aZ6Zax');

        function handleRoleChange() {
            document.getElementById('redod_fields').style.display = (document.getElementById('in_role').value === 'ردود') ? 'block' : 'none';
        }

        function handleShiftChange() {
            document.getElementById('in_half_detail').classList.toggle('hidden', document.getElementById('in_shift_type').value !== 'نصف شفت');
        }

        function toggleUserList() { document.getElementById('user_list_section').classList.toggle('hidden'); }
        function openAddModal() { loadTeamsMenu(); document.getElementById('add_modal').classList.add('active'); }
        function closeAddModal() { document.getElementById('add_modal').classList.remove('active'); }

        async function loadTeamsMenu() {
            const { data } = await sb.from('teams').select('*');
            document.getElementById('in_team').innerHTML = data.map(t => `<option value="${t.team_name}">${t.team_name}</option>`).join('');
        }

        async function loadAllData() {
            const from = document.getElementById('d_from').value, to = document.getElementById('d_to').value;
            if(!from || !to) return;

            const { data: users } = await sb.from('users').select('*').neq('role','مدير');
            const { data: teams } = await sb.from('teams').select('*');
            const { data: reports } = await sb.from('bookings_reports').select('*').gte('report_date', from).lte('report_date', to);
            const { data: exps } = await sb.from('marketing_expenses').select('*').gte('expense_date', from).lte('expense_date', to);
            const { data: adjs } = await sb.from('adjustments').select('*');

            // التيمات
            document.getElementById('team_table').innerHTML = teams.map(t => {
                let spent = exps.filter(e => e.target_team === t.team_name).reduce((a,b)=>a+Number(b.amount_spent),0);
                let bks = reports.filter(r => users.find(u=>u.username===r.employee_username && u.team===t.team_name)).reduce((a,b)=>a+Number(b.bookings_count),0);
                return `<tr><td class="p-4">${t.team_name}</td><td class="text-center text-amber-600">${spent}</td><td class="text-center">${bks}</td><td class="text-center text-blue-600 font-black">${bks>0?(spent/bks).toFixed(0):0}</td></tr>`;
            }).join('');

            // الردود
            document.getElementById('redod_table').innerHTML = users.filter(u=>u.user_job_role==='ردود').map(u => {
                let ur = reports.filter(r=>r.employee_username===u.username);
                let bks = ur.reduce((a,b)=>a+Number(b.bookings_count),0);
                let wasl = ur.reduce((a,b)=>a+Number(b.confirmed_count),0);
                let stars = u.shift_type.includes('كامل') ? (wasl>=50?2:wasl>=30?1:0) : (wasl>=25?2:wasl>=15?1:0);
                return `<tr class="border-b"><td class="p-4 text-right font-black">${u.username}</td><td>${bks}</td><td class="text-emerald-600 font-black">${wasl}</td><td class="text-amber-500">${'★'.repeat(stars)}</td></tr>`;
            }).join('');

            // قائمة الموظفين
            document.getElementById('detailed_user_list').innerHTML = users.map(u => `
                <div class="bg-white p-4 rounded-3xl border flex justify-between items-center relative shadow-sm">
                    <div class="text-right">
                        <div class="font-black text-sm text-slate-800">${u.username} <span class="text-[8px] bg-slate-100 text-slate-500 px-2 py-0.5 rounded-full mr-1">${u.user_job_role}</span></div>
                        <div class="text-[10px] text-slate-400 mt-1 font-bold">Code: ${u.employee_code} | Pass: ${u.password}</div>
                    </div>
                    <div class="relative">
                        <button onclick="toggleMenu('${u.id}')" class="w-10 h-10 bg-slate-50 rounded-full flex items-center justify-center border text-slate-400 font-bold">•••</button>
                        <div id="menu-${u.id}" class="action-menu shadow-2xl">
                            <button onclick="addAdj('${u.id}','bonus')" class="w-full p-4 text-right text-emerald-600 border-b flex items-center justify-between font-bold text-xs">مكافأة <span>🎁</span></button>
                            <button onclick="clearAdj('${u.id}','bonus')" class="w-full p-3 text-right text-emerald-300 border-b text-[9px] italic">حذف مكافأة</button>
                            <button onclick="addAdj('${u.id}','penalty')" class="w-full p-4 text-right text-red-600 border-b flex items-center justify-between font-bold text-xs">خصم <span>💸</span></button>
                            <button onclick="clearAdj('${u.id}','penalty')" class="w-full p-3 text-right text-red-300 border-b text-[9px] italic">حذف خصم</button>
                            <button onclick="delU('${u.id}')" class="w-full p-4 text-right text-slate-900 flex items-center justify-between font-bold text-xs">حذف الموظف <span>🗑️</span></button>
                        </div>
                    </div>
                </div>`).join('');
        }

        function toggleMenu(id) {
            const all = document.querySelectorAll('.action-menu');
            all.forEach(m => { if(m.id !== 'menu-'+id) m.classList.remove('active'); });
            document.getElementById('menu-'+id).classList.toggle('active');
        }

        window.onclick = (e) => { if(!e.target.matches('button')) document.querySelectorAll('.action-menu').forEach(m => m.classList.remove('active')); }

        async function saveNewUser() {
            const role = document.getElementById('in_role').value;
            const shift = document.getElementById('in_shift_type').value;
            const detail = document.getElementById('in_half_detail').value;
            const finalShift = (role === 'ردود') ? (shift === 'نصف شفت' ? `نصف (${detail})` : 'شفت كامل') : '-';
            
            const { error } = await sb.from('users').insert([{
                username: document.getElementById('in_name').value, password: document.getElementById('in_pass').value,
                employee_code: document.getElementById('in_code').value, user_job_role: role,
                shift_type: finalShift, team: (role === 'ردود' ? document.getElementById('in_team').value : '-'),
                salary: document.getElementById('in_sal').value, role: 'موظف'
            }]);
            if(!error) { closeAddModal(); loadAllData(); Swal.fire({title:'تم!', text:'تمت إضافة الموظف', icon:'success', confirmButtonColor:'#2563eb'}); }
        }

        async function addAdj(uid, type) {
            const { value: amt } = await Swal.fire({ title: 'أدخل المبلغ', input: 'number', inputAttributes: { min: 1 }, confirmButtonColor: '#2563eb' });
            if(amt) { await sb.from('adjustments').insert([{user_id: uid, amount: amt, type: type}]); loadAllData(); }
        }

        async function clearAdj(uid, type) { if(confirm("حذف السجلات؟")) { await sb.from('adjustments').delete().eq('user_id', uid).eq('type', type); loadAllData(); } }
        async function delU(id) { if(confirm("حذف الموظف نهائياً؟")) { await sb.from('users').delete().eq('id', id); loadAllData(); } }
        async function addNewTeam() { const { value: t } = await Swal.fire({ title: 'اسم التيم الجديد', input: 'text' }); if(t) { await sb.from('teams').insert([{team_name: t}]); loadAllData(); } }
        function logout() { localStorage.clear(); location.href='index.html'; }

        window.onload = () => {
            const now = new Date().toISOString().split('T')[0];
            document.getElementById('d_from').value = now;
            document.getElementById('d_to').value = now;
            loadAllData();
        };
    </script>
</body>
</html>
