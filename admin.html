<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة صلاح الخليفة | المود الذكي</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f8fafc; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(8px); align-items: center; justify-content: center; z-index: 50; padding: 1rem; }
        .modal.active { display: flex; }
        .glass-card { background: white; max-height: 90vh; overflow-y: auto; border-radius: 2rem; width: 100%; max-width: 450px; padding: 2rem; shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); }
    </style>
</head>
<body class="pb-24">

    <header class="bg-white border-b p-5 sticky top-0 z-40 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black">S</div>
            <h2 class="font-black text-slate-800 tracking-tight">إدارة النظام</h2>
        </div>
        <button onclick="fullReset()" class="bg-red-50 text-red-600 px-4 py-2 rounded-xl text-xs font-bold border border-red-100">♻️ تصفير البيانات</button>
    </header>

    <div class="p-4 max-w-5xl mx-auto space-y-6">
        
        <!-- الفلتر الزمني -->
        <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-200 grid grid-cols-2 gap-4">
            <div>
                <label class="block text-[10px] font-bold text-slate-400 mb-1">من تاريخ</label>
                <input type="date" id="date_from" onchange="loadAllData()" class="w-full p-3 bg-slate-50 border rounded-xl text-center font-bold">
            </div>
            <div>
                <label class="block text-[10px] font-bold text-slate-400 mb-1">إلى تاريخ</label>
                <input type="date" id="date_to" onchange="loadAllData()" class="w-full p-3 bg-slate-50 border rounded-xl text-center font-bold">
            </div>
        </div>

        <!-- أرقام سريعة -->
        <div class="grid grid-cols-3 gap-3">
            <div class="bg-blue-600 text-white p-5 rounded-3xl shadow-blue-200 shadow-lg text-center">
                <p class="text-[10px] opacity-80">حجز</p>
                <h3 id="stat_bookings" class="font-black text-2xl">0</h3>
            </div>
            <div class="bg-emerald-500 text-white p-5 rounded-3xl shadow-emerald-200 shadow-lg text-center">
                <p class="text-[10px] opacity-80">واصل</p>
                <h3 id="stat_confirmed" class="font-black text-2xl">0</h3>
            </div>
            <div class="bg-slate-800 text-white p-5 rounded-3xl shadow-lg text-center">
                <p class="text-[10px] opacity-80">CPL إجمالي</p>
                <h3 id="stat_cpl" class="font-black text-2xl">0</h3>
            </div>
        </div>

        <!-- جدول التقرير -->
        <div class="bg-white rounded-[2.5rem] shadow-sm border border-slate-200 overflow-hidden">
            <div class="p-6 border-b flex justify-between items-center">
                <h3 class="font-bold text-sm">📊 التقرير التحليلي</h3>
                <button onclick="manageTeams()" class="text-xs font-bold text-blue-600 bg-blue-50 px-3 py-1 rounded-full">🚩 إدارة التيمات</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-right text-xs">
                    <thead class="bg-slate-50 text-slate-500">
                        <tr>
                            <th class="p-4">الموظف/التيم</th>
                            <th class="p-4 text-center">الرتبة</th>
                            <th class="p-4 text-center">حجز</th>
                            <th class="p-4 text-center">واصل</th>
                            <th class="p-4 text-center">المصرف</th>
                            <th class="p-4 text-center font-bold text-blue-600">CPL</th>
                        </tr>
                    </thead>
                    <tbody id="main_table_body" class="divide-y divide-slate-50"></tbody>
                </table>
            </div>
        </div>

        <!-- التحكم -->
        <div class="grid grid-cols-2 gap-4">
            <button onclick="openAddModal()" class="bg-white border-2 border-dashed border-blue-200 text-blue-600 p-5 rounded-3xl font-black flex items-center justify-center gap-2">
                <span>➕</span> إضافة موظف جديد
            </button>
            <button onclick="document.getElementById('emp_list_section').classList.toggle('hidden')" class="bg-slate-100 text-slate-600 p-5 rounded-3xl font-black">
                👥 قائمة الموظفين
            </button>
        </div>

        <div id="emp_list_section" class="hidden grid grid-cols-1 gap-2" id="emp_list_mobile"></div>
    </div>

    <!-- نافذة إضافة موظف -->
    <div id="add_emp_modal" class="modal">
        <div class="glass-card space-y-4">
            <h3 id="modal_title" class="font-black text-xl text-center mb-4">بيانات الموظف</h3>
            <input id="en" placeholder="الاسم" class="w-full p-4 bg-slate-50 border rounded-2xl text-center font-bold">
            <input id="ep" type="password" placeholder="كلمة السر" class="w-full p-4 bg-slate-50 border rounded-2xl text-center">
            <input id="ec" placeholder="الكود (A01)" class="w-full p-4 bg-slate-50 border rounded-2xl text-center font-black text-blue-600">
            
            <label class="text-[10px] font-bold pr-2">الرتبة الوظيفية</label>
            <select id="user_job_role" onchange="uiLogic()" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold text-center appearance-none">
                <option value="ردود">ردود</option>
                <option value="مروج">مروج</option>
                <option value="متابعة">متابعة</option>
            </select>

            <div id="extra_fields" class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold pr-2">اختيار التيم</label>
                    <select id="team_select" class="w-full p-4 bg-blue-50 border border-blue-100 rounded-2xl font-bold text-center"></select>
                </div>
                <div>
                    <label class="text-[10px] font-bold pr-2">نوع الشفت</label>
                    <select id="shift_type" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold text-center">
                        <option value="شفت كامل">شفت كامل</option>
                        <option value="نصف شفت">نصف شفت</option>
                    </select>
                </div>
            </div>

            <input id="ey" type="number" placeholder="الراتب الأساسي" class="w-full p-4 bg-slate-50 border rounded-2xl text-center">

            <div class="grid grid-cols-2 gap-3 mt-6">
                <button onclick="saveEmployee()" class="bg-blue-600 text-white p-4 rounded-2xl font-bold">حفظ الموظف</button>
                <button onclick="toggleModal('add_emp_modal')" class="bg-slate-100 p-4 rounded-2xl font-bold">إلغاء</button>
            </div>
        </div>
    </div>

    <script>
        const sb = supabase.createClient('https://iqagigpqwwtvriqvlfbv.supabase.co', 'sb_publishable_5xbaPlWHgjeeaIwceEFRrQ_d9aZ6Zax');
        let allUsers = [], allTeams = [];

        function toggleModal(id) { document.getElementById(id).classList.toggle('active'); }

        // إخفاء وإظهار الحقول بناءً على الرتبة
        function uiLogic() {
            const role = document.getElementById('user_job_role').value;
            const extra = document.getElementById('extra_fields');
            // يظهر التيم والشفت فقط إذا كان "ردود"
            extra.style.display = (role === 'ردود') ? 'block' : 'none';
        }

        async function manageTeams() {
            const { value: tName } = await Swal.fire({ title: 'إضافة تيم جديد', input: 'text', inputPlaceholder: 'اسم التيم...' });
            if (tName) {
                await sb.from('teams').insert([{ team_name: tName }]);
                loadTeams();
            }
        }

        async function loadTeams() {
            const { data } = await sb.from('teams').select('*');
            allTeams = data || [];
            const select = document.getElementById('team_select');
            select.innerHTML = allTeams.map(t => `<option value="${t.team_name}">${t.team_name}</option>`).join('');
        }

        async function loadAllData() {
            const from = document.getElementById('date_from').value;
            const to = document.getElementById('date_to').value;
            if(!from || !to) return;

            const { data: users } = await sb.from('users').select('*').neq('role','مدير');
            const { data: reports } = await sb.from('bookings_reports').select('*').gte('report_date', from).lte('report_date', to);
            const { data: expenses } = await sb.from('marketing_expenses').select('*').gte('expense_date', from).lte('expense_date', to);
            
            allUsers = users || [];
            
            // تجميع المصاريف حسب التيم
            const teamExp = {};
            let totalSpent = 0;
            expenses?.forEach(e => {
                teamExp[e.target_team] = (teamExp[e.target_team] || 0) + Number(e.amount_spent);
                totalSpent += Number(e.amount_spent);
            });

            const tbody = document.getElementById('main_table_body');
            tbody.innerHTML = "";
            let tBook = 0, tConf = 0;

            allUsers.forEach(u => {
                const myReports = reports?.filter(r => r.employee_username === u.username) || [];
                const uBook = myReports.reduce((s, r) => s + (r.bookings_count || 0), 0);
                const uConf = myReports.reduce((s, r) => s + (r.confirmed_count || 0), 0);
                const uSpent = u.user_job_role === 'ردود' ? (teamExp[u.team] || 0) : 0;
                const cpl = uBook > 0 ? (uSpent / uBook).toFixed(0) : 0;

                tBook += uBook; tConf += uConf;

                tbody.innerHTML += `
                    <tr>
                        <td class="p-4 font-bold">${u.username}<br><span class="text-[9px] text-slate-400 font-normal">${u.team || '-'}</span></td>
                        <td class="p-4 text-center text-[10px] text-slate-500">${u.user_job_role}</td>
                        <td class="p-4 text-center font-bold">${uBook}</td>
                        <td class="p-4 text-center text-emerald-600 font-bold">${uConf}</td>
                        <td class="p-4 text-center text-slate-400">${uSpent.toLocaleString()}</td>
                        <td class="p-4 text-center font-black text-blue-600">${cpl}</td>
                    </tr>`;
            });

            document.getElementById('stat_bookings').innerText = tBook;
            document.getElementById('stat_confirmed').innerText = tConf;
            document.getElementById('stat_cpl').innerText = tBook > 0 ? (totalSpent / tBook).toFixed(0) : 0;
        }

        async function saveEmployee() {
            const role = document.getElementById('user_job_role').value;
            const obj = {
                username: document.getElementById('en').value,
                password: document.getElementById('ep').value,
                employee_code: document.getElementById('ec').value,
                user_job_role: role,
                shift_type: role === 'ردود' ? document.getElementById('shift_type').value : 'كامل',
                team: role === 'ردود' ? document.getElementById('team_select').value : null,
                salary: document.getElementById('ey').value,
                role: 'موظف'
            };
            await sb.from('users').insert([obj]);
            location.reload();
        }

        async function fullReset() {
            const { isConfirmed } = await Swal.fire({ 
                title: 'تصفير الإحصائيات؟', 
                text: "سيتم مسح الطلبات والمصاريف فقط، الحسابات والتيمات لن تُحذف.", 
                icon: 'warning', 
                showCancelButton: true,
                confirmButtonText: 'نعم، تصفير'
            });
            if(isConfirmed) {
                await sb.from('bookings_reports').delete().neq('id', 0);
                await sb.from('marketing_expenses').delete().neq('id', 0);
                await sb.from('adjustments').delete().neq('id', 0);
                location.reload();
            }
        }

        function openAddModal() {
            loadTeams();
            toggleModal('add_emp_modal');
            uiLogic();
        }

        window.onload = () => {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('date_from').value = today;
            document.getElementById('date_to').value = today;
            loadAllData();
        };
    </script>
</body>
</html>
