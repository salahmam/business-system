<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الأستاذ صلاح الخليفة | الإدارة العامة</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f1f5f9; }
        .glass-card { background: white; border-radius: 2rem; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
    </style>
</head>
<body class="pb-20">

    <header class="bg-slate-900 text-white p-6 sticky top-0 z-50 shadow-xl rounded-b-[2.5rem]">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black text-blue-400">صلاح الخليفة</h1>
                <p class="text-[10px] text-slate-400 font-bold">المدير العام للنظام</p>
            </div>
            <div class="flex gap-2">
                <button onclick="loadData()" class="bg-blue-600 px-5 py-2 rounded-xl font-bold text-sm">تحديث 🔄</button>
                <button onclick="logout()" class="bg-red-500/20 text-red-400 border border-red-500/30 px-4 py-2 rounded-xl text-sm font-bold">خروج 🚪</button>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto p-4 space-y-6">

        <!-- الفلترة والحذف بالتاريخ -->
        <div class="glass-card p-6 grid grid-cols-1 md:grid-cols-3 gap-4 items-end">
            <div>
                <label class="block text-xs font-black text-slate-400 mb-2 mr-2">من تاريخ</label>
                <input type="date" id="date_from" class="w-full p-4 bg-slate-50 border-none rounded-2xl font-bold text-center">
            </div>
            <div>
                <label class="block text-xs font-black text-slate-400 mb-2 mr-2">إلى تاريخ</label>
                <input type="date" id="date_to" class="w-full p-4 bg-slate-50 border-none rounded-2xl font-bold text-center">
            </div>
            <div class="flex gap-2">
                <button onclick="loadData()" class="flex-1 bg-slate-800 text-white p-4 rounded-2xl font-bold">عرض</button>
                <button onclick="resetStatsByDate()" class="flex-1 bg-red-50 text-red-600 border border-red-100 p-4 rounded-2xl font-bold text-xs">تصفير التاريخ ♻️</button>
            </div>
        </div>

        <!-- أزرار الإدارة السريعة -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <button onclick="openAddModal()" class="bg-blue-600 text-white p-6 rounded-[2rem] font-black text-lg shadow-lg">➕ إضافة موظف جديد</button>
            <button onclick="toggleUserList()" class="bg-white border text-slate-700 p-6 rounded-[2rem] font-black text-lg shadow-sm">👥 عرض قائمة اليوزرات</button>
        </div>

        <!-- قائمة اليوزرات (تظهر وتختفي) -->
        <div id="user_list_section" class="hidden glass-card p-6">
            <h3 class="font-black mb-4 text-blue-600 underline">قائمة حسابات الموظفين:</h3>
            <div id="user_list_grid" class="grid grid-cols-1 md:grid-cols-3 gap-3"></div>
        </div>

        <!-- جداول التيمات (المصرف والـ CPL) -->
        <div class="glass-card overflow-hidden">
            <div class="p-5 bg-slate-50 border-b flex justify-between items-center">
                <h3 class="font-black text-slate-800">💰 إحصائيات التيمات والمصرف</h3>
                <button onclick="addTeam()" class="text-xs text-blue-600 font-bold underline">إضافة تيم +</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-right">
                    <thead class="bg-slate-50 text-[10px] text-slate-400 font-black">
                        <tr><th class="p-4">التيم</th><th class="p-4 text-center">المصرف</th><th class="p-4 text-center">الحجوزات</th><th class="p-4 text-center text-blue-600">CPL</th></tr>
                    </thead>
                    <tbody id="teams_table_body" class="divide-y divide-slate-50 font-bold"></tbody>
                </table>
            </div>
        </div>

        <!-- جدول موظفي الردود فقط -->
        <div class="glass-card overflow-hidden">
            <div class="p-5 bg-slate-50 border-b"><h3 class="font-black text-slate-800">📉 أداء موظفي الردود (حجز / واصل)</h3></div>
            <div class="overflow-x-auto">
                <table class="w-full text-right">
                    <thead class="bg-slate-50 text-[10px] text-slate-400 font-black">
                        <tr>
                            <th class="p-4">الموظف</th><th class="p-4 text-center">الشفت</th><th class="p-4 text-center">الحجز</th>
                            <th class="p-4 text-center text-emerald-600">الواصل</th><th class="p-4 text-center text-amber-500">النقاط ⭐</th><th class="p-4 text-center">الإجراء</th>
                        </tr>
                    </thead>
                    <tbody id="redod_table_body" class="divide-y divide-slate-50 font-bold text-sm"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- نافذة إضافة موظف (Modal) -->
    <div id="add_modal" class="modal">
        <div class="bg-white w-full max-w-md p-8 rounded-[2.5rem] space-y-4 mx-4">
            <h3 class="text-center font-black text-xl">إضافة موظف جديد</h3>
            <input id="new_name" placeholder="الاسم" class="w-full p-4 bg-slate-50 rounded-xl text-center font-bold outline-none">
            <input id="new_pass" type="password" placeholder="كلمة السر" class="w-full p-4 bg-slate-50 rounded-xl text-center outline-none">
            <input id="new_code" placeholder="الكود (A01)" class="w-full p-4 bg-slate-50 rounded-xl text-center font-bold text-blue-600 outline-none">
            <select id="new_role" class="w-full p-4 bg-slate-50 rounded-xl font-bold text-center appearance-none outline-none">
                <option value="ردود">رتبة: ردود</option>
                <option value="مروج">رتبة: مروج</option>
                <option value="متابعة">رتبة: متابعة</option>
            </select>
            <select id="new_shift" class="w-full p-4 bg-slate-50 rounded-xl font-bold text-center appearance-none outline-none">
                <option value="شفت كامل">شفت كامل</option>
                <option value="نصف شفت">نصف شفت</option>
            </select>
            <select id="new_team" class="w-full p-4 bg-blue-50 rounded-xl font-bold text-center text-blue-700 outline-none"></select>
            <input id="new_salary" type="number" placeholder="الراتب الأساسي" class="w-full p-4 bg-slate-50 rounded-xl text-center font-bold outline-none">
            <div class="flex gap-2">
                <button onclick="saveUser()" class="flex-1 bg-blue-600 text-white p-4 rounded-xl font-bold">حفظ الموظف</button>
                <button onclick="closeAddModal()" class="flex-1 bg-slate-100 p-4 rounded-xl font-bold">إلغاء</button>
            </div>
        </div>
    </div>

    <script>
        const sb = supabase.createClient('https://iqagigpqwwtvriqvlfbv.supabase.co', 'sb_publishable_5xbaPlWHgjeeaIwceEFRrQ_d9aZ6Zax');

        function openAddModal() { loadTeamsIntoSelect(); document.getElementById('add_modal').classList.add('active'); }
        function closeAddModal() { document.getElementById('add_modal').classList.remove('active'); }
        function toggleUserList() { document.getElementById('user_list_section').classList.toggle('hidden'); }

        async function loadTeamsIntoSelect() {
            const { data } = await sb.from('teams').select('*');
            document.getElementById('new_team').innerHTML = data.map(t => `<option value="${t.team_name}">${t.team_name}</option>`).join('');
        }

        async function saveUser() {
            const obj = {
                username: document.getElementById('new_name').value,
                password: document.getElementById('new_pass').value,
                employee_code: document.getElementById('new_code').value,
                user_job_role: document.getElementById('new_role').value,
                shift_type: document.getElementById('new_shift').value,
                team: document.getElementById('new_team').value,
                salary: document.getElementById('new_salary').value,
                role: 'موظف'
            };
            const { error } = await sb.from('users').insert([obj]);
            if(!error) { alert("تمت الإضافة!"); location.reload(); }
        }

        async function loadData() {
            const from = document.getElementById('date_from').value;
            const to = document.getElementById('date_to').value;
            const { data: users } = await sb.from('users').select('*').neq('role','مدير');
            const { data: teams } = await sb.from('teams').select('*');
            const { data: reps } = await sb.from('bookings_reports').select('*').gte('report_date', from).lte('report_date', to);
            const { data: exps } = await sb.from('marketing_expenses').select('*').gte('expense_date', from).lte('expense_date', to);

            // عرض قائمة اليوزرات
            document.getElementById('user_list_grid').innerHTML = users.map(u => `
                <div class="p-3 bg-slate-50 border rounded-xl text-xs">
                    <b>${u.username}</b> | كود: ${u.employee_code} <br> سر: ${u.password}
                </div>
            `).join('');

            // جدول التيمات
            const teamsBody = document.getElementById('teams_table_body');
            teamsBody.innerHTML = teams.map(t => {
                let spent = exps.filter(e => e.target_team === t.team_name).reduce((a,b)=>a+Number(b.amount_spent),0);
                let bks = reps.filter(r => users.find(u=>u.username===r.employee_username && u.team===t.team_name)).reduce((a,b)=>a+Number(b.bookings_count),0);
                return `<tr><td class="p-4">${t.team_name}</td><td class="p-4 text-center text-amber-600">${spent}</td><td class="p-4 text-center">${bks}</td><td class="p-4 text-center text-blue-600">${bks>0?(spent/bks).toFixed(0):0}</td></tr>`;
            }).join('');

            // جدول الردود
            const redodBody = document.getElementById('redod_table_body');
            redodBody.innerHTML = users.filter(u=>u.user_job_role==='ردود').map(u => {
                let uRep = reps.filter(r=>r.employee_username===u.username);
                let bks = uRep.reduce((a,b)=>a+Number(b.bookings_count),0);
                let wasl = uRep.reduce((a,b)=>a+Number(b.confirmed_count),0);
                let stars = u.shift_type==='شفت كامل' ? (wasl>=50?2:wasl>=30?1:0) : (wasl>=25?2:wasl>=15?1:0);
                return `<tr><td class="p-4">${u.username}</td><td class="p-4 text-center text-[10px]">${u.shift_type}</td><td class="p-4 text-center">${bks}</td><td class="p-4 text-center text-emerald-600">${wasl}</td><td class="p-4 text-center text-amber-500">${stars}⭐</td><td class="p-4 text-center"><button onclick="deleteUser('${u.id}')" class="text-red-500">🗑️ حذف</button></td></tr>`;
            }).join('');
        }

        async function deleteUser(id) { if(confirm("حذف الموظف؟")) { await sb.from('users').delete().eq('id', id); loadData(); } }
        async function addTeam() { const { value: t } = await Swal.fire({ title: 'اسم التيم', input: 'text' }); if(t) { await sb.from('teams').insert([{team_name: t}]); loadData(); } }
        async function logout() { localStorage.clear(); location.href='index.html'; }
        
        window.onload = () => {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('date_from').value = today;
            document.getElementById('date_to').value = today;
            loadData();
        };
    </script>
</body>
</html>
