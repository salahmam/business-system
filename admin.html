<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة النظام | صلاح الخليفة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(4px); align-items: center; justify-content: center; z-index: 50; padding: 1rem; }
        .modal.active { display: flex; }
        .glass-card { background: rgba(255, 255, 255, 0.95); border: 1px solid rgba(226, 232, 240, 1); }
        .hidden-list { display: none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-24 text-right">

    <header class="bg-slate-900 text-white p-5 sticky top-0 z-40 shadow-xl flex justify-between items-center">
        <div class="flex items-center gap-3">
            <button onclick="location.reload()" class="bg-blue-500/20 text-blue-400 p-2 rounded-lg border border-blue-500/30 text-xs font-bold">🔄 تحديث</button>
            <div>
                <h2 class="font-bold text-lg text-blue-400">صلاح الخليفة</h2>
                <p class="text-[10px] text-slate-400 uppercase">إدارة النظام المركزية</p>
            </div>
        </div>
        <button onclick="localStorage.clear(); location.href='index.html'" class="bg-red-500/10 text-red-400 px-4 py-2 rounded-xl text-xs font-bold border border-red-500/20">خروج</button>
    </header>

    <div class="p-4 max-w-4xl mx-auto space-y-6">
        
        <div class="grid grid-cols-2 gap-3">
            <button onclick="openAddModal()" class="bg-blue-600 text-white p-4 rounded-2xl font-bold shadow-lg text-sm">➕ إضافة موظف</button>
            <button onclick="toggleEmpList()" class="bg-slate-800 text-white p-4 rounded-2xl font-bold shadow-lg text-sm">👥 قائمة الموظفين</button>
        </div>

        <div class="bg-white p-4 rounded-3xl shadow-sm border border-slate-200">
            <label class="block text-xs font-black text-slate-400 mb-2">اختر تاريخ التقرير</label>
            <input type="date" id="rep_date" onchange="getRep()" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl text-center font-bold outline-none">
        </div>

        <div class="bg-slate-900 p-5 rounded-3xl shadow-2xl border border-slate-800">
            <h3 class="font-bold mb-4 text-white flex items-center gap-2">
                <span class="w-2 h-6 bg-blue-500 rounded-full"></span> 💵 أداء التيمات (تجميع مالي)
            </h3>
            <div class="overflow-x-auto">
                <table class="w-full text-right text-xs">
                    <thead class="text-slate-400 border-b border-slate-800">
                        <tr>
                            <th class="p-3">التيم</th>
                            <th class="p-3 text-center">الصرف</th>
                            <th class="p-3 text-center text-emerald-400">الحجوزات</th>
                        </tr>
                    </thead>
                    <tbody id="team_body" class="text-slate-300 font-medium"></tbody>
                </table>
            </div>
        </div>

        <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-200">
            <h3 class="font-bold mb-4 text-slate-800 flex items-center gap-2">
                <span class="w-2 h-6 bg-purple-500 rounded-full"></span> 📊 تقرير الأداء والمكافآت
            </h3>
            <div class="overflow-x-auto">
                <table class="w-full text-right text-xs">
                    <thead class="text-slate-400 border-b border-slate-100">
                        <tr>
                            <th class="p-3">الموظف</th>
                            <th class="p-3 text-center">حجوزات</th>
                            <th class="p-3 text-center">الصرف</th>
                        </tr>
                    </thead>
                    <tbody id="emp_report_body" class="text-slate-700 font-bold"></tbody>
                </table>
            </div>
        </div>

        <div id="emp_list_section" class="hidden-list space-y-3 bg-slate-200/50 p-4 rounded-3xl">
            <h3 class="font-bold text-slate-600 mb-2">إدارة الحسابات:</h3>
            <div id="emp_list_mobile" class="space-y-2"></div>
        </div>
    </div>

    <div id="add_emp_modal" class="modal">
        <div class="glass-card p-6 rounded-[2.5rem] w-full max-w-md space-y-4 shadow-2xl overflow-y-auto max-h-[90vh]">
            <h3 id="modal_title" class="font-extrabold text-xl text-center">بيانات الموظف</h3>
            <div class="flex flex-col gap-3">
                <input id="en" placeholder="الاسم" class="p-4 bg-slate-50 border rounded-2xl text-center font-bold">
                <input id="ep" placeholder="الباسورد" class="p-4 bg-slate-50 border rounded-2xl text-center">
                <input id="ec" placeholder="الكود" class="p-4 bg-slate-50 border rounded-2xl text-center font-black text-blue-600">
                <select id="er" class="p-4 bg-slate-50 border rounded-2xl font-bold text-center">
                    <option value="ردود">ردود</option>
                    <option value="مروج">مروج</option>
                </select>
                <input id="et" placeholder="التيم" class="p-4 bg-slate-50 border rounded-2xl text-center">
                <input id="ey" type="number" placeholder="الراتب" class="p-4 bg-slate-50 border rounded-2xl text-center font-bold">
            </div>
            <div class="grid grid-cols-2 gap-3 mt-2">
                <button onclick="save()" class="bg-blue-600 text-white p-4 rounded-2xl font-bold">حفظ</button>
                <button onclick="toggleModal('add_emp_modal')" class="bg-slate-200 p-4 rounded-2xl font-bold">إلغاء</button>
            </div>
        </div>
    </div>

    <div id="m" class="modal">
        <div class="glass-card p-8 rounded-[3rem] w-full max-w-[320px] space-y-4 shadow-2xl text-center">
            <h4 id="mn" class="font-black text-lg border-b pb-3 uppercase">الموظف</h4>
            <div class="space-y-3">
                <button onclick="editEmp()" class="w-full py-4 bg-blue-50 text-blue-600 rounded-2xl font-bold border border-blue-100">✏️ تعديل المعلومات</button>
                <button onclick="adj('bonus')" class="w-full py-4 bg-emerald-50 text-emerald-600 rounded-2xl font-bold">💰 مكافأة</button>
                <button onclick="adj('absence')" class="w-full py-4 bg-orange-50 text-orange-600 rounded-2xl font-bold">⏳ خصم</button>
                <button onclick="kill()" class="w-full py-4 bg-red-50 text-red-600 rounded-2xl font-bold">🗑️ حذف</button>
            </div>
            <button onclick="toggleModal('m')" class="text-slate-400 text-xs">إغلاق</button>
        </div>
    </div>

    <script>
        const sb = supabase.createClient('https://iqagigpqwwtvriqvlfbv.supabase.co', 'sb_publishable_5xbaPlWHgjeeaIwceEFRrQ_d9aZ6Zax');
        let cur = null;
        let allUsers = [];

        function toggleModal(id) { document.getElementById(id).classList.toggle('active'); }
        function toggleEmpList() { document.getElementById('emp_list_section').classList.toggle('hidden-list'); }

        async function getRep() {
            const d = document.getElementById('rep_date').value;
            const { data: reports, error } = await sb.from('bookings_reports').select('*').eq('report_date', d);
            
            if(error) console.error("Error fetching reports:", error);

            const teamBody = document.getElementById('team_body');
            const empBody = document.getElementById('emp_report_body');
            teamBody.innerHTML = ""; empBody.innerHTML = "";

            if (!reports || reports.length === 0) {
                teamBody.innerHTML = "<tr><td colspan='3' class='p-5 text-center'>لا توجد بيانات</td></tr>";
                return;
            }

            const teamSummary = {};

            reports.forEach(r => {
                const user = allUsers.find(u => u.username === r.employee_username);
                const tName = user && user.team ? user.team : "بدون تيم";

                // محاولة جلب الصرف من حقلين مختلفين لضمان العمل
                const s = Number(r.total_spent) || Number(r.spent) || 0;
                const b = Number(r.bookings_count) || 0;

                if (!teamSummary[tName]) teamSummary[tName] = { spent: 0, books: 0 };
                teamSummary[tName].spent += s;
                teamSummary[tName].books += b;

                empBody.innerHTML += `
                <tr class="border-b border-slate-50 italic">
                    <td class="p-3 text-slate-800">${r.employee_username} <span class="text-[8px] text-blue-500">(${tName})</span></td>
                    <td class="p-3 text-center text-emerald-600">${b}</td>
                    <td class="p-3 text-center text-red-500">${s.toLocaleString()}</td>
                </tr>`;
            });

            for (let t in teamSummary) {
                teamBody.innerHTML += `
                <tr class="border-b border-slate-800">
                    <td class="p-4 font-bold text-blue-400">${t}</td>
                    <td class="p-4 text-center text-red-400 font-bold">${teamSummary[t].spent.toLocaleString()}</td>
                    <td class="p-4 text-center text-emerald-400 font-black text-lg">${teamSummary[t].books}</td>
                </tr>`;
            }
        }

        async function load() {
            const { data } = await sb.from('users').select('*').neq('role','مدير');
            allUsers = data || [];
            const list = document.getElementById('emp_list_mobile');
            list.innerHTML = "";
            allUsers.forEach(e => {
                list.innerHTML += `
                <div class="bg-white p-3 rounded-2xl border border-slate-200 flex justify-between items-center shadow-sm">
                    <div>
                        <p class="font-bold text-slate-800 text-sm">${e.username}</p>
                        <p class="text-[10px] text-slate-500">${e.role} | ${e.team || 'عام'}</p>
                    </div>
                    <button onclick="pop('${e.id}')" class="w-10 h-10 bg-slate-50 text-slate-400 rounded-xl flex items-center justify-center border border-slate-100">⚙️</button>
                </div>`;
            });
            getRep();
        }

        function pop(id) { 
            cur = allUsers.find(u => u.id == id);
            document.getElementById('mn').innerText = cur.username; 
            toggleModal('m'); 
        }

        function openAddModal() {
            cur = null;
            document.getElementById('modal_title').innerText = "إضافة موظف جديد";
            ['en','ep','ec','et','ey'].forEach(id => document.getElementById(id).value = "");
            toggleModal('add_emp_modal');
        }

        function editEmp() {
            toggleModal('m');
            document.getElementById('modal_title').innerText = "تعديل: " + cur.username;
            document.getElementById('en').value = cur.username;
            document.getElementById('ep').value = cur.password;
            document.getElementById('ec').value = cur.employee_code;
            document.getElementById('er').value = cur.role;
            document.getElementById('et').value = cur.team || "";
            document.getElementById('ey').value = cur.salary || 0;
            toggleModal('add_emp_modal');
        }

        async function save() {
            const obj = {
                username: document.getElementById('en').value, 
                password: document.getElementById('ep').value,
                employee_code: document.getElementById('ec').value, 
                role: document.getElementById('er').value,
                team: document.getElementById('et').value, 
                salary: document.getElementById('ey').value
            };
            const res = cur ? await sb.from('users').update(obj).eq('id', cur.id) : await sb.from('users').insert([obj]);
            location.reload();
        }

        async function kill() {
            Swal.fire({title:'حذف؟', text:'سيتم مسح الموظف نهائياً', icon:'warning', showCancelButton:true})
            .then(async (result) => { if(result.isConfirmed) { await sb.from('users').delete().eq('id',cur.id); location.reload(); }});
        }

        async function adj(t) {
            const { value: val } = await Swal.fire({ title:'المبلغ', input:'number' });
            if(val) {
                await sb.from('adjustments').insert([{ user_id:cur.id, type:t, amount:val, reason:t }]);
                Swal.fire('تم', '', 'success'); toggleModal('m');
            }
        }

        window.onload = () => { 
            document.getElementById('rep_date').valueAsDate = new Date(); 
            load(); 
        };
    </script>
</body>
</html>
