<div class="bg-white p-4 rounded-xl shadow-sm border mb-4">
    <label class="block text-xs text-gray-400 mb-1">عرض تقرير يوم سابق:</label>
    <input type="date" id="filter_date" onchange="calculateCPL()" class="w-full p-2 bg-gray-50 border rounded-lg outline-none text-sm">
</div>

<script>
// الدالة المحدثة لجلب البيانات تلقائياً
async function calculateCPL() {
    const selectedDate = document.getElementById('filter_date').value || new Date().toISOString().split('T')[0];
    
    // 1. جلب مجموع الصرف لتيم المروج في التاريخ المحدد
    const { data: expData } = await _supabase
        .from('marketing_expenses')
        .select('amount_spent')
        .eq('target_team', currentUser.team)
        .eq('expense_date', selectedDate);

    // 2. جلب الموظفين (الردود) الذين ينتمون لنفس تيم المروج
    const { data: teamUsers } = await _supabase
        .from('users')
        .select('username')
        .eq('team', currentUser.team)
        .eq('role', 'ردود');

    const userNames = teamUsers.map(u => u.username);

    // 3. جلب مجموع حجوزاتهم في ذلك التاريخ
    const { data: bookData } = await _supabase
        .from('bookings_reports')
        .select('bookings_count')
        .in('employee_username', userNames)
        .eq('report_date', selectedDate);

    const totalSpend = expData.reduce((sum, item) => sum + parseFloat(item.amount_spent), 0);
    const totalBooks = bookData.reduce((sum, item) => sum + (item.bookings_count || 0), 0);

    document.getElementById('total_spend').innerText = totalSpend.toFixed(2);
    document.getElementById('total_bookings').innerText = totalBooks;

    if(totalBooks > 0) {
        document.getElementById('cpl_display').innerText = (totalSpend / totalBooks).toFixed(2);
    } else {
        document.getElementById('cpl_display').innerText = "0.00";
    }
}
</script>
