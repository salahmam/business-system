<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>واجهة المروج - BUSINESS SYSTEM</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f8fafc; }
        .stat-card { background: white; border-radius: 1.5rem; padding: 1.5rem; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .grad-emerald { background: linear-gradient(135deg, #10b981, #059669); }
    </style>
</head>
<body class="pb-10">

    <!-- أولاً: الهوية والترحيب -->
    <header class="grad-emerald text-white p-8 rounded-b-[3rem] shadow-xl text-center space-y-2">
        <div class="flex justify-between items-center mb-4 text-xs font-bold opacity-80">
            <button onclick="location.href='index.html'" class="bg-black/20 px-4 py-2 rounded-xl text-white">تسجيل خروج</button>
            <span id="current_date_display"></span>
        </div>
        <h1 id="p_name" class="text-3xl font-black italic">--</h1>
        <p class="text-emerald-100 font-bold tracking-widest text-sm uppercase">مسؤول الحملات الإعلانية</p>
    </header>

    <main class="px-4 -mt-8 space-y-6 max-w-4xl mx-auto">
        
        <!-- ثانياً: إحصائيات الإنجاز الشهري -->
        <section class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="stat-card border-r-4 border-r-blue-500 text-center">
                <p class="text-xs font-bold text-slate-400 mb-1">إجمالي المصرف الشهري</p>
                <p id="m_total_spent" class="text-2xl font-black text-slate-800">0</p>
            </div>
            <div class="stat-card border-r-4 border-r-emerald-500 text-center">
                <p class="text-xs font-bold text-slate-400 mb-1">إجمالي الحجوزات</p>
                <p id="m_total_books" class="text-2xl font-black text-slate-800">0</p>
            </div>
            <div class="stat-card border-r-4 border-r-purple-500 text-center">
                <p class="text-xs font-bold text-slate-400 mb-1">المعدل العام (CPL)</p>
                <p id="m_avg_cpl" class="text-2xl font-black text-slate-800">0</p>
            </div>
        </section>

        <!-- ثالثاً: ملخص الأداء اليومي والبحث -->
        <section class="stat-card space-y-4">
            <div class="flex items-center justify-between border-b pb-3">
                <h3 class="font-black text-slate-700">التقرير اليومي</h3>
                <input type="date" id="p_date" onchange="loadPromoterData()" class="bg-slate-100 p-2 rounded-lg font-bold text-sm outline-none border-none">
            </div>
            <div class="grid grid-cols-3 gap-2 text-center">
                <div><p class="text-[10px] font-bold text-slate-400">صرف اليوم</p><p id="d_spent" class="font-black text-lg">0</p></div>
                <div><p class="text-[10px] font-bold text-slate-400">حجوزات اليوم</p><p id="d_books" class="font-black text-lg">0</p></div>
                <div><p class="text-[10px] font-bold text-slate-400">سعر الطلب</p><p id="d_cpl" class="font-black text-lg text-emerald-600">0</p></div>
            </div>
        </section>

        <!-- رابعاً: جدول أداء التيمات -->
        <section class="stat-card overflow-hidden p-0">
            <div class="p-4 bg-slate-50 border-b font-black text-xs text-slate-500">أداء التيمات في التاريخ المحدد</div>
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-center">
                    <thead class="bg-slate-100 text-slate-600 font-bold">
                        <tr>
                            <th class="p-3">التيم</th>
                            <th>المصرف</th>
                            <th>الحجوزات</th>
                            <th>CPL</th>
                        </tr>
                    </thead>
                    <tbody id="teams_table" class="divide-y font-bold text-slate-700">
                        <!-- تظهر البيانات هنا -->
                    </tbody>
                </table>
            </div>
        </section>

        <!-- خامساً: منطقة إدخال وتعديل المصاريف -->
        <section class="stat-card space-y-4 bg-emerald-50/50 border-emerald-100">
            <h3 class="font-black text-emerald-800 text-center">إدارة وتغذية المصاريف</h3>
            <div class="space-y-3">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 mr-2">اختر التيم</label>
                    <select id="p_team_select" onchange="checkExistingExpense()" class="w-full p-4 bg-white border rounded-2xl font-bold outline-none focus:ring-2 ring-emerald-500"></select>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 mr-2">مبلغ الصرف</label>
                    <input type="number" id="p_amount_input" placeholder="0.00" class="w-full p-4 bg-white border rounded-2xl font-bold text-center text-2xl outline-none focus:ring-2 ring-emerald-500">
                </div>
                <button onclick="submitExpense()" class="w-full grad-emerald text-white py-5 rounded-2xl font-black text-lg shadow-lg active:scale-95 transition-transform">إرسال البيانات</button>
            </div>
        </section>

    </main>

    <script>
        const sb = supabase.createClient('https://iqagigpqwwtvriqvlfbv.supabase.co', 'sb_publishable_5xbaPlWHgjeeaIwceEFRrQ_d9aZ6Zax');
        const user = JSON.parse(localStorage.getItem('user_session'));
        const successAudio = new Audio('https://www.soundjay.com/buttons/sounds/button-3.mp3');

        async function init() {
            if(!user) { location.href = 'index.html'; return; }
            document.getElementById('p_name').innerText = user.username;
            document.getElementById('p_date').value = new Date().toISOString().split('T')[0];
            document.getElementById('current_date_display').innerText = new Date().toLocaleDateString('ar-EG', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            
            // جلب التيمات
            const { data: teams } = await sb.from('teams').select('*');
            const select = document.getElementById('p_team_select');
            select.innerHTML = teams.map(t => `<option value="${t.team_name}">${t.team_name}</option>`).join('');
            
            loadPromoterData();
        }

        async function loadPromoterData() {
            const selectedDate = document.getElementById('p_date').value;
            const startOfMonth = new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString().split('T')[0];
            
            // 1. جلب المصاريف (لليوم وللشهر)
            const { data: dayExp } = await sb.from('marketing_expenses').select('*').eq('expense_date', selectedDate);
            const { data: monthExp } = await sb.from('marketing_expenses').select('*').gte('expense_date', startOfMonth);
            
            // 2. جلب الحجوزات (لليوم وللشهر)
            const { data: dayBooks } = await sb.from('bookings_reports').select('*').eq('report_date', selectedDate);
            const { data: monthBooks } = await sb.from('bookings_reports').select('*').gte('report_date', startOfMonth);

            // حسابات الشهر
            const mSpentTotal = monthExp?.reduce((s, e) => s + Number(e.amount_spent), 0) || 0;
            const mBooksTotal = monthBooks?.reduce((s, b) => s + Number(b.bookings_count), 0) || 0;
            const mCplTotal = mBooksTotal > 0 ? (mSpentTotal / mBooksTotal).toFixed(2) : 0;

            document.getElementById('m_total_spent').innerText = mSpentTotal.toLocaleString();
            document.getElementById('m_total_books').innerText = mBooksTotal.toLocaleString();
            document.getElementById('m_avg_cpl').innerText = mCplTotal;

            // حسابات اليوم
            const dSpentTotal = dayExp?.reduce((s, e) => s + Number(e.amount_spent), 0) || 0;
            const dBooksTotal = dayBooks?.reduce((s, b) => s + Number(b.bookings_count), 0) || 0;
            const dCplTotal = dBooksTotal > 0 ? (dSpentTotal / dBooksTotal).toFixed(2) : 0;

            document.getElementById('d_spent').innerText = dSpentTotal.toLocaleString();
            document.getElementById('d_books').innerText = dBooksTotal.toLocaleString();
            document.getElementById('d_cpl').innerText = dCplTotal;

            // بناء الجدول اليومي
            const { data: allTeams } = await sb.from('teams').select('team_name');
            document.getElementById('teams_table').innerHTML = allTeams.map(t => {
                const teamExp = dayExp?.find(e => e.target_team === t.team_name)?.amount_spent || 0;
                const teamBooks = dayBooks?.filter(b => b.team === t.team_name).reduce((s, b) => s + Number(b.bookings_count), 0) || 0;
                const teamCPL = teamBooks > 0 ? (teamExp / teamBooks).toFixed(2) : (teamExp > 0 ? '∞' : '0');
                return `<tr>
                    <td class="p-3 text-right font-black">${t.team_name}</td>
                    <td>${teamExp}</td>
                    <td>${teamBooks}</td>
                    <td class="text-emerald-600">${teamCPL}</td>
                </tr>`;
            }).join('');

            checkExistingExpense();
        }

        async function checkExistingExpense() {
            const date = document.getElementById('p_date').value;
            const team = document.getElementById('p_team_select').value;
            const { data } = await sb.from('marketing_expenses').select('amount_spent').eq('expense_date', date).eq('target_team', team).single();
            document.getElementById('p_amount_input').value = data ? data.amount_spent : "";
        }

        async function submitExpense() {
            const date = document.getElementById('p_date').value;
            const team = document.getElementById('p_team_select').value;
            const amount = document.getElementById('p_amount_input').value;

            if(!amount) return Swal.fire('خطأ', 'أدخل المبلغ أولاً', 'error');

            const { data: existing } = await sb.from('marketing_expenses').select('id').eq('expense_date', date).eq('target_team', team).single();

            let error;
            if (existing) {
                const { error: err } = await sb.from('marketing_expenses').update({ amount_spent: amount }).eq('id', existing.id);
                error = err;
            } else {
                const { error: err } = await sb.from('marketing_expenses').insert([{ expense_date: date, target_team: team, amount_spent: amount }]);
                error = err;
            }

            if (!error) {
                successAudio.play();
                Swal.fire({ title: 'تم الحفظ!', text: `تم تحديث مصروف ${team} لليوم`, icon: 'success', timer: 1500, showConfirmButton: false });
                loadPromoterData();
            } else {
                Swal.fire('فشل', 'حدث خطأ في الاتصال بالقاعدة', 'error');
            }
        }

        init();
    </script>
</body>
</html>
