<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة المروج الاحترافية | BUSINESS SYSTEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .stat-card-blue { border-right: 4px solid #2563eb; }
        .stat-card-emerald { border-right: 4px solid #10b981; }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-blue-50 to-indigo-100 min-h-screen pb-10">

    <header class="bg-blue-900 text-white p-5 sticky top-0 z-50 shadow-2xl rounded-b-[2rem] flex justify-between items-center border-b-4 border-blue-500">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center font-black text-xl shadow-lg border border-blue-400">
                <span>📢</span>
            </div>
            <div>
                <h2 id="p_name_display" class="font-bold text-lg leading-tight">تحميل...</h2>
                <p class="text-[10px] text-blue-300 font-bold tracking-widest uppercase">مسؤول الحملات الإعلانية</p>
            </div>
        </div>
        <button onclick="localStorage.clear(); location.href='index.html'" class="bg-white/10 hover:bg-red-500/20 text-white p-3 rounded-2xl transition-all active:scale-90 border border-white/10">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
            </svg>
        </button>
    </header>

    <div class="p-4 max-w-xl mx-auto space-y-6 pt-6">
        
        <div class="glass p-6 rounded-[2.5rem] shadow-xl border border-white space-y-4">
            <div class="flex flex-col items-center">
                <span class="text-[10px] font-black text-blue-600 mb-2 uppercase italic text-center">عرض بيانات يوم محدد لمراقبة الأداء</span>
                <input type="date" id="target_date" onchange="syncData()" class="w-full p-4 bg-blue-50 border-2 border-transparent rounded-2xl text-center font-bold text-blue-900 outline-none focus:border-blue-500 transition-all">
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div class="p-4 rounded-3xl bg-white border border-slate-100 shadow-sm stat-card-blue">
                    <span class="text-[9px] text-slate-400 font-bold block uppercase">إجمالي الحجوزات</span>
                    <span id="total_books_all" class="text-2xl font-black text-blue-800">0</span>
                </div>
                <div class="p-4 rounded-3xl bg-white border border-slate-100 shadow-sm stat-card-emerald">
                    <span class="text-[9px] text-slate-400 font-bold block uppercase">متوسط CPL الكلي</span>
                    <span id="avg_cpl_all" class="text-2xl font-black text-emerald-700">0.00</span>
                </div>
            </div>
        </div>

        <div class="glass p-8 rounded-[3rem] shadow-xl border border-white space-y-5">
            <div class="text-center">
                <h3 class="text-lg font-black text-slate-800 italic">إضافة مصاريف الحملة</h3>
                <div class="h-1 w-10 bg-blue-600 mx-auto mt-1 rounded-full"></div>
            </div>

            <div class="space-y-4">
                <div class="grid grid-cols-1 gap-4">
                    <div>
                        <label class="text-[10px] font-black text-slate-400 mr-2 uppercase italic">اختر التيم المستهدف :</label>
                        <select id="team_select" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl text-center font-bold text-slate-700 outline-none focus:border-blue-500 appearance-none shadow-inner">
                            <option value="">جاري تحميل التيمات...</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-400 mr-2 uppercase italic">المبلغ المصروف لهذا التيم:</label>
                        <input type="number" id="spend_input" placeholder="0.00" class="w-full p-6 bg-blue-50 border-2 border-dashed border-blue-200 rounded-[2rem] text-center text-4xl font-black text-blue-700 outline-none focus:border-blue-600 focus:bg-white transition-all shadow-inner">
                    </div>
                </div>

                <button onclick="saveExpense()" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white py-5 rounded-[2rem] font-black text-lg shadow-xl shadow-blue-200 active:scale-[0.97] transition-all flex items-center justify-center gap-3 border-b-4 border-blue-800">
                    حفظ وتحديث الإحصائيات 🚀
                </button>
            </div>
        </div>

        <div class="glass rounded-[2.5rem] shadow-xl border border-white overflow-hidden">
            <div class="bg-slate-900 p-4">
                <h3 class="text-white text-center font-bold text-sm tracking-widest">تحليل الأداء التفصيلي لكل تيم</h3>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-right">
                    <thead>
                        <tr class="bg-slate-50 text-[10px] text-slate-500 font-black uppercase">
                            <th class="p-4">التيم</th>
                            <th class="p-4 text-center">الحجوزات</th>
                            <th class="p-4 text-center">المصاريف</th>
                            <th class="p-4 text-center text-blue-600 italic underline">سعر الطلب (CPL)</th>
                        </tr>
                    </thead>
                    <tbody id="team_table_body" class="text-sm font-bold divide-y divide-slate-100">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const sb = supabase.createClient('https://iqagigpqwwtvriqvlfbv.supabase.co', 'sb_publishable_5xbaPlWHgjeeaIwceEFRrQ_d9aZ6Zax');
        const user = JSON.parse(localStorage.getItem('user_session'));

        window.onload = async () => {
            if (!user || user.role !== 'مروج') { window.location.href = 'index.html'; return; }
            document.getElementById('p_name_display').innerText = user.username;
            document.getElementById('target_date').valueAsDate = new Date();
            
            await fetchTeams(); // جلب التيمات تلقائياً
            syncData();
        };

        // دالة لجلب التيمات الفريدة من جدول المستخدمين تلقائياً
        async function fetchTeams() {
            const { data, error } = await sb.from('users').select('team').not('team', 'is', null);
            if (error) return;

            // تصفية القيم المكررة واستخراج أسماء التيمات فقط
            const uniqueTeams = [...new Set(data.map(item => item.team))].sort();
            const teamSelect = document.getElementById('team_select');
            
            teamSelect.innerHTML = '<option value="">-- اختر التيم --</option>';
            uniqueTeams.forEach(team => {
                let o = document.createElement('option');
                o.value = team;
                o.text = `تيم ( ${team} )`;
                teamSelect.add(o);
            });
        }

        async function syncData() {
            const date = document.getElementById('target_date').value;
            const tableBody = document.getElementById('team_table_body');
            tableBody.innerHTML = `<tr><td colspan="4" class="p-10 text-center animate-pulse text-slate-400 font-bold italic">جاري جلب وتحليل البيانات...</td></tr>`;

            const { data: expenses } = await sb.from('marketing_expenses').select('*').eq('expense_date', date);
            const { data: reports } = await sb.from('bookings_reports').select('bookings_count, employee_username').eq('report_date', date);
            const { data: allUsers } = await sb.from('users').select('username, team').eq('role', 'ردود');

            let teamData = {};

            if (reports && allUsers) {
                reports.forEach(rep => {
                    const staff = allUsers.find(u => u.username === rep.employee_username);
                    if (staff && staff.team) {
                        if (!teamData[staff.team]) teamData[staff.team] = { books: 0, spend: 0 };
                        teamData[staff.team].books += (rep.bookings_count || 0);
                    }
                });
            }

            if (expenses) {
                expenses.forEach(exp => {
                    if (exp.target_team) {
                        if (!teamData[exp.target_team]) teamData[exp.target_team] = { books: 0, spend: 0 };
                        teamData[exp.target_team].spend += parseFloat(exp.amount_spent || 0);
                    }
                });
            }

            tableBody.innerHTML = "";
            let totalAllBooks = 0;
            let totalAllSpend = 0;

            Object.keys(teamData).forEach(teamName => {
                const data = teamData[teamName];
                const cpl = data.books > 0 ? (data.spend / data.books).toFixed(2) : "0.00";
                
                totalAllBooks += data.books;
                totalAllSpend += data.spend;

                tableBody.innerHTML += `
                    <tr class="hover:bg-blue-50/50 transition-colors">
                        <td class="p-4"><span class="bg-indigo-900 text-white px-3 py-1 rounded-lg text-[10px] font-black">TEAM ${teamName}</span></td>
                        <td class="p-4 text-center text-slate-700">${data.books}</td>
                        <td class="p-4 text-center text-slate-700 font-black">${data.spend.toLocaleString()}</td>
                        <td class="p-4 text-center text-blue-600 font-black italic underline">${cpl}</td>
                    </tr>
                `;
            });

            document.getElementById('total_books_all').innerText = totalAllBooks;
            const avgCPL = totalAllBooks > 0 ? (totalAllSpend / totalAllBooks).toFixed(2) : "0.00";
            document.getElementById('avg_cpl_all').innerText = avgCPL;
        }

        async function saveExpense() {
            const team = document.getElementById('team_select').value;
            const amount = document.getElementById('spend_input').value;
            const date = document.getElementById('target_date').value;

            if (!team || !amount || amount <= 0) {
                alert("يرجى اختيار التيم وإدخال المبلغ المصروف");
                return;
            }

            const { error } = await sb.from('marketing_expenses').insert([{
                promoter_username: user.username,
                target_team: team,
                amount_spent: parseFloat(amount),
                expense_date: date
            }]);

            if (error) {
                alert("❌ حدث خطأ: " + error.message);
            } else {
                alert("✅ تم تسجيل صرف تيم " + team + " بنجاح");
                document.getElementById('spend_input').value = "";
                syncData();
            }
        }
    </script>
</body>
</html>
