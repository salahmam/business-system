<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المروج - BUSINESS SYSTEM</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Tajawal', sans-serif; background: #f0fdf4; }</style>
</head>
<body class="p-4 space-y-6">
    <header class="bg-emerald-600 text-white p-6 rounded-2xl shadow-lg text-center">
        <h1 id="p_name" class="text-xl font-black">جاري التحميل...</h1>
        <p class="text-xs opacity-80">مسؤول الحملات الإعلانية</p>
    </header>

    <main class="max-w-md mx-auto space-y-4">
        <div class="bg-white p-6 rounded-2xl shadow-sm space-y-4 border border-emerald-100">
            <input type="date" id="p_date" class="w-full p-4 bg-slate-50 rounded-xl font-bold border outline-none">
            <select id="p_team" class="w-full p-4 bg-slate-50 rounded-xl font-bold border outline-none"></select>
            <input type="number" id="p_amount" placeholder="مبلغ الصرف اليومي" class="w-full p-4 bg-slate-50 rounded-xl font-bold border outline-none text-center text-2xl">
            <button onclick="saveExp()" class="w-full bg-emerald-600 text-white py-5 rounded-2xl font-black text-lg">حفظ التقرير</button>
        </div>
    </main>

    <script>
        const sb = supabase.createClient('https://iqagigpqwwtvriqvlfbv.supabase.co', 'sb_publishable_5xbaPlWHgjeeaIwceEFRrQ_d9aZ6Zax');
        const user = JSON.parse(localStorage.getItem('user_session'));

        async function init() {
            if(!user) location.href='index.html';
            document.getElementById('p_name').innerText = user.username;
            document.getElementById('p_date').value = new Date().toISOString().split('T')[0];
            const { data: teams } = await sb.from('teams').select('*');
            document.getElementById('p_team').innerHTML = teams.map(t => `<option value="${t.team_name}">${t.team_name}</option>`).join('');
        }

        async function saveExp() {
            const date = document.getElementById('p_date').value;
            const team = document.getElementById('p_team').value;
            const amt = document.getElementById('p_amount').value;
            if(!amt) return;
            const { data: existing } = await sb.from('marketing_expenses').select('*').eq('expense_date', date).eq('target_team', team).single();
            if(existing) await sb.from('marketing_expenses').update({ amount_spent: amt }).eq('id', existing.id);
            else await sb.from('marketing_expenses').insert([{ expense_date: date, target_team: team, amount_spent: amt }]);
            Swal.fire('تم', 'تم الحفظ بنجاح', 'success');
        }
        init();
    </script>
</body>
</html>
